name: Plugin System Tests

on:
  workflow_dispatch:
  push:
    branches: [main, develop]
    paths:
      - 'packages/core-backend/**'
      - 'plugins/**'
      - 'apps/web/src/**'
      - 'scripts/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - '.github/workflows/*.yml'
  pull_request:
    branches: [main, develop]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  dingtalk-p4-ops-regression-gate:
    name: DingTalk P4 ops regression gate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20.x
        uses: actions/setup-node@v4
        with:
          node-version: 20.x

      - name: Run DingTalk P4 ops regression gate
        run: |
          node scripts/ops/dingtalk-p4-regression-gate.mjs \
            --profile ops \
            --output-dir output/dingtalk-p4-regression-gate/ci

      - name: Upload DingTalk P4 ops regression gate evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dingtalk-p4-ops-regression-gate
          path: output/dingtalk-p4-regression-gate/ci/
          if-no-files-found: ignore

  k3wise-offline-poc:
    name: K3 WISE offline PoC
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20.x
        uses: actions/setup-node@v4
        with:
          node-version: 20.x

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.16.1
          run_install: false

      - name: Run K3 WISE offline PoC readiness smoke
        run: |
          pnpm run verify:integration-k3wise:poc

  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x, 20.x]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.16.1
          run_install: false
      - name: Show pnpm version
        run: pnpm -v
      - name: Use empty npmrc for pnpm
        run: |
          echo "" > /tmp/empty-npmrc
          echo "NPM_CONFIG_USERCONFIG=/tmp/empty-npmrc" >> "$GITHUB_ENV"

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies (with log)
        run: |
          set -o pipefail
          pnpm install --frozen-lockfile 2>&1 | tee install.log
      - name: Upload install log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: install-log-${{ matrix.node-version }}
          path: install.log

      - name: Run linting
        if: matrix.node-version == '20.x'
        run: |
          pnpm lint

      - name: Run type checking
        if: matrix.node-version == '20.x'
        run: |
          pnpm type-check

      - name: Run core-backend tests
        run: |
          pnpm --filter @metasheet/core-backend test

      - name: Run rich-text longText XSS write-sanitizer canaries
        # Security-critical: the write-path sanitizer is the authoritative XSS defense
        # for rich-text longText. Run the canary suite explicitly (and fail-fast) so it
        # stays gated even if the default vitest discovery globs ever change.
        run: |
          pnpm --filter @metasheet/core-backend exec vitest run tests/unit/richtext-longtext-sanitizer.test.ts --reporter=dot

      - name: Start Postgres
        uses: ankane/setup-postgres@v1
        with:
          postgres-version: 14
          user: postgres
      - name: Create test database
        run: |
          createdb -U postgres metasheet_test || true

      - name: Run DB migrations
        env:
          DATABASE_URL: postgresql://postgres@localhost:5432/metasheet_test
          MIGRATION_EXCLUDE: 008_plugin_infrastructure.sql,048_create_event_bus_tables.sql,049_create_bpmn_workflow_tables.sql,042a_core_model_views.sql,20250924120000_create_views_view_states.ts,20250924140000_create_gantt_tables.ts,20250925_create_view_tables.sql,20251117000001_add_snapshot_labels.ts,20251117000002_create_protection_rules.ts,20251201000001_create_change_management_tables.ts
        run: |
          pnpm --filter @metasheet/core-backend db:migrate

      - name: Run required after-sales install integration
        if: matrix.node-version == '20.x'
        env:
          DATABASE_URL: postgresql://postgres@localhost:5432/metasheet_test
        run: |
          : "${DATABASE_URL:?DATABASE_URL is required for after-sales integration}"
          pnpm --filter @metasheet/core-backend exec vitest --config vitest.integration.config.ts run tests/integration/after-sales-plugin.install.test.ts --reporter=dot

      - name: Run multitable real-DB integration (permission golden + view-aggregate + formula dry-run + read-path field mask + foreign-field taint mask + dashboard authz + realtime invalidation + automation retry provenance + cross-base governed automation writes + webhook outbound chain + AI shortcut run + AI ledger retention sweep + record-level version restore + rollup countall non-gating characterization + rollup filter condition fail-closed + rollup string/boolean reducers + dashboard non-numeric rollup rejection + record recycle-bin delete/restore)
        if: matrix.node-version == '20.x'
        env:
          DATABASE_URL: postgresql://postgres@localhost:5432/metasheet_test
        run: |
          : "${DATABASE_URL:?DATABASE_URL is required for multitable real-DB integration}"
          pnpm --filter @metasheet/core-backend exec vitest --config vitest.integration.config.ts run \
            tests/integration/multitable-permission-golden-d3d1.test.ts \
            tests/integration/multitable-permission-golden-d3d2.test.ts \
            tests/integration/multitable-context.api.test.ts \
            tests/integration/multitable-view-aggregate.test.ts \
            tests/integration/multitable-typed-query-numeric-view.test.ts \
            tests/integration/multitable-formula-over-lookup-view.test.ts \
            tests/integration/multitable-formula-over-lookup-create-view.test.ts \
            tests/integration/multitable-formula-over-lookup-afull-view.test.ts \
            tests/integration/multitable-fol1-related-invalidation.test.ts \
            tests/integration/multitable-bidirectional-mirror-links.test.ts \
            tests/integration/multitable-formula-dryrun.test.ts \
            tests/integration/multitable-records-read-field-mask.test.ts \
            tests/integration/multitable-readpath-search-filter-field-mask.test.ts \
            tests/integration/multitable-viewconfig-filter-literal-redaction.test.ts \
            tests/integration/multitable-viewconfig-resave-guard.test.ts \
            tests/integration/multitable-records-list-authz.test.ts \
            tests/integration/multitable-rowlevel-readdeny-enforce.test.ts \
            tests/integration/multitable-conditional-rule-enforce-realdb.test.ts \
            tests/integration/multitable-conditional-rules-api.test.ts \
            tests/integration/multitable-rowlevel-readdeny-xrec.test.ts \
            tests/integration/multitable-rowlevel-readdeny-flag-endpoint.test.ts \
            tests/integration/multitable-record-history-field-mask.test.ts \
            tests/integration/multitable-record-restore.test.ts \
            tests/integration/multitable-record-recycle-bin.test.ts \
            tests/integration/yjs-scalar-seed-realdb.test.ts \
            tests/integration/yjs-scalar-flush-realdb.test.ts \
            tests/integration/yjs-scalar-strdate-migration-realdb.test.ts \
            tests/integration/multitable-records-summary-field-mask.test.ts \
            tests/integration/multitable-summary-display-field-mask.test.ts \
            tests/integration/multitable-link-summary-display-field-mask.test.ts \
            tests/integration/multitable-view-summary-recordperm-leak.test.ts \
            tests/integration/multitable-person-summary-field-mask.test.ts \
            tests/integration/multitable-person-member-group-restrict.test.ts \
            tests/integration/multitable-button-send-notification.test.ts \
            tests/integration/multitable-button-update-record.test.ts \
            tests/integration/multitable-form-context-submit-field-mask.test.ts \
            tests/integration/multitable-dashboard-chart-authz.test.ts \
            tests/integration/multitable-dashboard-preview-data.test.ts \
            tests/integration/multitable-write-echo-field-mask.test.ts \
            tests/integration/multitable-create-echo-field-mask.test.ts \
            tests/integration/multitable-record-lock.test.ts \
            tests/integration/multitable-record-lock-bypass.test.ts \
            tests/integration/multitable-cross-sheet-related-echo-mask.test.ts \
            tests/integration/multitable-lookup-foreign-field-mask-view.test.ts \
            tests/integration/multitable-lookup-foreign-field-mask-export.test.ts \
            tests/integration/multitable-export-permission-canary.test.ts \
            tests/integration/multitable-lookup-foreign-field-mask-write.test.ts \
            tests/integration/multitable-lookup-foreign-field-mask-create.test.ts \
            tests/integration/multitable-lookup-foreign-field-mask-aggregate.test.ts \
            tests/integration/multitable-rollup-countall-nongating.test.ts \
            tests/integration/multitable-rollup-filter-condition.test.ts \
            tests/integration/multitable-rollup-string-bool-reducers.test.ts \
            tests/integration/multitable-lookup-foreign-field-mask-sibling-reads.test.ts \
            tests/integration/multitable-dashboard-filterinfo-oracle.test.ts \
            tests/integration/multitable-lookup-foreign-field-mask-convergence.test.ts \
            tests/integration/multitable-cross-base-link-wall.test.ts \
            tests/integration/multitable-cross-base-sheet-create-toctou.test.ts \
            tests/integration/multitable-cross-base-seed-view-toctou.test.ts \
            tests/integration/multitable-dangling-link-sweep.test.ts \
            tests/integration/multitable-base-readable-resolver.test.ts \
            tests/integration/multitable-base-writable-resolver.test.ts \
            tests/integration/multitable-cross-base-link-optin.test.ts \
            tests/integration/multitable-cross-base-automation-write.test.ts \
            tests/integration/multitable-cross-base-automation-write-rule.test.ts \
            tests/integration/multitable-cross-base-write-quota.test.ts \
            tests/integration/multitable-sheet-realtime.api.test.ts \
            tests/integration/rooms.basic.test.ts \
            tests/integration/multitable-automation-retry.test.ts \
            tests/integration/multitable-automation-jobs.test.ts \
            tests/integration/multitable-automation-suspend-resume.test.ts \
            tests/integration/multitable-automation-start-approval.test.ts \
            tests/integration/multitable-form-submit-trigger.test.ts \
            tests/integration/multitable-webhook-event-bridge.test.ts \
            tests/integration/multitable-webhook-retry-tick.test.ts \
            tests/integration/multitable-ai-shortcut-run.test.ts \
            tests/integration/multitable-ai-ledger-retention.test.ts \
            tests/integration/multitable-ai-suggest-formula.test.ts \
            tests/integration/data-source-c3-keyset-realdb.test.ts \
            tests/integration/data-source-test-ephemeral-realdb.test.ts \
            --reporter=dot

      - name: Run approval real-DB integration (directory endpoints + P1-C field redaction + P1-B add_sign/reduce_sign + direct_manager create/start)
        # Lane A (directory endpoints) + Lane B (P1-C hidden field redaction) + Lane D (add_sign/reduce_sign). Wired as WHOLE FILE runs so the
        # gate is robust (a name filter that matches zero tests would exit green and hide
        # regressions). The file is describeIfDatabase-guarded + excluded from the no-DB
        # default test job, so this is its real CI lane.
        if: matrix.node-version == '20.x'
        env:
          DATABASE_URL: postgresql://postgres@localhost:5432/metasheet_test
        run: |
          : "${DATABASE_URL:?DATABASE_URL is required for approval real-DB integration}"
          pnpm --filter @metasheet/core-backend exec vitest --config vitest.integration.config.ts run \
            tests/integration/approval-directory-endpoints.api.test.ts \
            tests/integration/approval-p1c-field-permissions.api.test.ts \
            tests/integration/approval-wp-add-reduce-sign.api.test.ts \
            tests/integration/approval-direct-manager.api.test.ts \
            --reporter=dot

      - name: Run comment-reaction keystone (real wire, real PG)
        # B6 emoji-reaction keystone (#2673 follow-up). Wired as a WHOLE FILE (not a
        # `-t` name filter) so the gate is robust: a name filter that matches zero
        # tests exits 0/green and would silently reintroduce the invisible debt this
        # exists to kill, whereas a whole-file run fails if the file is empty/broken.
        # comment-reactions.api.test.ts covers add / aggregate / idempotent re-add /
        # self-scoped DELETE / reader-deny 403 / cascade against real Postgres, with a
        # fail-loud beforeAll (missing PG/port → RED, not skipped-green). The sibling
        # comments.api.test.ts is intentionally NOT wired: 8 of its tests have a
        # pre-existing real-wire failure (CommentService.mapRowToComment drops
        # containerId/targetId/targetFieldId), tracked separately under its own opt-in.
        if: matrix.node-version == '20.x'
        env:
          DATABASE_URL: postgresql://postgres@localhost:5432/metasheet_test
        run: |
          : "${DATABASE_URL:?DATABASE_URL is required for comment-reaction keystone}"
          pnpm --filter @metasheet/core-backend exec vitest --config vitest.integration.config.ts run \
            tests/integration/comment-reactions.api.test.ts --reporter=dot

      - name: Start core backend (background)
        env:
          DATABASE_URL: postgresql://postgres@localhost:5432/metasheet_test
          PORT: 8900
        run: |
          nohup pnpm -F @metasheet/core-backend dev:core > server.log 2>&1 & echo $! > server.pid
          sleep 5
          echo "Server PID: $(cat server.pid)"

      - name: Run plugin smoke test
        env:
          API_ORIGIN: http://localhost:8900
        run: |
          pnpm --filter @metasheet/core-backend smoke:plugins

      - name: Config snapshot (non-blocking)
        if: always()
        run: |
          curl -sf http://localhost:8900/metrics/config || true

      - name: Admin KV list (non-blocking)
        if: always()
        env:
          API_ORIGIN: http://localhost:8900
        run: |
          set +e
          curl -sf "${API_ORIGIN}/api/admin/plugin-kv?plugin=@metasheet/plugin-test-a" || true

      - name: Dump server log on failure
        if: failure()
        run: |
          cat server.log || true

      - name: Stop core backend
        if: always()
        run: |
          kill $(cat server.pid) || true

      - name: Build web app
        # Skip on Node 18 - @vitejs/plugin-vue@6.x requires Node 20+ (crypto.hash API)
        if: matrix.node-version != '18.x'
        run: |
          pnpm --filter @metasheet/web build

      - name: Run attendance integration tests
        env:
          DATABASE_URL: postgresql://postgres@localhost:5432/metasheet_test
          ATTENDANCE_TEST_DATABASE_URL: postgresql://postgres@localhost:5432/metasheet_test
        run: |
          : "${DATABASE_URL:?DATABASE_URL is required for attendance integration}"
          pnpm --filter @metasheet/core-backend exec vitest --config vitest.integration.config.ts run \
            tests/integration/attendance-plugin.test.ts \
            tests/integration/attendance-expiry-service.test.ts \
            tests/integration/attendance-unscheduled-reminder.test.ts \
            tests/integration/attendance-outdoor-punch.test.ts \
            tests/integration/attendance-notification-deliveries.test.ts \
            tests/integration/attendance-comp-time-expiry-reminder.test.ts \
            tests/integration/attendance-shift-swap.test.ts \
            tests/integration/attendance-schedule-dispatch.test.ts \
            --reporter=dot

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.node-version }}
          path: |
            packages/core-backend/coverage/
            packages/core-backend/test-results/

  after-sales-integration:
    name: after-sales integration
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.16.1
          run_install: false
      - name: Show pnpm version
        run: pnpm -v
      - name: Use empty npmrc for pnpm
        run: |
          echo "" > /tmp/empty-npmrc
          echo "NPM_CONFIG_USERCONFIG=/tmp/empty-npmrc" >> $GITHUB_ENV

      - name: Get pnpm store directory
        id: pnpm-cache-after-sales
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path)" >> "$GITHUB_OUTPUT"

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache-after-sales.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies (with log)
        run: |
          set -o pipefail
          pnpm install --frozen-lockfile 2>&1 | tee install.log
      - name: Upload install log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: install-log-after-sales-integration
          path: install.log

      - name: Start Postgres
        uses: ankane/setup-postgres@v1
        with:
          postgres-version: 14
          user: postgres

      - name: Create test database
        run: |
          createdb -U postgres metasheet_test || true

      - name: Run DB migrations
        env:
          DATABASE_URL: postgresql://postgres@localhost:5432/metasheet_test
          MIGRATION_EXCLUDE: 008_plugin_infrastructure.sql,048_create_event_bus_tables.sql,049_create_bpmn_workflow_tables.sql,042a_core_model_views.sql,20250924120000_create_views_view_states.ts,20250924140000_create_gantt_tables.ts,20250925_create_view_tables.sql,20251117000001_add_snapshot_labels.ts,20251117000002_create_protection_rules.ts,20251201000001_create_change_management_tables.ts
        run: |
          pnpm --filter @metasheet/core-backend db:migrate

      - name: Run after-sales integration test
        env:
          DATABASE_URL: postgresql://postgres@localhost:5432/metasheet_test
        run: |
          : "${DATABASE_URL:?DATABASE_URL is required for after-sales integration}"
          pnpm --filter @metasheet/core-backend test:integration:after-sales

      - name: Upload after-sales integration artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: after-sales-integration-artifacts
          path: |
            packages/core-backend/coverage/
            packages/core-backend/test-results/

  coverage:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install dependencies (with log)
        run: |
          set -o pipefail
          pnpm install --frozen-lockfile 2>&1 | tee install.log
      - name: Upload install log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: install-log-coverage
          path: install.log

      - name: Run tests with coverage
        run: |
          pnpm --filter @metasheet/core-backend test --coverage || true

      - name: Comment coverage on PR
        if: github.event_name == 'pull_request'
        uses: romeovs/lcov-reporter-action@v0.3.1
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          lcov-file: ./packages/core-backend/coverage/lcov.info
        continue-on-error: true
