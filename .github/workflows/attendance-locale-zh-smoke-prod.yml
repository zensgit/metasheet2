name: Attendance Locale zh Smoke (Prod)
run-name: >-
  Attendance Locale zh Smoke (Prod)${{ github.event_name == 'workflow_dispatch' && github.event.inputs.drill_fail == 'true' && ' [DRILL]' || '' }}

on:
  schedule:
    - cron: '18 2 * * *'
  workflow_dispatch:
    inputs:
      web_url:
        description: 'Web URL (attendance page base)'
        required: false
        default: 'http://142.171.239.56:8081'
      api_base:
        description: 'API base'
        required: false
        default: 'http://142.171.239.56:8081/api'
      org_id:
        description: 'Org ID used for temporary holiday setup'
        required: false
        default: 'default'
      verify_holiday:
        description: 'Verify holiday badge with temp holiday create/delete (true/false)'
        required: false
        default: 'true'
      require_toggle_checks:
        description: 'Require calendar toggle assertions (true/false). Keep false until target env has toggle UI.'
        required: false
        default: 'false'
      require_zh_core_labels:
        description: 'Require zh core labels and reject English fallback texts in attendance area (true/false)'
        required: false
        default: 'true'
      drill_fail:
        description: 'Drill mode: force failure path and skip real smoke'
        required: false
        type: boolean
        default: false
      issue_title:
        description: 'Optional issue title override for drill issue tracking'
        required: false
        default: ''

concurrency:
  group: attendance-locale-zh-smoke-prod
  cancel-in-progress: true

permissions:
  contents: read
  issues: write

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      WEB_URL: ${{ inputs.web_url || vars.ATTENDANCE_WEB_BASE_URL || 'http://142.171.239.56:8081' }}
      API_BASE: ${{ inputs.api_base || vars.ATTENDANCE_API_BASE || 'http://142.171.239.56:8081/api' }}
      ORG_ID: ${{ inputs.org_id || vars.ATTENDANCE_ORG_ID || 'default' }}
      VERIFY_HOLIDAY: ${{ inputs.verify_holiday || 'true' }}
      REQUIRE_TOGGLE_CHECKS: ${{ inputs.require_toggle_checks || vars.ATTENDANCE_LOCALE_ZH_REQUIRE_TOGGLE_CHECKS || 'false' }}
      REQUIRE_ZH_CORE_LABELS: ${{ inputs.require_zh_core_labels || vars.ATTENDANCE_LOCALE_ZH_REQUIRE_CORE_LABELS || 'true' }}
      AUTH_TOKEN: ${{ secrets.ATTENDANCE_ADMIN_JWT }}
      LOGIN_EMAIL: ${{ secrets.ATTENDANCE_ADMIN_EMAIL }}
      LOGIN_PASSWORD: ${{ secrets.ATTENDANCE_ADMIN_PASSWORD }}
      HEADLESS: 'true'
      OUTPUT_DIR: output/playwright/attendance-locale-zh-smoke
      DRILL_FAIL: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.drill_fail == 'true' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare output directory
        run: mkdir -p output/playwright/attendance-locale-zh-smoke

      - name: Drill failure injection
        if: ${{ env.DRILL_FAIL == 'true' }}
        run: |
          set -euo pipefail
          mkdir -p output/playwright/attendance-locale-zh-smoke/drill
          cat > output/playwright/attendance-locale-zh-smoke/drill/drill.txt <<EOF
          Drill mode enabled.
          This run intentionally failed with exit code 97 before executing real zh smoke steps.
          Run URL: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}
          EOF
          exit 97

      - name: Setup pnpm
        if: ${{ env.DRILL_FAIL != 'true' }}
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        if: ${{ env.DRILL_FAIL != 'true' }}
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        if: ${{ env.DRILL_FAIL != 'true' }}
        run: pnpm install --frozen-lockfile

      - name: Run zh copy contract
        if: ${{ env.DRILL_FAIL != 'true' }}
        run: pnpm verify:attendance-zh-copy-contract

      - name: Install Playwright browsers
        if: ${{ env.DRILL_FAIL != 'true' }}
        run: pnpm exec playwright install chromium --with-deps

      - name: Run zh locale smoke
        if: ${{ env.DRILL_FAIL != 'true' }}
        run: pnpm verify:attendance-locale-zh

      - name: Write step summary
        if: always()
        run: |
          set -euo pipefail
          auth_source='unknown'
          zh_labels='unknown'
          schema_version='unknown'
          if [[ -f output/playwright/attendance-locale-zh-smoke/attendance-zh-locale-summary.json ]]; then
            auth_source="$(jq -r '.authSource // "unknown"' output/playwright/attendance-locale-zh-smoke/attendance-zh-locale-summary.json 2>/dev/null || echo 'unknown')"
            zh_labels="$(jq -r 'if .zhLabels.skipped == true then ("skipped:" + (.zhLabels.reason // "not-required")) elif .zhLabels.ok == true then "pass" else "fail" end' output/playwright/attendance-locale-zh-smoke/attendance-zh-locale-summary.json 2>/dev/null || echo 'unknown')"
            schema_version="$(jq -r '.schemaVersion // "unknown"' output/playwright/attendance-locale-zh-smoke/attendance-zh-locale-summary.json 2>/dev/null || echo 'unknown')"
          fi
          {
            echo "## Attendance Locale zh Smoke (Prod)"
            echo ""
            echo "- WEB_URL: \`${WEB_URL}\`"
            echo "- API_BASE: \`${API_BASE}\`"
            echo "- ORG_ID: \`${ORG_ID}\`"
            echo "- VERIFY_HOLIDAY: \`${VERIFY_HOLIDAY}\`"
            echo "- REQUIRE_TOGGLE_CHECKS: \`${REQUIRE_TOGGLE_CHECKS}\`"
            echo "- REQUIRE_ZH_CORE_LABELS: \`${REQUIRE_ZH_CORE_LABELS}\`"
            echo "- AUTH SOURCE: \`${auth_source}\`"
            echo "- ZH_LABELS: \`${zh_labels}\`"
            echo "- SUMMARY_SCHEMA_VERSION: \`${schema_version}\`"
            echo ""
            echo "Expected screenshot:"
            echo "- \`output/playwright/attendance-locale-zh-smoke/attendance-zh-locale-calendar.png\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: attendance-locale-zh-smoke-prod-${{ github.run_id }}-${{ github.run_attempt }}
          retention-days: 14
          path: |
            output/playwright/attendance-locale-zh-smoke/**

  issue:
    if: always()
    needs: smoke
    runs-on: ubuntu-latest
    env:
      DRILL_FAIL: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.drill_fail == 'true' }}
      ISSUE_TITLE_INPUT: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.issue_title || '' }}
      DEFAULT_ISSUE_TITLE: '[Attendance P1] Locale zh smoke alert（非 paging）'
      RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
      ARTIFACT_NAME: attendance-locale-zh-smoke-prod-${{ github.run_id }}-${{ github.run_attempt }}
    steps:
      - name: Resolve issue title and policy
        id: policy
        run: |
          set -euo pipefail

          manage_issue='true'
          issue_title="${DEFAULT_ISSUE_TITLE}"

          if [[ "${DRILL_FAIL}" == 'true' ]]; then
            if [[ -n "${ISSUE_TITLE_INPUT}" ]]; then
              issue_title="${ISSUE_TITLE_INPUT}"
            else
              manage_issue='false'
            fi
          fi

          {
            printf 'manage_issue=%s\n' "${manage_issue}"
            printf 'issue_title=%s\n' "${issue_title}"
          } >> "$GITHUB_OUTPUT"

      - name: Skip issue operations (drill without issue_title)
        if: ${{ steps.policy.outputs.manage_issue != 'true' }}
        run: echo 'Drill mode without issue_title; skipping issue management.'

      - name: Find matching issue
        if: ${{ steps.policy.outputs.manage_issue == 'true' }}
        id: find-issue
        uses: actions/github-script@v7
        env:
          ISSUE_TITLE: ${{ steps.policy.outputs.issue_title }}
        with:
          script: |
            const issueTitle = process.env.ISSUE_TITLE;
            const issues = await github.paginate(github.rest.issues.listForRepo, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'all',
              per_page: 100,
            });

            const matches = issues
              .filter((issue) => !issue.pull_request && issue.title === issueTitle)
              .sort((a, b) => new Date(b.updated_at) - new Date(a.updated_at));

            const openIssue = matches.find((issue) => issue.state === 'open');
            const targetIssue = openIssue || matches[0];

            core.setOutput('target_issue_number', targetIssue ? String(targetIssue.number) : '');
            core.setOutput('target_issue_state', targetIssue ? targetIssue.state : '');
            core.setOutput('open_issue_number', openIssue ? String(openIssue.number) : '');

      - name: Create/reopen/comment on smoke failure
        if: ${{ steps.policy.outputs.manage_issue == 'true' && needs.smoke.result == 'failure' }}
        uses: actions/github-script@v7
        env:
          ISSUE_TITLE: ${{ steps.policy.outputs.issue_title }}
          TARGET_ISSUE_NUMBER: ${{ steps.find-issue.outputs.target_issue_number }}
          TARGET_ISSUE_STATE: ${{ steps.find-issue.outputs.target_issue_state }}
          RUN_URL: ${{ env.RUN_URL }}
          ARTIFACT_NAME: ${{ env.ARTIFACT_NAME }}
        with:
          script: |
            const issueTitle = process.env.ISSUE_TITLE;
            const issueNumber = Number(process.env.TARGET_ISSUE_NUMBER || '0');
            const issueState = process.env.TARGET_ISSUE_STATE;
            const body = [
              'Attendance locale zh smoke failed.',
              '',
              `Run URL: ${process.env.RUN_URL}`,
              '',
              'Download artifacts:',
              `\`gh run download ${context.runId} --repo ${context.repo.owner}/${context.repo.repo} --name ${process.env.ARTIFACT_NAME}\``,
            ].join('\n');

            if (!issueNumber) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: issueTitle,
                body,
              });
              return;
            }

            if (issueState !== 'open') {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
                state: 'open',
              });
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              body,
            });

      - name: Comment and close open issue on recovery
        if: ${{ steps.policy.outputs.manage_issue == 'true' && needs.smoke.result == 'success' && steps.find-issue.outputs.open_issue_number != '' }}
        uses: actions/github-script@v7
        env:
          OPEN_ISSUE_NUMBER: ${{ steps.find-issue.outputs.open_issue_number }}
          RUN_URL: ${{ env.RUN_URL }}
          ARTIFACT_NAME: ${{ env.ARTIFACT_NAME }}
        with:
          script: |
            const issueNumber = Number(process.env.OPEN_ISSUE_NUMBER || '0');
            const body = [
              'Attendance locale zh smoke recovered.',
              '',
              `Run URL: ${process.env.RUN_URL}`,
              '',
              'Download artifacts:',
              `\`gh run download ${context.runId} --repo ${context.repo.owner}/${context.repo.repo} --name ${process.env.ARTIFACT_NAME}\``,
            ].join('\n');

            if (!issueNumber) {
              return;
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              body,
            });

            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              state: 'closed',
            });
