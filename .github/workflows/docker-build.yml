name: Build and Push Docker Images

on:
  push:
    branches: [main, master]
    paths-ignore:
      - 'docs/**'
      - 'output/**'
  workflow_dispatch:
    inputs:
      drill_fail_stage:
        description: 'Optional: intentionally fail deploy at a stage for summary drill (none|deploy|migrate|smoke)'
        required: false
        default: 'none'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Build and push backend
        run: |
          docker build -f Dockerfile.backend \
            -t ghcr.io/zensgit/metasheet2-backend:latest \
            -t ghcr.io/zensgit/metasheet2-backend:${{ github.sha }} \
            .
          docker push ghcr.io/zensgit/metasheet2-backend:latest
          docker push ghcr.io/zensgit/metasheet2-backend:${{ github.sha }}
      
      - name: Build and push frontend
        env:
          VITE_ENABLE_YJS_COLLAB: ${{ vars.VITE_ENABLE_YJS_COLLAB || 'false' }}
        run: |
          docker build -f Dockerfile.frontend \
            --build-arg VITE_ENABLE_YJS_COLLAB="${VITE_ENABLE_YJS_COLLAB}" \
            -t ghcr.io/zensgit/metasheet2-web:latest \
            -t ghcr.io/zensgit/metasheet2-web:${{ github.sha }} \
            .
          docker push ghcr.io/zensgit/metasheet2-web:latest
          docker push ghcr.io/zensgit/metasheet2-web:${{ github.sha }}
      
      - name: Set packages to private
        run: |
          gh api --method PATCH /user/packages/container/metasheet2-backend -f visibility=private || true
          gh api --method PATCH /user/packages/container/metasheet2-web -f visibility=private || true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  deploy:
    needs: build
    if: ${{ github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Sync deploy host files
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_SSH_KEY_B64: ${{ secrets.DEPLOY_SSH_KEY_B64 }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          printf '%s' "$DEPLOY_SSH_KEY_B64" | base64 -d > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh_opts="-o StrictHostKeyChecking=no -o IdentitiesOnly=yes -i ~/.ssh/deploy_key"
          DEPLOY_PATH="${DEPLOY_PATH:-metasheet2}"

          remote_repo_path="$(
            ssh $ssh_opts "$DEPLOY_USER@$DEPLOY_HOST" "DEPLOY_PATH='${DEPLOY_PATH}' bash -s" <<'EOF'
          set -euo pipefail
          if [[ "${DEPLOY_PATH}" == /* ]]; then
            DEPLOY_REPO_PATH="${DEPLOY_PATH}"
          elif [[ "${DEPLOY_PATH}" == ~/* ]]; then
            DEPLOY_REPO_PATH="${HOME}/${DEPLOY_PATH#~/}"
          else
            DEPLOY_REPO_PATH="${HOME}/${DEPLOY_PATH}"
          fi
          mkdir -p "${DEPLOY_REPO_PATH}"
          printf '%s' "${DEPLOY_REPO_PATH}"
          EOF
          )"

          echo "sync remote_repo_path=${remote_repo_path}"

          tar -czf - \
            docker-compose.app.yml \
            docker/nginx.conf \
            scripts/ops/attendance-preflight.sh \
          | ssh $ssh_opts "$DEPLOY_USER@$DEPLOY_HOST" \
              "set -euo pipefail; mkdir -p '${remote_repo_path}/docker' '${remote_repo_path}/scripts/ops'; tar -xzf - -C '${remote_repo_path}'"

      - name: Remote deploy (with preflight logs)
        id: remote_deploy
        continue-on-error: true
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_SSH_KEY_B64: ${{ secrets.DEPLOY_SSH_KEY_B64 }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          DEPLOY_COMPOSE_FILE: ${{ secrets.DEPLOY_COMPOSE_FILE }}
          DEPLOY_IMAGE_OWNER: zensgit
          DEPLOY_IMAGE_TAG: ${{ github.sha }}
          DEPLOY_JWT_SECRET: ${{ secrets.DEPLOY_JWT_SECRET || secrets.JWT_SECRET || '' }}
          DEPLOY_BCRYPT_SALT_ROUNDS: ${{ vars.DEPLOY_BCRYPT_SALT_ROUNDS || '12' }}
          ENABLE_YJS_COLLAB: ${{ vars.ENABLE_YJS_COLLAB || 'false' }}
          DRILL_FAIL_STAGE: ${{ github.event.inputs.drill_fail_stage || 'none' }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          printf '%s' "$DEPLOY_SSH_KEY_B64" | base64 -d > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh_opts="-o StrictHostKeyChecking=no -o IdentitiesOnly=yes -i ~/.ssh/deploy_key"
          DEPLOY_PATH="${DEPLOY_PATH:-metasheet2}"
          DEPLOY_COMPOSE_FILE="${DEPLOY_COMPOSE_FILE:-docker-compose.app.yml}"
          DEPLOY_IMAGE_OWNER="${DEPLOY_IMAGE_OWNER:-zensgit}"
          DEPLOY_IMAGE_TAG="${DEPLOY_IMAGE_TAG:-${GITHUB_SHA}}"
          DRILL_FAIL_STAGE="${DRILL_FAIL_STAGE:-none}"
          mkdir -p output/deploy
          deploy_log="output/deploy/deploy.log"
          remote_cmds=(
            "set -euo pipefail"
            "DEPLOY_PATH=\"${DEPLOY_PATH:-metasheet2}\""
            "DEPLOY_COMPOSE_FILE=\"${DEPLOY_COMPOSE_FILE:-docker-compose.app.yml}\""
            "DEPLOY_IMAGE_OWNER=\"${DEPLOY_IMAGE_OWNER:-zensgit}\""
            "DEPLOY_IMAGE_TAG=\"${DEPLOY_IMAGE_TAG:-${GITHUB_SHA}}\""
            "DEPLOY_JWT_SECRET=\"${DEPLOY_JWT_SECRET:-}\""
            "DEPLOY_BCRYPT_SALT_ROUNDS=\"${DEPLOY_BCRYPT_SALT_ROUNDS:-12}\""
            "ENABLE_YJS_COLLAB=\"${ENABLE_YJS_COLLAB:-false}\""
            "DRILL_FAIL_STAGE=\"${DRILL_FAIL_STAGE:-none}\""
            'if [[ "${DEPLOY_PATH}" == /* ]]; then'
            '  DEPLOY_REPO_PATH="${DEPLOY_PATH}"'
            'elif [[ "${DEPLOY_PATH}" == ~/* ]]; then'
            '  DEPLOY_REPO_PATH="${HOME}/${DEPLOY_PATH#~/}"'
            'else'
            '  DEPLOY_REPO_PATH="${HOME}/${DEPLOY_PATH}"'
            'fi'
            'if [[ ! -d "$DEPLOY_REPO_PATH" ]]; then'
            '  echo "[deploy][error] DEPLOY_PATH missing: ${DEPLOY_PATH} (resolved: ${DEPLOY_REPO_PATH})" >&2'
            '  echo "[deploy][error] pwd=$(pwd)" >&2'
            '  echo "[deploy][error] home=${HOME}" >&2'
            '  ls -la "${HOME}" >&2 || true'
            '  exit 1'
            'fi'
            'cd "$DEPLOY_REPO_PATH"'
            'echo "[deploy] repo_path=${DEPLOY_REPO_PATH}"'
            "# Keep host-mounted config (e.g. docker/nginx.conf) in sync with main."
            'if git rev-parse --is-inside-work-tree >/dev/null 2>&1; then'
            '  echo "[deploy] git sync=enabled"'
            '  git fetch origin main'
            '  git checkout main'
            '  git merge --ff-only origin/main'
            'else'
            '  echo "[deploy][warn] DEPLOY_PATH is not a git repo: ${DEPLOY_PATH} (resolved: ${DEPLOY_REPO_PATH}); continuing with synced files"'
            '  echo "[deploy][warn] pwd=$(pwd)"'
            '  ls -la || true'
            'fi'
            'if docker compose version >/dev/null 2>&1; then'
            '  COMPOSE_CMD="docker compose"'
            'elif command -v docker-compose >/dev/null 2>&1; then'
            '  echo "[deploy][error] legacy '\''docker-compose'\'' detected: $(docker-compose --version | head -n 1)" >&2'
            '  echo "[deploy][error] install Docker Compose v2 plugin so '\''docker compose'\'' is available" >&2'
            '  exit 125'
            'else'
            '  echo "[deploy][error] neither '\''docker compose'\'' nor '\''docker-compose'\'' is available" >&2'
            '  exit 125'
            'fi'
            'echo "[deploy] compose_cmd=${COMPOSE_CMD}"'
            'echo "[deploy] image_owner=${DEPLOY_IMAGE_OWNER}"'
            'echo "[deploy] image_tag=${DEPLOY_IMAGE_TAG}"'
            'ENV_FILE_PATH="docker/app.env"'
            'if [[ -f "${ENV_FILE_PATH}" ]]; then'
            '  database_url_line="$(grep -E "^DATABASE_URL=" "${ENV_FILE_PATH}" | tail -n 1 || true)"'
            '  database_url="${database_url_line#DATABASE_URL=}"'
            '  database_url="${database_url%\"}"'
            '  database_url="${database_url#\"}"'
            '  python3 - "${ENV_FILE_PATH}" "${DEPLOY_JWT_SECRET:-}" "${DEPLOY_BCRYPT_SALT_ROUNDS:-12}" "${database_url}" "${ENABLE_YJS_COLLAB:-false}" <<'\''PY'\'''
            'from pathlib import Path'
            'import sys'
            'path = Path(sys.argv[1])'
            'deploy_jwt_secret = sys.argv[2].strip()'
            'deploy_bcrypt_rounds = sys.argv[3].strip() or "12"'
            'database_url = sys.argv[4]'
            'enable_yjs_collab = (sys.argv[5].strip().lower() or "false")'
            'if enable_yjs_collab not in ("true", "false"):'
            '    enable_yjs_collab = "false"'
            'text = path.read_text()'
            'if "\\n" in text:'
            '    text = text.replace("\\n", "\n")'
            'lines = text.splitlines()'
            'entries = {}'
            'order = []'
            'for line in lines:'
            '    if "=" in line and not line.lstrip().startswith("#"):'
            '        key, value = line.split("=", 1)'
            '        if key not in entries:'
            '            order.append(key)'
            '        entries[key] = value'
            'updated = []'
            'local_postgres = any(token in database_url for token in ("@postgres:", "@127.0.0.1:", "@localhost:"))'
            'if local_postgres:'
            '    entries["DB_SSL"] = "false"'
            '    if "DB_SSL" not in order:'
            '        order.append("DB_SSL")'
            'if not entries.get("JWT_SECRET") and deploy_jwt_secret:'
            '    entries["JWT_SECRET"] = deploy_jwt_secret'
            '    if "JWT_SECRET" not in order:'
            '        order.append("JWT_SECRET")'
            'if not entries.get("JWT_SECRET"):'
            '    import secrets'
            '    entries["JWT_SECRET"] = secrets.token_hex(32)'
            '    generated_jwt_secret = True'
            '    if "JWT_SECRET" not in order:'
            '        order.append("JWT_SECRET")'
            'if not entries.get("BCRYPT_SALT_ROUNDS"):'
            '    entries["BCRYPT_SALT_ROUNDS"] = deploy_bcrypt_rounds'
            '    if "BCRYPT_SALT_ROUNDS" not in order:'
            '        order.append("BCRYPT_SALT_ROUNDS")'
            'entries["ENABLE_YJS_COLLAB"] = enable_yjs_collab'
            'if "ENABLE_YJS_COLLAB" not in order:'
            '    order.append("ENABLE_YJS_COLLAB")'
            'seen = set()'
            'for line in lines:'
            '    if "=" in line and not line.lstrip().startswith("#"):'
            '        key = line.split("=", 1)[0]'
            '        if key in seen:'
            '            continue'
            '        seen.add(key)'
            '        updated.append(f"{key}={entries[key]}")'
            '    else:'
            '        updated.append(line)'
            'for key in order:'
            '    if key not in seen:'
            '        updated.append(f"{key}={entries[key]}")'
            'path.write_text("\n".join(updated) + "\n")'
            'PY'
            '  if [[ "${database_url}" == *"@postgres:"* || "${database_url}" == *"@127.0.0.1:"* || "${database_url}" == *"@localhost:"* ]]; then'
            '    echo "[deploy] local-postgres detected; forcing DB_SSL=false in ${ENV_FILE_PATH}"'
            '  fi'
            '  if grep -qE "^JWT_SECRET=" "${ENV_FILE_PATH}"; then'
            '    echo "[deploy] JWT_SECRET present in ${ENV_FILE_PATH}"'
            '  elif [[ -n "${DEPLOY_JWT_SECRET:-}" ]]; then'
            '    echo "[deploy] JWT_SECRET injected into ${ENV_FILE_PATH}"'
            '  else'
            '    echo "[deploy] JWT_SECRET generated and persisted in ${ENV_FILE_PATH}"'
            '  fi'
            '  if grep -qE "^BCRYPT_SALT_ROUNDS=" "${ENV_FILE_PATH}"; then'
            '    echo "[deploy] BCRYPT_SALT_ROUNDS present in ${ENV_FILE_PATH}"'
            '  fi'
            '  if grep -qE "^ENABLE_YJS_COLLAB=true$" "${ENV_FILE_PATH}"; then'
            '    echo "[deploy] ENABLE_YJS_COLLAB=true in ${ENV_FILE_PATH}"'
            '  else'
            '    echo "[deploy] ENABLE_YJS_COLLAB=false in ${ENV_FILE_PATH}"'
            '  fi'
            'fi'
            'COMPOSE_ENV_FILE=".env"'
            'python3 - "${COMPOSE_ENV_FILE}" "${DEPLOY_IMAGE_OWNER}" "${DEPLOY_IMAGE_TAG}" <<'\''PY'\'''
            'from pathlib import Path'
            'import sys'
            'path = Path(sys.argv[1])'
            'image_owner = sys.argv[2].strip() or "zensgit"'
            'image_tag = sys.argv[3].strip()'
            'lines = path.read_text().splitlines() if path.exists() else []'
            'entries = {}'
            'order = []'
            'for line in lines:'
            '    if "=" in line and not line.lstrip().startswith("#"):'
            '        key, value = line.split("=", 1)'
            '        if key not in entries:'
            '            order.append(key)'
            '        entries[key] = value'
            'entries["IMAGE_OWNER"] = image_owner'
            'if "IMAGE_OWNER" not in order:'
            '    order.append("IMAGE_OWNER")'
            'entries["IMAGE_TAG"] = image_tag'
            'if "IMAGE_TAG" not in order:'
            '    order.append("IMAGE_TAG")'
            'updated = []'
            'seen = set()'
            'for line in lines:'
            '    if "=" in line and not line.lstrip().startswith("#"):'
            '        key = line.split("=", 1)[0]'
            '        if key in seen:'
            '            continue'
            '        seen.add(key)'
            '        updated.append(f"{key}={entries[key]}")'
            '    else:'
            '        updated.append(line)'
            'for key in order:'
            '    if key not in seen:'
            '        updated.append(f"{key}={entries[key]}")'
            'path.write_text("\n".join(updated) + "\n")'
            'PY'
            'echo "[deploy] persisted IMAGE_OWNER and IMAGE_TAG in ${COMPOSE_ENV_FILE}"'
            "# Preflight: validate production env/compose/nginx before (re)deploying containers."
            "echo \"=== ATTENDANCE PREFLIGHT START ===\""
            "preflight_rc=0"
            "set +e"
            "COMPOSE_FILE=\"${DEPLOY_COMPOSE_FILE}\" ENV_FILE=\"docker/app.env\" NGINX_CONF=\"docker/nginx.conf\" scripts/ops/attendance-preflight.sh"
            'preflight_rc=$?'
            "set -e"
            "echo \"=== ATTENDANCE PREFLIGHT END ===\""
            'if [[ "$preflight_rc" != "0" ]]; then exit "$preflight_rc"; fi'
            'for CONTAINER_NAME in metasheet-postgres metasheet-redis metasheet-backend metasheet-web; do'
            '  if docker ps -a --format "{{.Names}}" | grep -Fxq "${CONTAINER_NAME}"; then'
            '    echo "[deploy][warn] removing existing container ${CONTAINER_NAME} before recreate"'
            '    docker rm -f "${CONTAINER_NAME}"'
            '  fi'
            'done'
            'orphan_names="$(docker ps -a --format "{{.Names}}" | grep -E "^[a-f0-9]+_metasheet-(postgres|redis|backend|web)$" || true)"'
            'if [[ -n "${orphan_names}" ]]; then'
            '  echo "[deploy][warn] removing hashed legacy metasheet containers before recreate"'
            '  while IFS= read -r orphan_name; do'
            '    [[ -n "${orphan_name}" ]] || continue'
            '    echo "[deploy][warn] removing orphan container ${orphan_name}"'
            '    docker rm -f "${orphan_name}"'
            '  done <<< "${orphan_names}"'
            'fi'
            "echo \"=== DEPLOY START ===\""
            'if [[ "${DRILL_FAIL_STAGE:-none}" == "deploy" ]]; then echo "[deploy][drill] intentional failure at deploy stage"; exit 91; fi'
            'eval "IMAGE_OWNER=\"${DEPLOY_IMAGE_OWNER}\" IMAGE_TAG=\"${DEPLOY_IMAGE_TAG}\" ${COMPOSE_CMD} -f \"${DEPLOY_COMPOSE_FILE}\" up -d postgres redis"'
            'eval "IMAGE_OWNER=\"${DEPLOY_IMAGE_OWNER}\" IMAGE_TAG=\"${DEPLOY_IMAGE_TAG}\" ${COMPOSE_CMD} -f \"${DEPLOY_COMPOSE_FILE}\" pull backend web"'
            'eval "IMAGE_OWNER=\"${DEPLOY_IMAGE_OWNER}\" IMAGE_TAG=\"${DEPLOY_IMAGE_TAG}\" ${COMPOSE_CMD} -f \"${DEPLOY_COMPOSE_FILE}\" up -d --no-deps --force-recreate backend web"'
            "echo \"=== DEPLOY END ===\""
            "# Ensure DB schema is up to date before smoke checks."
            "echo \"=== MIGRATE START ===\""
            'if [[ "${DRILL_FAIL_STAGE:-none}" == "migrate" ]]; then echo "[deploy][drill] intentional failure at migrate stage"; exit 92; fi'
            "# Important: redirect stdin so docker compose exec can't consume the rest of this bash -s script."
            'eval "${COMPOSE_CMD} -f \"${DEPLOY_COMPOSE_FILE}\" exec -T backend node packages/core-backend/dist/src/db/migrate.js < /dev/null"'
            "echo \"=== MIGRATE END ===\""
            "# Post-deploy smoke checks"
            "echo \"=== SMOKE START ===\""
            'if [[ "${DRILL_FAIL_STAGE:-none}" == "smoke" ]]; then echo "[deploy][drill] intentional failure at smoke stage"; exit 93; fi'
            "for i in {1..10}; do"
              "  if curl -fsS http://127.0.0.1:8900/api/plugins >/dev/null; then"
            "    break"
            "  fi"
            "  sleep 3"
            "done"
            "curl -fsS http://127.0.0.1:8900/api/plugins >/dev/null"
            "curl -fsS http://127.0.0.1:8900/health >/dev/null"
            "curl -fsS http://127.0.0.1:8081 >/dev/null"
            "echo \"Smoke: api/plugins=ok health=ok web=ok\""
            "echo \"=== SMOKE END ===\""
          )
          set +e
          printf '%s\n' "${remote_cmds[@]}" | ssh $ssh_opts "$DEPLOY_USER@$DEPLOY_HOST" bash -s 2>&1 | tee "$deploy_log"
          rc=${PIPESTATUS[1]}
          set -e
          echo "deploy_rc=$rc" >> "$GITHUB_OUTPUT"
          echo "deploy_log=$deploy_log" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Resolve K3 WISE smoke token
        if: ${{ steps.remote_deploy.outputs.deploy_rc == '0' }}
        env:
          METASHEET_K3WISE_SMOKE_TOKEN_SECRET: ${{ secrets.METASHEET_K3WISE_SMOKE_TOKEN }}
          METASHEET_TENANT_ID: ${{ vars.METASHEET_TENANT_ID || '' }}
          K3_WISE_TOKEN_RESOLVE_REQUIRED: 'false'
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_SSH_KEY_B64: ${{ secrets.DEPLOY_SSH_KEY_B64 }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          DEPLOY_COMPOSE_FILE: ${{ secrets.DEPLOY_COMPOSE_FILE }}
        run: scripts/ops/resolve-k3wise-smoke-token.sh

      - name: K3 WISE postdeploy smoke
        if: ${{ steps.remote_deploy.outputs.deploy_rc == '0' }}
        env:
          METASHEET_BASE_URL: ${{ vars.METASHEET_BASE_URL || vars.PUBLIC_APP_URL || 'http://142.171.239.56:8081' }}
          METASHEET_TENANT_ID: ${{ vars.METASHEET_TENANT_ID || '' }}
        run: |
          set -euo pipefail
          smoke_out_dir="output/deploy/k3wise-postdeploy-smoke"
          rm -rf "$smoke_out_dir"
          args=(
            --base-url "$METASHEET_BASE_URL"
            --out-dir "$smoke_out_dir"
          )
          if [[ -n "${METASHEET_TENANT_ID:-}" ]]; then
            args+=(--tenant-id "$METASHEET_TENANT_ID")
          fi
          if [[ -n "${K3_WISE_SMOKE_TOKEN:-}" ]]; then
            export METASHEET_AUTH_TOKEN="$K3_WISE_SMOKE_TOKEN"
          fi
          node scripts/ops/integration-k3wise-postdeploy-smoke.mjs "${args[@]}"

      - name: Write deploy summary (preflight + runbooks)
        if: always()
        env:
          DEPLOY_RC: ${{ steps.remote_deploy.outputs.deploy_rc }}
          DRILL_FAIL_STAGE: ${{ github.event.inputs.drill_fail_stage || 'none' }}
        run: |
          set -euo pipefail
          deploy_log="output/deploy/deploy.log"
          repo_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}"
          artifact_name="deploy-logs-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"

          preflight_status="UNKNOWN"
          overall="UNKNOWN"
          if [[ -n "${DEPLOY_RC:-}" ]]; then
            overall="PASS"
            if [[ "${DEPLOY_RC}" != "0" ]]; then
              overall="FAIL"
            fi
          fi

          rc_meaning="unknown"
          case "${DEPLOY_RC:-}" in
            "")
              rc_meaning="missing"
              ;;
            0)
              rc_meaning="success"
              ;;
            91)
              rc_meaning="drill: deploy stage (intentional)"
              ;;
            92)
              rc_meaning="drill: migrate stage (intentional)"
              ;;
            93)
              rc_meaning="drill: smoke stage (intentional)"
              ;;
            *)
              rc_meaning="remote failure (see stages/logs)"
              ;;
          esac

          echo "## Deploy (Remote)" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- Overall: **${overall}**" >> "$GITHUB_STEP_SUMMARY"
          echo "- Remote exit code: \`${DEPLOY_RC:-missing}\` (meaning: ${rc_meaning})" >> "$GITHUB_STEP_SUMMARY"
          echo "- Drill fail stage: \`${DRILL_FAIL_STAGE:-none}\`" >> "$GITHUB_STEP_SUMMARY"
          if [[ "${DRILL_FAIL_STAGE:-none}" != "none" ]]; then
            echo "  - Note: this is a drill run; deploy is expected to fail by design." >> "$GITHUB_STEP_SUMMARY"
          fi
          echo "" >> "$GITHUB_STEP_SUMMARY"

          echo "### Remote Preflight" >> "$GITHUB_STEP_SUMMARY"

          if [[ ! -f "$deploy_log" ]]; then
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "- Status: **UNKNOWN** (deploy.log missing)" >> "$GITHUB_STEP_SUMMARY"
          else
            preflight_block="$(
              awk '
                /^=== ATTENDANCE PREFLIGHT START ===$/ { printing=1; next }
                /^=== ATTENDANCE PREFLIGHT END ===$/ { printing=0 }
                printing { print }
              ' "$deploy_log" | head -n 120
            )"

            if [[ -z "${preflight_block}" ]]; then
              echo "" >> "$GITHUB_STEP_SUMMARY"
              echo "- Status: **UNKNOWN** (markers missing, see deploy.log artifact)" >> "$GITHUB_STEP_SUMMARY"
              echo "" >> "$GITHUB_STEP_SUMMARY"
              echo "Last 80 log lines:" >> "$GITHUB_STEP_SUMMARY"
              echo '```' >> "$GITHUB_STEP_SUMMARY"
              tail -n 80 "$deploy_log" >> "$GITHUB_STEP_SUMMARY" || true
              echo '```' >> "$GITHUB_STEP_SUMMARY"
            else
              if echo "$preflight_block" | grep -q "Preflight OK"; then
                preflight_status="PASS"
              elif echo "$preflight_block" | grep -q "\\[attendance-preflight\\] ERROR:"; then
                preflight_status="FAIL"
              fi
              echo "" >> "$GITHUB_STEP_SUMMARY"
              echo "- Status: **${preflight_status}**" >> "$GITHUB_STEP_SUMMARY"
              echo "" >> "$GITHUB_STEP_SUMMARY"
              echo '```' >> "$GITHUB_STEP_SUMMARY"
              echo "$preflight_block" >> "$GITHUB_STEP_SUMMARY"
              echo '```' >> "$GITHUB_STEP_SUMMARY"

              if [[ "${overall}" == "FAIL" && "${preflight_status}" == "PASS" ]]; then
                echo "" >> "$GITHUB_STEP_SUMMARY"
                echo "- Note: preflight passed; failure happened after preflight (deploy/migrate/smoke). See \`${artifact_name}\`." >> "$GITHUB_STEP_SUMMARY"
              fi
            fi
          fi

          if [[ -f "$deploy_log" ]]; then
            has() { grep -qF "$1" "$deploy_log"; }
            extract_block() {
              local start="$1"
              local end="$2"
              local max_lines="$3"
              awk -v start="$start" -v end="$end" '
                $0 == start { printing=1; next }
                $0 == end { printing=0 }
                printing { print }
              ' "$deploy_log" | head -n "$max_lines"
            }

            deploy_stage="UNKNOWN"
            deploy_reason="start marker missing"
            if has "=== DEPLOY START ==="; then
              deploy_stage="FAIL"
              deploy_reason="start marker present; end marker missing"
              if has "=== DEPLOY END ==="; then
                deploy_stage="PASS"
                deploy_reason="start+end markers present"
              fi
            fi

            migrate_stage="UNKNOWN"
            migrate_reason="start marker missing"
            if has "=== MIGRATE START ==="; then
              migrate_stage="FAIL"
              migrate_reason="start marker present; end marker missing"
              if has "=== MIGRATE END ==="; then
                migrate_stage="PASS"
                migrate_reason="start+end markers present"
              fi
            fi

            smoke_stage="UNKNOWN"
            smoke_reason="start marker missing"
            if has "=== SMOKE START ==="; then
              smoke_stage="FAIL"
              smoke_reason="start marker present; end marker missing; success line missing"
              has_smoke_end="false"
              if has "=== SMOKE END ==="; then
                has_smoke_end="true"
              fi
              if grep -q "Smoke: api/plugins=ok health=ok web=ok" "$deploy_log" && [[ "$has_smoke_end" == "true" ]]; then
                smoke_stage="PASS"
                smoke_reason="end marker present; success line present"
              elif grep -q "Smoke: api/plugins=ok health=ok web=ok" "$deploy_log" && [[ "$has_smoke_end" != "true" ]]; then
                smoke_reason="success line present; end marker missing (log truncated or script changed)"
              elif [[ "$has_smoke_end" == "true" ]]; then
                smoke_stage="UNKNOWN"
                smoke_reason="end marker present; success line missing/changed"
              fi
            fi

            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "### Remote Stages" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "- Deploy: **${deploy_stage}** (${deploy_reason})" >> "$GITHUB_STEP_SUMMARY"
            echo "- Migrate: **${migrate_stage}** (${migrate_reason})" >> "$GITHUB_STEP_SUMMARY"
            echo "- Smoke: **${smoke_stage}** (${smoke_reason})" >> "$GITHUB_STEP_SUMMARY"

            if [[ "${deploy_stage}" != "PASS" && "${deploy_stage}" != "UNKNOWN" ]]; then
              # Deploy failures often contain the most actionable error message near the end.
              deploy_block="$(
                awk '
                  $0 == "=== DEPLOY START ===" { printing=1; next }
                  printing { print }
                ' "$deploy_log" | tail -n 80
              )"
              if [[ -n "${deploy_block}" ]]; then
                echo "" >> "$GITHUB_STEP_SUMMARY"
                echo "### Deploy Output (tail)" >> "$GITHUB_STEP_SUMMARY"
                echo "" >> "$GITHUB_STEP_SUMMARY"
                echo '```' >> "$GITHUB_STEP_SUMMARY"
                echo "$deploy_block" >> "$GITHUB_STEP_SUMMARY"
                echo '```' >> "$GITHUB_STEP_SUMMARY"
              fi
            fi

            if [[ "${migrate_stage}" != "PASS" && "${migrate_stage}" != "UNKNOWN" ]]; then
              migrate_block="$(extract_block "=== MIGRATE START ===" "=== MIGRATE END ===" 80 || true)"
              if [[ -n "${migrate_block}" ]]; then
                echo "" >> "$GITHUB_STEP_SUMMARY"
                echo "### Migrate Output (tail)" >> "$GITHUB_STEP_SUMMARY"
                echo "" >> "$GITHUB_STEP_SUMMARY"
                echo '```' >> "$GITHUB_STEP_SUMMARY"
                echo "$migrate_block" >> "$GITHUB_STEP_SUMMARY"
                echo '```' >> "$GITHUB_STEP_SUMMARY"
              fi
            fi

            if [[ "${smoke_stage}" != "PASS" && "${smoke_stage}" != "UNKNOWN" ]]; then
              smoke_block="$(extract_block "=== SMOKE START ===" "=== SMOKE END ===" 80 || true)"
              if [[ -n "${smoke_block}" ]]; then
                echo "" >> "$GITHUB_STEP_SUMMARY"
                echo "### Smoke Output (tail)" >> "$GITHUB_STEP_SUMMARY"
                echo "" >> "$GITHUB_STEP_SUMMARY"
                echo '```' >> "$GITHUB_STEP_SUMMARY"
                echo "$smoke_block" >> "$GITHUB_STEP_SUMMARY"
                echo '```' >> "$GITHUB_STEP_SUMMARY"
              fi
            fi
          fi

          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### K3 WISE Postdeploy Smoke" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          k3_smoke_json="output/deploy/k3wise-postdeploy-smoke/integration-k3wise-postdeploy-smoke.json"
          node scripts/ops/integration-k3wise-postdeploy-summary.mjs \
            --input "$k3_smoke_json" \
            --missing-ok >> "$GITHUB_STEP_SUMMARY"

          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Artifacts" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- Deploy logs artifact: \`${artifact_name}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- K3 WISE smoke evidence: \`output/deploy/k3wise-postdeploy-smoke/\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Local evidence path (after download): \`output/playwright/ga/${GITHUB_RUN_ID}/deploy.log\`" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Download:" >> "$GITHUB_STEP_SUMMARY"
          echo '```bash' >> "$GITHUB_STEP_SUMMARY"
          echo "gh run download ${GITHUB_RUN_ID} -n \"${artifact_name}\" -D \"output/playwright/ga/${GITHUB_RUN_ID}\"" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Runbooks" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- Upload channel troubleshooting: ${repo_url}/blob/main/docs/attendance-production-import-upload-channel-20260212.md" >> "$GITHUB_STEP_SUMMARY"
          echo "- Production delivery checklist: ${repo_url}/blob/main/docs/attendance-production-delivery-20260207.md" >> "$GITHUB_STEP_SUMMARY"

          # Archive step summary alongside deploy.log for offline audit/review.
          mkdir -p output/deploy
          cp "$GITHUB_STEP_SUMMARY" output/deploy/step-summary.md

      - name: Upload deploy artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: deploy-logs-${{ github.run_id }}-${{ github.run_attempt }}
          retention-days: 14
          path: |
            output/deploy/**

      - name: Fail when remote deploy failed
        if: always()
        run: |
          rc="${{ steps.remote_deploy.outputs.deploy_rc }}"
          if [[ -z "$rc" ]]; then
            echo "deploy_rc missing; failing deploy job." >&2
            exit 1
          fi
          if [[ "$rc" != "0" ]]; then
            echo "Remote deploy failed: rc=$rc" >&2
            exit 1
          fi
