name: Yjs Staging Validation

# Manual-dispatch only. Hits a live staging server with an admin token.
# Never runs on push / PR — would require secrets + a running /yjs namespace.
# Use this to verify the Yjs stack end-to-end against staging after a
# backend/infra change, or as a periodic health check.

on:
  workflow_dispatch:
    inputs:
      base_url:
        description: 'Yjs base URL (backend, not reverse-proxy)'
        required: true
        default: 'http://142.171.239.56:8081'
      record_id:
        description: 'Record ID with a fld_pilot_title text field to edit'
        required: true
      field_id:
        description: 'Field ID to edit (must be text type)'
        required: false
        default: 'fld_pilot_title'
      run_twice:
        description: 'Run twice to validate warm-doc path (catches stale-observer class bugs)'
        required: false
        default: 'true'

jobs:
  validate:
    name: Yjs End-to-End Validation
    runs-on: ubuntu-latest
    env:
      YJS_BASE_URL: ${{ inputs.base_url }}
      RECORD_ID: ${{ inputs.record_id }}
      FIELD_ID: ${{ inputs.field_id }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve admin token
        env:
          YJS_ADMIN_TOKEN_SECRET: ${{ secrets.YJS_ADMIN_TOKEN }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_SSH_KEY_B64: ${{ secrets.DEPLOY_SSH_KEY_B64 }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          DEPLOY_COMPOSE_FILE: ${{ secrets.DEPLOY_COMPOSE_FILE }}
        run: |
          set -euo pipefail

          if [[ -n "${YJS_ADMIN_TOKEN_SECRET:-}" ]]; then
            echo "::add-mask::${YJS_ADMIN_TOKEN_SECRET}"
            {
              echo 'YJS_TOKEN<<EOF'
              echo "${YJS_ADMIN_TOKEN_SECRET}"
              echo 'EOF'
            } >> "$GITHUB_ENV"
            echo "Using YJS_ADMIN_TOKEN secret"
            exit 0
          fi

          if [[ -z "${DEPLOY_HOST:-}" || -z "${DEPLOY_USER:-}" || -z "${DEPLOY_SSH_KEY_B64:-}" ]]; then
            echo "::error::YJS_ADMIN_TOKEN is not set and DEPLOY_HOST/DEPLOY_USER/DEPLOY_SSH_KEY_B64 are incomplete"
            exit 1
          fi

          mkdir -p ~/.ssh
          printf '%s' "$DEPLOY_SSH_KEY_B64" | base64 -d > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh_opts="-o StrictHostKeyChecking=no -o IdentitiesOnly=yes -i ~/.ssh/deploy_key"
          DEPLOY_PATH="${DEPLOY_PATH:-metasheet2}"

          token="$(
            ssh $ssh_opts "$DEPLOY_USER@$DEPLOY_HOST" "DEPLOY_PATH='${DEPLOY_PATH}' DEPLOY_COMPOSE_FILE='${DEPLOY_COMPOSE_FILE:-docker-compose.app.yml}' bash -s" <<'EOF'
          set -euo pipefail
          if [[ "${DEPLOY_PATH}" == /* ]]; then
            DEPLOY_REPO_PATH="${DEPLOY_PATH}"
          elif [[ "${DEPLOY_PATH}" == ~/* ]]; then
            DEPLOY_REPO_PATH="${HOME}/${DEPLOY_PATH#~/}"
          else
            DEPLOY_REPO_PATH="${HOME}/${DEPLOY_PATH}"
          fi
          cd "${DEPLOY_REPO_PATH}"
          if docker compose version >/dev/null 2>&1; then
            COMPOSE_CMD=(docker compose)
          elif command -v docker-compose >/dev/null 2>&1; then
            COMPOSE_CMD=(docker-compose)
          else
            echo "docker compose is not available" >&2
            exit 125
          fi
          "${COMPOSE_CMD[@]}" -f "${DEPLOY_COMPOSE_FILE:-docker-compose.app.yml}" exec -T backend node --input-type=module - <<'NODE' | awk '/^[A-Za-z0-9_-]+\.[A-Za-z0-9_-]+\.[A-Za-z0-9_-]+$/ { token = $0 } END { if (token) print token }'
          import pg from 'pg'
          import { authService } from '/app/packages/core-backend/dist/src/auth/AuthService.js'

          const { Client } = pg
          const databaseUrl = process.env.DATABASE_URL
          if (!databaseUrl) {
            console.error('DATABASE_URL missing from backend runtime env')
            process.exit(2)
          }

          const client = new Client({
            connectionString: databaseUrl,
            ssl: process.env.DB_SSL === 'true' ? { rejectUnauthorized: false } : false,
          })

          try {
            await client.connect()
            const result = await client.query(`
              SELECT
                u.id,
                u.email,
                u.username,
                u.name,
                u.mobile,
                u.role,
                u.permissions,
                u.is_active,
                u.must_change_password,
                (ur.user_id IS NOT NULL) AS has_rbac_admin
              FROM users u
              LEFT JOIN user_roles ur ON ur.user_id = u.id AND ur.role_id = 'admin'
              WHERE COALESCE(u.is_active, true) = true
                AND COALESCE(u.must_change_password, false) = false
                AND (u.role = 'admin' OR ur.user_id IS NOT NULL)
              ORDER BY
                CASE WHEN ur.user_id IS NOT NULL THEN 0 ELSE 1 END,
                CASE WHEN u.id = 'admin' THEN 0 ELSE 1 END,
                u.created_at ASC
              LIMIT 1
            `)
            const row = result.rows[0]
            if (!row) {
              console.error('No active admin user found for Yjs validation token')
              process.exit(3)
            }

            if (!row.has_rbac_admin) {
              await client.query("INSERT INTO roles (id, name) VALUES ('admin', 'Admin') ON CONFLICT (id) DO NOTHING")
              await client.query(
                "INSERT INTO user_roles (user_id, role_id) VALUES ($1, 'admin') ON CONFLICT DO NOTHING",
                [row.id],
              )
            }

            const token = authService.createToken({
              id: String(row.id),
              email: typeof row.email === 'string' ? row.email : '',
              username: row.username ?? null,
              name: typeof row.name === 'string' && row.name.trim() ? row.name : 'Yjs Validation Admin',
              mobile: row.mobile ?? null,
              role: typeof row.role === 'string' && row.role.trim() ? row.role : 'admin',
              permissions: Array.isArray(row.permissions) ? row.permissions : [],
              is_active: row.is_active,
              must_change_password: row.must_change_password,
              created_at: new Date(),
              updated_at: new Date(),
            })
            console.log(token)
          } finally {
            await client.end().catch(() => {})
          }
          NODE
          EOF
          )"

          if [[ -z "${token:-}" ]]; then
            echo "::error::failed to mint Yjs admin token from deploy host"
            exit 1
          fi

          echo "::add-mask::${token}"
          {
            echo 'YJS_TOKEN<<EOF'
            echo "${token}"
            echo 'EOF'
          } >> "$GITHUB_ENV"
          echo "Minted temporary Yjs admin token from deploy host"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install deps (core-backend only)
        working-directory: packages/core-backend
        run: pnpm install --frozen-lockfile --filter @metasheet/core-backend...

      - name: Sanity — is Yjs even enabled?
        run: |
          if [ -z "$YJS_TOKEN" ]; then
            echo "::error::YJS_TOKEN could not be resolved from YJS_ADMIN_TOKEN or deploy host"
            exit 1
          fi
          # Use repo's pinned status script so alerts + formatting stay consistent.
          node scripts/ops/check-yjs-rollout-status.mjs \
            --base-url "$YJS_BASE_URL" \
            --token "$YJS_TOKEN"

      - name: Run A — cold start validation
        id: run_a
        working-directory: packages/core-backend
        run: |
          node scripts/ops/yjs-node-client.mjs 2>&1 | tee run-a.log
          # Script exits 0 on all-green, 2 on check-failure
          status=${PIPESTATUS[0]}
          echo "exit_code=$status" >> "$GITHUB_OUTPUT"
          exit $status

      - name: Run B — warm-doc validation (stale-observer regression)
        if: ${{ inputs.run_twice == 'true' }}
        working-directory: packages/core-backend
        run: |
          # Give the server a moment to settle, but stay within the
          # 60s idle-release threshold so the Y.Doc is still warm.
          sleep 5
          node scripts/ops/yjs-node-client.mjs 2>&1 | tee run-b.log
          exit ${PIPESTATUS[0]}

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: yjs-validation-logs-${{ github.run_id }}
          path: |
            packages/core-backend/run-a.log
            packages/core-backend/run-b.log
          retention-days: 30
          if-no-files-found: warn
