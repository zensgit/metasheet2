name: Phase 5 Nightly Validation (External Metrics)

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      metrics_url:
        description: 'Override metrics URL'
        required: false

jobs:
  nightly:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Probe metrics URL
        id: probe
        shell: bash
        env:
          METRICS_URL_INPUT: ${{ inputs.metrics_url }}
          METRICS_URL_SECRET: ${{ secrets.METRICS_URL }}
          METRICS_AUTH_HEADER_SECRET: ${{ secrets.METRICS_AUTH_HEADER }}
          METASHEET_BASE_URL: ${{ vars.METASHEET_BASE_URL || vars.PUBLIC_APP_URL || vars.ATTENDANCE_WEB_BASE_URL || '' }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_SSH_KEY_B64: ${{ secrets.DEPLOY_SSH_KEY_B64 }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          DEPLOY_COMPOSE_FILE: ${{ secrets.DEPLOY_COMPOSE_FILE }}
        run: |
          URL_SOURCE=""
          if [ -n "${METRICS_URL_INPUT}" ]; then
            METRICS_URL="$METRICS_URL_INPUT"
            URL_SOURCE="input"
          elif [ -n "${METRICS_URL_SECRET}" ]; then
            METRICS_URL="$METRICS_URL_SECRET"
            URL_SOURCE="secret"
          elif [ -n "${METASHEET_BASE_URL}" ]; then
            METRICS_URL="${METASHEET_BASE_URL%/}/api/metrics/prom"
            URL_SOURCE="metasheet_base_url"
          else
            METRICS_URL=""
          fi

          if [ -z "${METRICS_URL}" ]; then
            echo "metrics_url=" >> "$GITHUB_OUTPUT"
            echo "No METRICS_URL configured; skipping." && exit 0
          fi

          AUTH_HEADER="$METRICS_AUTH_HEADER_SECRET"
          if [ -z "$AUTH_HEADER" ] && [ "$URL_SOURCE" = "metasheet_base_url" ]; then
            token_fallback_log="/tmp/phase5-metrics-token-fallback.log"
            set +e
            metrics_token="$(METRICS_SCRAPE_TOKEN_RESOLVE_REQUIRED=false bash scripts/ops/resolve-metrics-scrape-token.sh 2> >(tee "$token_fallback_log" >&2))"
            token_resolve_status=$?
            set -e
            if [ "$token_resolve_status" -ne 0 ]; then
              echo "::warning::deploy-host metrics token fallback failed (exit $token_resolve_status); metrics probe will continue without derived auth"
            elif [ -n "$metrics_token" ]; then
              echo "::add-mask::$metrics_token"
              AUTH_HEADER="Authorization: Bearer $metrics_token"
            fi
          fi
          CURL_ARGS=(-sSf -m 5)
          if [ -n "$AUTH_HEADER" ]; then
            echo "::add-mask::$AUTH_HEADER"
            echo "METRICS_AUTH_HEADER=$AUTH_HEADER" >> "$GITHUB_ENV"
            CURL_ARGS+=(-H "$AUTH_HEADER")
          fi

          if curl "${CURL_ARGS[@]}" "${METRICS_URL}" >/dev/null; then
            echo "metrics_url=${METRICS_URL}" >> "$GITHUB_OUTPUT"
          else
            echo "metrics_url=" >> "$GITHUB_OUTPUT"
            echo "Metrics endpoint unreachable; skipping."
          fi

      - name: Setup Node
        if: steps.probe.outputs.metrics_url != ''
        uses: actions/setup-node@v4
        with:
          node-version: '18.x'

      - name: Enable corepack and install pnpm
        if: steps.probe.outputs.metrics_url != ''
        run: |
          corepack enable
          corepack prepare pnpm@10.16.1 --activate

      - name: Install dependencies
        if: steps.probe.outputs.metrics_url != ''
        run: pnpm install --frozen-lockfile

      - name: Run validation against external metrics
        if: steps.probe.outputs.metrics_url != ''
        env:
          METRICS_URL: ${{ steps.probe.outputs.metrics_url }}
        run: |
          chmod +x scripts/phase5-full-validate.sh || true
          ./scripts/phase5-full-validate.sh -o /tmp/phase5.json "${METRICS_URL}" || true
          ./scripts/phase5-generate-report.sh /tmp/phase5.json /tmp/phase5.md || true

      - name: Upload artifacts
        if: steps.probe.outputs.metrics_url != ''
        uses: actions/upload-artifact@v4
        with:
          name: phase5-nightly
          path: |
            /tmp/phase5.json
            /tmp/phase5.md

      - name: Gate on PASS
        if: steps.probe.outputs.metrics_url != ''
        run: |
          if command -v jq >/dev/null 2>&1; then
            STATUS=$(jq -r '.summary.overall_status // "unknown"' /tmp/phase5.json)
          else
            STATUS="unknown"
          fi
          echo "overall_status=${STATUS}"
          if [ "${STATUS}" != "pass" ]; then
            echo "Phase 5 validation failed" && exit 1
          fi

      - name: Notify Slack on failure
        if: failure() && steps.probe.outputs.metrics_url != ''
        uses: slackapi/slack-github-action@v1.24.0
        with:
          payload: '{"text":"Phase 5 Nightly Validation FAILED for ${{ github.ref }} (status: ${{ job.status }})"}'
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
