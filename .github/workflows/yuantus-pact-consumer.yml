name: Yuantus Pact Consumer

on:
  # Manual activation is available after this workflow_dispatch-enabled workflow exists on
  # the default branch. Before merge, use the pull_request rerun/push path after secrets
  # are provisioned; the post-merge push:main run is what publishes the mainBranch pact.
  workflow_dispatch: {}
  pull_request:
    branches: [main]
    paths:
      - 'packages/core-backend/src/data-adapters/PLMAdapter.ts'
      - 'packages/core-backend/tests/contract/**'
      - 'packages/core-backend/tests/unit/plm-adapter-yuantus.test.ts'
      - 'packages/core-backend/package.json'
      - 'pnpm-lock.yaml'
      - 'scripts/ops/yuantus-pact-consumer-broker-workflow-contract.test.mjs'
      - '.github/workflows/yuantus-pact-consumer.yml'
  push:
    branches: [main]
    paths:
      - 'packages/core-backend/src/data-adapters/PLMAdapter.ts'
      - 'packages/core-backend/tests/contract/**'
      - 'packages/core-backend/tests/unit/plm-adapter-yuantus.test.ts'
      - 'packages/core-backend/package.json'
      - 'pnpm-lock.yaml'
      - 'scripts/ops/yuantus-pact-consumer-broker-workflow-contract.test.mjs'
      - '.github/workflows/yuantus-pact-consumer.yml'

permissions:
  contents: read

concurrency:
  group: yuantus-pact-consumer-${{ github.ref }}
  cancel-in-progress: true

jobs:
  yuantus-pact-consumer:
    name: yuantus-pact-consumer
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20.x

      - name: Run pact broker workflow contract test
        run: node --test scripts/ops/yuantus-pact-consumer-broker-workflow-contract.test.mjs

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.16.1
          run_install: false

      - name: Show pnpm version
        run: pnpm -v

      - name: Use empty npmrc for pnpm
        run: |
          echo "" > /tmp/empty-npmrc
          echo "NPM_CONFIG_USERCONFIG=/tmp/empty-npmrc" >> "$GITHUB_ENV"

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path)" >> "$GITHUB_OUTPUT"

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: |
          set -o pipefail
          pnpm install --frozen-lockfile 2>&1 | tee install.log

      - name: Run Yuantus pact consumer checks
        run: |
          pnpm --filter @metasheet/core-backend test:contract
          pnpm --filter @metasheet/core-backend exec vitest run tests/unit/plm-adapter-yuantus.test.ts --reporter=dot

      - name: Publish consumer pact to broker (advisory, Phase A)
        # Off-main hygiene: publish ONLY on push:main, so PR runs never create off-main pact versions in
        # the broker. A stray off-main "latest" once false-no'd Yuantus can-i-deploy; Yuantus #869 pinned
        # the provider to --main-branch (neutralizing the effect), and this removes the cause at source.
        # github.event_name/github.ref ARE available to steps.if (unlike `secrets`), so this gate is reliable.
        if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
        # The SHELL guard (below) still skips until ops provisions the broker secret — NOT a step `if:`
        # (the `secrets` context is unavailable to `steps.if`). Non-blocking; strictly additive.
        continue-on-error: true
        env:
          PACT_BROKER_BASE_URL: ${{ secrets.PACT_BROKER_BASE_URL }}
          PACT_BROKER_TOKEN: ${{ secrets.PACT_BROKER_TOKEN }}
          PACT_BROKER_ERROR_ON_UNKNOWN_OPTION: "true"
        run: |
          if [ -z "${PACT_BROKER_BASE_URL:-}" ]; then
            echo "[pact-broker] PACT_BROKER_BASE_URL not set — skipping advisory publish."
            exit 0
          fi
          if [ -z "${PACT_BROKER_TOKEN:-}" ]; then
            echo "::error title=Pact broker token missing::PACT_BROKER_BASE_URL is set but PACT_BROKER_TOKEN is empty; broker publish is configured but invalid."
            exit 1
          fi
          curl -fsSL https://raw.githubusercontent.com/pact-foundation/pact-ruby-standalone/master/install.sh | bash
          export PATH="$PWD/pact/bin:$PATH"
          pact-broker publish packages/core-backend/tests/contract/pacts/metasheet2-yuantus-plm.json \
            --consumer-app-version "${GITHUB_SHA}" \
            --branch "${GITHUB_REF_NAME}" \
            --broker-base-url "$PACT_BROKER_BASE_URL" \
            --broker-token "$PACT_BROKER_TOKEN"
