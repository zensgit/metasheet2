# Multitable web guard (targeted gate).
#
# Why this exists: the main PR gate (plugin-tests.yml) runs core-backend tests and only
# `pnpm --filter @metasheet/web build` for the web app — it does NOT run apps/web vitest
# specs. So FE-only regressions on the multitable surface slip through green CI. The rollup
# aggregation expansion (countall/unique) added a FE normalizer (resolveRollupFieldProperty /
# normalizeRollupAggregation) whose whole job is to NOT silently collapse a stored countall/
# unique back to 'count' on edit — exactly the kind of regression a build-only gate can't catch.
#
# Scope (deliberately TARGETED, like attendance-web-guard): run the green multitable FE
# normalizer/round-trip specs. The full `@metasheet/web` vitest suite still has historical/flaky
# failures, so wiring the whole suite as a required gate would be red on arrival. Expand the
# `vitest run` filter as more multitable web specs are cleaned up.
name: Multitable Web Guard

on:
  pull_request:
    paths:
      - 'apps/web/src/multitable/utils/field-config.ts'
      - 'apps/web/src/multitable/utils/meta-manager-labels.ts'
      - 'apps/web/src/multitable/components/MetaFieldManager.vue'
      - 'apps/web/src/multitable/composables/useMultitableGrid.ts'
      - 'apps/web/src/multitable/composables/useTrash.ts'
      - 'apps/web/src/multitable/components/TrashModal.vue'
      - 'apps/web/tests/multitable-rollup-aggregation-fe.spec.ts'
      - 'apps/web/tests/multitable-trash-fe.spec.ts'
      - 'apps/web/src/multitable/components/HistoryCenterModal.vue'
      - 'apps/web/src/multitable/composables/useHistoryCenter.ts'
      - 'apps/web/tests/multitable-history-fe.spec.ts'
      - 'apps/web/src/multitable/components/MetaKanbanView.vue'
      - 'apps/web/src/multitable/components/MetaViewManager.vue'
      - 'apps/web/src/multitable/utils/view-config.ts'
      - 'apps/web/src/multitable/utils/meta-view-render-labels.ts'
      - 'apps/web/tests/multitable-kanban-view.spec.ts'
      - 'apps/web/src/multitable/composables/useMultitableSheetPresence.ts'
      - 'apps/web/src/multitable/utils/sheet-cursor-state.ts'
      - 'apps/web/src/multitable/components/MetaGridTable.vue'
      - 'apps/web/src/multitable/views/MultitableWorkbench.vue'
      - 'apps/web/src/multitable/components/RestorePreviewDialog.vue'
      - 'apps/web/src/multitable/utils/meta-record-labels.ts'
      - 'apps/web/tests/multitable-restore-preview-dialog.spec.ts'
      - 'apps/web/tests/multitable-sheet-cursor-state.spec.ts'
      - 'apps/web/src/multitable/components/MetaRecordPermissionManager.vue'
      - 'apps/web/src/multitable/components/MetaSheetPermissionManager.vue'
      - 'apps/web/src/multitable/utils/meta-permission-labels.ts'
      - 'apps/web/src/multitable/components/MetaConditionalRuleBuilder.vue'
      - 'apps/web/src/multitable/utils/conditional-rule-ops.ts'
      - 'apps/web/tests/multitable-conditional-rule-builder.spec.ts'
      - 'apps/web/tests/multitable-conditional-rule-ops.spec.ts'
      - 'apps/web/src/multitable/api/client.ts'
      - 'apps/web/src/multitable/types.ts'
      - 'apps/web/tests/multitable-record-permission-manager.spec.ts'
      - 'apps/web/tests/multitable-sheet-permission-manager.spec.ts'
      - 'apps/web/src/multitable/composables/useYjsScalarCell.ts'
      - 'apps/web/tests/multitable-yjs-scalar-cell.spec.ts'
      - 'apps/web/src/multitable/components/cells/MetaCellEditor.vue'
      - 'apps/web/tests/multitable-yjs-scalar-cell-editor.spec.ts'
      - 'apps/web/tests/multitable-yjs-cell-editor.spec.ts'
      - '.github/workflows/multitable-web-guard.yml'
  push:
    branches: [main]
    paths:
      - 'apps/web/src/multitable/utils/field-config.ts'
      - 'apps/web/src/multitable/utils/meta-manager-labels.ts'
      - 'apps/web/src/multitable/components/MetaFieldManager.vue'
      - 'apps/web/src/multitable/composables/useMultitableGrid.ts'
      - 'apps/web/src/multitable/composables/useTrash.ts'
      - 'apps/web/src/multitable/components/TrashModal.vue'
      - 'apps/web/tests/multitable-rollup-aggregation-fe.spec.ts'
      - 'apps/web/tests/multitable-trash-fe.spec.ts'
      - 'apps/web/src/multitable/components/HistoryCenterModal.vue'
      - 'apps/web/src/multitable/composables/useHistoryCenter.ts'
      - 'apps/web/tests/multitable-history-fe.spec.ts'
      - 'apps/web/src/multitable/components/MetaKanbanView.vue'
      - 'apps/web/src/multitable/components/MetaViewManager.vue'
      - 'apps/web/src/multitable/utils/view-config.ts'
      - 'apps/web/src/multitable/utils/meta-view-render-labels.ts'
      - 'apps/web/tests/multitable-kanban-view.spec.ts'
      - 'apps/web/src/multitable/composables/useMultitableSheetPresence.ts'
      - 'apps/web/src/multitable/utils/sheet-cursor-state.ts'
      - 'apps/web/src/multitable/components/MetaGridTable.vue'
      - 'apps/web/src/multitable/views/MultitableWorkbench.vue'
      - 'apps/web/src/multitable/components/RestorePreviewDialog.vue'
      - 'apps/web/src/multitable/utils/meta-record-labels.ts'
      - 'apps/web/tests/multitable-restore-preview-dialog.spec.ts'
      - 'apps/web/tests/multitable-sheet-cursor-state.spec.ts'
      - 'apps/web/src/multitable/components/MetaRecordPermissionManager.vue'
      - 'apps/web/src/multitable/components/MetaSheetPermissionManager.vue'
      - 'apps/web/src/multitable/utils/meta-permission-labels.ts'
      - 'apps/web/src/multitable/components/MetaConditionalRuleBuilder.vue'
      - 'apps/web/src/multitable/utils/conditional-rule-ops.ts'
      - 'apps/web/tests/multitable-conditional-rule-builder.spec.ts'
      - 'apps/web/tests/multitable-conditional-rule-ops.spec.ts'
      - 'apps/web/src/multitable/api/client.ts'
      - 'apps/web/src/multitable/types.ts'
      - 'apps/web/tests/multitable-record-permission-manager.spec.ts'
      - 'apps/web/tests/multitable-sheet-permission-manager.spec.ts'
      - 'apps/web/src/multitable/composables/useYjsScalarCell.ts'
      - 'apps/web/tests/multitable-yjs-scalar-cell.spec.ts'
      - 'apps/web/src/multitable/components/cells/MetaCellEditor.vue'
      - 'apps/web/tests/multitable-yjs-scalar-cell-editor.spec.ts'
      - 'apps/web/tests/multitable-yjs-cell-editor.spec.ts'
      - '.github/workflows/multitable-web-guard.yml'

jobs:
  multitable-web-guard:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20.x
        uses: actions/setup-node@v4
        with:
          node-version: 20.x

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.16.1
          run_install: false

      - name: Use empty npmrc for pnpm
        run: |
          echo "" > /tmp/empty-npmrc
          echo "NPM_CONFIG_USERCONFIG=/tmp/empty-npmrc" >> "$GITHUB_ENV"

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path)" >> "$GITHUB_OUTPUT"

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run multitable web guard specs (targeted)
        # A1: meta-grid-table (windowing + infinite-scroll trigger) + multitable-grid (useMultitableGrid
        # accumulation/loadMore) added so the grid virtualization ACTIVATION has real CI enforcement —
        # the guard already triggers on MetaGridTable.vue / useMultitableGrid.ts / MultitableWorkbench.vue
        # edits but, before this, ran none of those specs (and plugin-tests.yml only build-checks web).
        run: pnpm --filter @metasheet/web exec vitest run multitable-rollup-aggregation-fe multitable-trash-fe multitable-history-fe multitable-kanban-view multitable-field-manager multitable-sheet-cursor-state multitable-record-permission-manager multitable-sheet-permission-manager multitable-yjs-scalar-cell multitable-yjs-cell-editor multitable-conditional-rule multitable-person-picker multitable-cell-renderer-person-inactive meta-toolbar-filter-builder meta-filter-group meta-grid-table multitable-grid multitable-restore-preview-dialog --reporter=dot
