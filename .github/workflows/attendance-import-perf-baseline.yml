name: Attendance Import Perf Baseline

# Mark drill runs explicitly so dashboards can ignore them.
run-name: Attendance Import Perf Baseline${{ github.event_name == 'workflow_dispatch' && inputs.drill == 'true' && ' [DRILL]' || '' }}

on:
  workflow_dispatch:
    inputs:
      drill:
        description: 'Optional: mark run as [DRILL] and skip calling production APIs (true/false)'
        required: false
        default: 'false'
      drill_fail:
        description: 'Optional: intentionally fail the drill job for FAIL-path validation (true/false)'
        required: false
        default: 'false'
      issue_title:
        description: 'Optional: override issue title for workflow_dispatch drills (leave empty for production title)'
        required: false
        default: ''
      api_base:
        description: 'API base (must end with /api)'
        required: false
        default: 'http://142.171.239.56:8081/api'
      profile:
        description: 'Perf profile (standard|high-scale). high-scale defaults to 100k rows + async.'
        required: false
        default: 'standard'
      rows:
        description: 'CSV rows to generate (overrides profile default when set)'
        required: false
        default: '10000'
      mode:
        description: 'preview or commit'
        required: false
        default: 'commit'
      preview_mode:
        description: 'Preview execution mode (sync|async|auto)'
        required: false
        default: 'sync'
      commit_async:
        description: 'Use /commit-async path (true/false, default true for baseline runs)'
        required: false
        default: 'true'
      export_csv:
        description: 'Verify export csv latency (true/false)'
        required: false
        default: 'true'
      upload_csv:
        description: 'Upload CSV via /attendance/import/upload (true/false)'
        required: false
        default: 'true'
      payload_source:
        description: 'Import payload source (auto|csv|rows)'
        required: false
        default: 'auto'
      csv_rows_limit_hint:
        description: 'Declared remote CSV row cap used by auto payload selection'
        required: false
        default: '100000'
      max_preview_ms:
        description: 'Fail if preview latency exceeds this value (optional)'
        required: false
        default: ''
      max_commit_ms:
        description: 'Fail if commit latency exceeds this value (optional)'
        required: false
        default: ''
      max_export_ms:
        description: 'Fail if export latency exceeds this value (optional)'
        required: false
        default: ''
      max_rollback_ms:
        description: 'Fail if rollback latency exceeds this value (optional)'
        required: false
        default: ''
  schedule:
    # Daily at 03:20 UTC (after strict gates job window).
    - cron: '20 3 * * *'

concurrency:
  # Avoid schedule/manual cross-cancellation while preserving dedupe per trigger source.
  group: attendance-import-perf-baseline-${{ github.event_name == 'schedule' && 'schedule' || github.event_name == 'workflow_dispatch' && 'manual' || 'other' }}
  cancel-in-progress: true

permissions:
  contents: read
  issues: write

jobs:
  drill:
    if: github.event_name == 'workflow_dispatch' && inputs.drill == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      DRILL_FAIL: ${{ inputs.drill_fail || 'false' }}
    steps:
      - name: Drill no-op (skip perf baseline)
        run: |
          set -euo pipefail
          DRILL_FAIL="${DRILL_FAIL:-false}"
          mkdir -p output/playwright/attendance-import-perf/drill
          cat > output/playwright/attendance-import-perf/drill/drill.txt <<'EOF'
          This is a DRILL run for Attendance Import Perf Baseline.
          The workflow intentionally skips calling production APIs.
          EOF

          # Provide a minimal perf-summary.json so dashboards can exercise
          # artifact parsing without calling production.
          cat > output/playwright/attendance-import-perf/drill/perf-summary.json <<'EOF'
          {
            "startedAt": "1970-01-01T00:00:00.000Z",
            "scenario": "DRILL",
            "mode": "commit",
            "apiBase": "<DRILL>",
            "orgId": "default",
            "rows": 20000,
            "commitAsync": true,
            "uploadCsv": true,
            "previewMs": 1111,
            "commitMs": 2222,
            "exportMs": 333,
            "rollbackMs": 44,
            "thresholds": {
              "maxPreviewMs": 100000,
              "maxCommitMs": 150000,
              "maxExportMs": 25000,
              "maxRollbackMs": 30000
            },
            "regressions": [
              "DRILL: synthetic regression entry"
            ]
          }
          EOF

          if [[ "$DRILL_FAIL" == "true" ]]; then
            echo "DRILL_FAIL=true: intentional failure after creating drill artifacts" >&2
            exit 97
          fi

      - name: Upload drill artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: attendance-import-perf-${{ github.run_id }}-${{ github.run_attempt }}
          retention-days: 14
          path: |
            output/playwright/attendance-import-perf/**

  perf:
    if: github.event_name != 'workflow_dispatch' || inputs.drill != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      API_BASE: ${{ inputs.api_base || vars.ATTENDANCE_API_BASE || 'http://142.171.239.56:8081/api' }}
      AUTH_TOKEN: ${{ secrets.ATTENDANCE_ADMIN_JWT || vars.ATTENDANCE_ADMIN_JWT || '' }}
      LOGIN_EMAIL: ${{ secrets.ATTENDANCE_ADMIN_EMAIL || vars.ATTENDANCE_ADMIN_EMAIL || '' }}
      LOGIN_PASSWORD: ${{ secrets.ATTENDANCE_ADMIN_PASSWORD || vars.ATTENDANCE_ADMIN_PASSWORD || '' }}
      AUTH_RESOLVE_ALLOW_INSECURE_HTTP: ${{ vars.ATTENDANCE_ALLOW_INSECURE_HTTP || 'true' }}
      PERF_PROFILE: ${{ github.event_name == 'schedule' && 'standard' || inputs.profile || vars.ATTENDANCE_PERF_BASELINE_PROFILE || 'standard' }}
      # Schedule runs must stay stable and short. Keep manual dispatch flexible.
      ROWS: ${{ github.event_name == 'schedule' && (vars.ATTENDANCE_PERF_BASELINE_ROWS_SCHEDULE || '10000') || (inputs.profile == 'high-scale' && (vars.ATTENDANCE_PERF_BASELINE_ROWS_HIGH || '100000')) || inputs.rows || vars.ATTENDANCE_PERF_BASELINE_ROWS || '20000' }}
      MODE: ${{ inputs.mode || 'commit' }}
      PREVIEW_MODE: ${{ inputs.preview_mode || (inputs.profile == 'high-scale' && 'auto') || vars.ATTENDANCE_PERF_PREVIEW_MODE || 'sync' }}
      PREVIEW_ASYNC_ROW_THRESHOLD: ${{ vars.ATTENDANCE_PERF_PREVIEW_ASYNC_ROW_THRESHOLD || '50000' }}
      ROLLBACK: 'true'
      COMMIT_ASYNC: ${{ github.event_name == 'schedule' && (vars.ATTENDANCE_PERF_COMMIT_ASYNC_SCHEDULE || 'true') || (inputs.profile == 'high-scale' && 'true') || inputs.commit_async || vars.ATTENDANCE_PERF_COMMIT_ASYNC || 'true' }}
      EXPORT_CSV: ${{ inputs.export_csv || vars.ATTENDANCE_PERF_EXPORT_CSV || 'true' }}
      UPLOAD_CSV: ${{ inputs.upload_csv || vars.ATTENDANCE_PERF_UPLOAD_CSV || 'true' }}
      PAYLOAD_SOURCE: ${{ inputs.payload_source || (inputs.profile == 'high-scale' && (vars.ATTENDANCE_PERF_PAYLOAD_SOURCE_HIGH || 'auto')) || vars.ATTENDANCE_PERF_PAYLOAD_SOURCE || 'auto' }}
      CSV_ROWS_LIMIT_HINT: ${{ inputs.csv_rows_limit_hint || (inputs.profile == 'high-scale' && (vars.ATTENDANCE_PERF_CSV_ROWS_LIMIT_HINT_HIGH || '100000')) || vars.ATTENDANCE_IMPORT_CSV_MAX_ROWS || '100000' }}
      PERF_WORK_DATE_SPAN_DAYS: ${{ inputs.profile == 'high-scale' && (vars.ATTENDANCE_PERF_WORK_DATE_SPAN_DAYS_HIGH || '180') || vars.ATTENDANCE_PERF_WORK_DATE_SPAN_DAYS || '366' }}
      MAX_PREVIEW_MS: ${{ inputs.max_preview_ms || (inputs.profile == 'high-scale' && (vars.ATTENDANCE_PERF_MAX_PREVIEW_MS_HIGH || '240000')) || vars.ATTENDANCE_PERF_MAX_PREVIEW_MS || '' }}
      MAX_COMMIT_MS: ${{ inputs.max_commit_ms || (inputs.profile == 'high-scale' && (vars.ATTENDANCE_PERF_MAX_COMMIT_MS_HIGH || '420000')) || vars.ATTENDANCE_PERF_MAX_COMMIT_MS_STANDARD || '420000' }}
      MAX_EXPORT_MS: ${{ inputs.max_export_ms || (inputs.profile == 'high-scale' && (vars.ATTENDANCE_PERF_MAX_EXPORT_MS_HIGH || '90000')) || vars.ATTENDANCE_PERF_MAX_EXPORT_MS || '' }}
      MAX_ROLLBACK_MS: ${{ inputs.max_rollback_ms || vars.ATTENDANCE_PERF_BASELINE_MAX_ROLLBACK_MS || '30000' }}
      IMPORT_JOB_POLL_TIMEOUT_MS: ${{ github.event_name == 'schedule' && (vars.ATTENDANCE_IMPORT_JOB_POLL_TIMEOUT_SCHEDULE_MS || '600000') || (inputs.profile == 'high-scale' && (vars.ATTENDANCE_IMPORT_JOB_POLL_TIMEOUT_HIGH_MS || '3600000')) || vars.ATTENDANCE_IMPORT_JOB_POLL_TIMEOUT_STANDARD_MS || vars.ATTENDANCE_IMPORT_JOB_POLL_TIMEOUT_MS || '600000' }}
      IMPORT_JOB_POLL_TIMEOUT_LARGE_MS: ${{ github.event_name == 'schedule' && (vars.ATTENDANCE_IMPORT_JOB_POLL_TIMEOUT_LARGE_SCHEDULE_MS || '900000') || (inputs.profile == 'high-scale' && (vars.ATTENDANCE_IMPORT_JOB_POLL_TIMEOUT_LARGE_HIGH_MS || '5400000')) || vars.ATTENDANCE_IMPORT_JOB_POLL_TIMEOUT_LARGE_STANDARD_MS || vars.ATTENDANCE_IMPORT_JOB_POLL_TIMEOUT_LARGE_MS || '900000' }}
      COMMIT_RETRIES: ${{ vars.ATTENDANCE_PERF_COMMIT_RETRIES || '3' }}
      COMMIT_RETRIES_LARGE: ${{ vars.ATTENDANCE_PERF_COMMIT_RETRIES_LARGE || '5' }}
      COMMIT_RETRIES_RETRY: ${{ vars.ATTENDANCE_PERF_COMMIT_RETRIES_RETRY || '6' }}
      COMMIT_RETRIES_LARGE_RETRY: ${{ vars.ATTENDANCE_PERF_COMMIT_RETRIES_LARGE_RETRY || '8' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Resolve valid auth token
        id: resolve-auth-token
        run: |
          set -euo pipefail
          mkdir -p output/playwright/attendance-import-perf
          meta_file="output/playwright/attendance-import-perf/auth-resolve-meta.txt"

          if ! resolved_token="$(
            API_BASE="${API_BASE}" \
            AUTH_TOKEN="${AUTH_TOKEN}" \
            LOGIN_EMAIL="${LOGIN_EMAIL}" \
            LOGIN_PASSWORD="${LOGIN_PASSWORD}" \
            AUTH_RESOLVE_ALLOW_INSECURE_HTTP="${AUTH_RESOLVE_ALLOW_INSECURE_HTTP}" \
            AUTH_RESOLVE_META_FILE="${meta_file}" \
            ./scripts/ops/attendance-resolve-auth.sh
          )"; then
            API_BASE="${API_BASE}" \
            ./scripts/ops/attendance-write-auth-error.sh \
              "${meta_file}" \
              "output/playwright/attendance-import-perf/auth-error.txt"
            echo "::error::No valid attendance admin token; see auth-error.txt artifact."
            exit 1
          fi

          echo "::add-mask::${resolved_token}"
          echo "AUTH_TOKEN_EFFECTIVE=${resolved_token}" >> "$GITHUB_ENV"

          auth_source="unknown"
          if [[ -f "${meta_file}" ]]; then
            auth_source="$(awk -F= '/^AUTH_SOURCE=/{print $2}' "${meta_file}" | tail -n1)"
          fi
          echo "auth_source=${auth_source}" >> "$GITHUB_OUTPUT"

      - name: Log resolved perf config
        run: |
          set -euo pipefail
          echo "event=${{ github.event_name }}"
          echo "api_base=${API_BASE}"
          echo "profile=${PERF_PROFILE}"
          echo "auth_source=${{ steps.resolve-auth-token.outputs.auth_source || 'unknown' }}"
          echo "rows=${ROWS}"
          echo "mode=${MODE}"
          echo "preview_mode=${PREVIEW_MODE}"
          echo "preview_async_row_threshold=${PREVIEW_ASYNC_ROW_THRESHOLD}"
          echo "commit_async=${COMMIT_ASYNC}"
          echo "upload_csv=${UPLOAD_CSV}"
          echo "payload_source=${PAYLOAD_SOURCE}"
          echo "csv_rows_limit_hint=${CSV_ROWS_LIMIT_HINT}"
          echo "export_csv=${EXPORT_CSV}"
          echo "poll_timeout_ms=${IMPORT_JOB_POLL_TIMEOUT_MS}"
          echo "poll_timeout_large_ms=${IMPORT_JOB_POLL_TIMEOUT_LARGE_MS}"

      - name: Run perf baseline (rollback enabled)
        env:
          AUTH_TOKEN: ${{ env.AUTH_TOKEN_EFFECTIVE }}
        run: |
          set -euo pipefail
          mkdir -p output/playwright/attendance-import-perf
          log_dir="output/playwright/attendance-import-perf"
          attempt1_log="${log_dir}/perf-attempt1.log"
          attempt2_log="${log_dir}/perf-attempt2.log"
          final_log="${log_dir}/perf.log"
          transient_pattern='HTTP 429|HTTP 5[0-9]{2}|fetch failed|ECONNRESET|ETIMEDOUT|Bad Gateway|timed out'

          run_once() {
            local log_file="$1"
            shift
            set +e
            "$@" 2>&1 | tee "$log_file"
            local rc="${PIPESTATUS[0]}"
            set -e
            return "$rc"
          }

          if run_once "$attempt1_log" node ./scripts/ops/attendance-import-perf.mjs; then
            rc_first=0
          else
            rc_first="$?"
          fi
          if [[ "$rc_first" -eq 0 ]]; then
            cp "$attempt1_log" "$final_log"
            exit 0
          fi

          last_failure_line="$(grep -E '^\[attendance-import-perf\] Failed:' "$attempt1_log" | tail -n 1 || true)"
          if [[ -z "$last_failure_line" ]]; then
            last_failure_line="$(tail -n 40 "$attempt1_log" | tr '\n' ' ')"
          fi
          if ! printf '%s' "$last_failure_line" | grep -Eiq "$transient_pattern"; then
            cp "$attempt1_log" "$final_log"
            exit "$rc_first"
          fi

          echo "Transient perf failure detected; retrying once with expanded commit retries."
          sleep 10
          if run_once "$attempt2_log" env \
            COMMIT_RETRIES="${COMMIT_RETRIES_RETRY}" \
            COMMIT_RETRIES_LARGE="${COMMIT_RETRIES_LARGE_RETRY}" \
            node ./scripts/ops/attendance-import-perf.mjs; then
            rc_second=0
          else
            rc_second="$?"
          fi
          if [[ "$rc_second" -eq 0 ]]; then
            cat "$attempt1_log" "$attempt2_log" > "$final_log"
            exit 0
          fi
          cat "$attempt1_log" "$attempt2_log" > "$final_log"
          exit "$rc_second"

      - name: Upload perf artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: attendance-import-perf-${{ github.run_id }}-${{ github.run_attempt }}
          retention-days: 14
          path: |
            output/playwright/attendance-import-perf/**

  issue:
    name: Perf Issue Alert (P1)
    needs: [drill, perf]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      DRILL: ${{ github.event.inputs.drill || 'false' }}
      DRILL_FAIL: ${{ github.event.inputs.drill_fail || 'false' }}
      ISSUE_TITLE_OVERRIDE: ${{ github.event.inputs.issue_title || '' }}
      DRILL_RESULT: ${{ needs.drill.result }}
      PERF_RESULT: ${{ needs.perf.result }}
    steps:
      - name: Open/update issue on failure (P1, no paging)
        uses: actions/github-script@v7
        with:
          script: |
            const drill = String(process.env.DRILL || '').trim() === 'true'
            const drillFail = String(process.env.DRILL_FAIL || '').trim() === 'true'
            const drillResult = String(process.env.DRILL_RESULT || '').trim()
            const perfResult = String(process.env.PERF_RESULT || '').trim()
            const titleOverride = String(process.env.ISSUE_TITLE_OVERRIDE || '').trim()

            const defaultTitle = '[Attendance P1] Perf baseline alert'
            const title = titleOverride || defaultTitle

            const allowIssueOps = !drill || Boolean(titleOverride)
            if (!allowIssueOps) {
              core.info('Drill run: skipping issue operations (no override title).')
              return
            }

            const owner = context.repo.owner
            const repo = context.repo.repo
            const runUrl = `${context.serverUrl}/${owner}/${repo}/actions/runs/${context.runId}`
            const artifactName = `attendance-import-perf-${context.runId}-${process.env.GITHUB_RUN_ATTEMPT || '1'}`

            const failed = drillResult === 'failure' || perfResult === 'failure'
            const statusLine = `jobs: perf=${perfResult || 'unknown'} drill=${drillResult || 'unknown'}${drill && drillFail ? ' (drill_fail=true)' : ''}`

            const body = [
              'Automated perf baseline tracking issue (P1, no paging).',
              '',
              `Run: ${runUrl}`,
              statusLine,
              '',
              `Artifacts: ${artifactName}`,
              '',
              'Download:',
              '```bash',
              `gh run download ${context.runId} -n \"${artifactName}\" -D \"output/playwright/ga/${context.runId}\"`,
              '```',
            ].join('\n')

            const q = `repo:${owner}/${repo} type:issue in:title \"${title}\"`
            const search = await github.rest.search.issuesAndPullRequests({
              q,
              sort: 'updated',
              order: 'desc',
              per_page: 20,
            })
            const items = Array.isArray(search.data.items) ? search.data.items : []
            const match = items.find((item) => item && !item.pull_request && item.title === title) || null

            if (failed) {
              if (match) {
                if (match.state !== 'open') {
                  await github.rest.issues.update({
                    owner,
                    repo,
                    issue_number: match.number,
                    state: 'open',
                    body,
                  })
                  core.info(`Reopened issue #${match.number}`)
                } else {
                  await github.rest.issues.createComment({
                    owner,
                    repo,
                    issue_number: match.number,
                    body,
                  })
                  core.info(`Commented on issue #${match.number}`)
                }
                return
              }

              const created = await github.rest.issues.create({
                owner,
                repo,
                title,
                body,
              })
              core.info(`Created issue #${created.data.number}`)
              return
            }

            // Recovery: close an existing open issue when the perf gate passes.
            if (!match) {
              core.info('No perf baseline issue found; nothing to close.')
              return
            }
            if (match.state !== 'open') {
              core.info(`Perf issue exists but is already closed (#${match.number}).`)
              return
            }

            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number: match.number,
              body: [
                'Perf baseline recovery detected. Closing issue.',
                '',
                `Run: ${runUrl}`,
                statusLine,
              ].join('\n'),
            })
            await github.rest.issues.update({
              owner,
              repo,
              issue_number: match.number,
              state: 'closed',
            })
            core.info(`Closed issue #${match.number}`)
