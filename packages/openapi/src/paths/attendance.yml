                work_start_time: { type: string, deprecated: true }
                start_time: { type: string, deprecated: true }
                workEndTime: { type: string }
                work_end_time: { type: string, deprecated: true }
                end_time: { type: string, deprecated: true }
                isOvernight: { type: boolean }
                is_overnight: { type: boolean, deprecated: true }
                lateGraceMinutes: { type: integer }
                late_grace_minutes: { type: integer, deprecated: true }
                earlyGraceMinutes: { type: integer }
                early_grace_minutes: { type: integer, deprecated: true }
                roundingMinutes: { type: integer }
