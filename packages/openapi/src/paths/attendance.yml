    get:
      summary: List attendance shift assignments
      security: [ { bearerAuth: [] } ]
      parameters:
        - in: query
          name: orgId
          schema: { type: string }
        - in: query
          name: userId
          schema: { type: string }
        - in: query
          name: user_id
          schema: { type: string }
          description: Legacy snake_case alias for userId.
        - in: query
          name: page
          schema: { type: integer, default: 1 }
        - in: query
          name: pageSize
          schema: { type: integer, default: 50 }
