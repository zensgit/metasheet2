        '403': { $ref: '#/components/responses/Forbidden' }
    post:
      summary: Create attendance shift assignment
      security: [ { bearerAuth: [] } ]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                userId: { type: string }
                shiftId: { type: string }
                startDate: { type: string, format: date }
                endDate: { type: string, format: date, nullable: true }
                isActive: { type: boolean }
                orgId: { type: string }
                user_id:
                  type: string
                  description: Legacy snake_case alias for userId.
                shift_id:
                  type: string
                  description: Legacy snake_case alias for shiftId.
                start_date:
                  type: string
                  format: date
                  description: Legacy snake_case alias for startDate.
                end_date:
                  type: string
                  format: date
                  nullable: true
                  description: Legacy snake_case alias for endDate.
                is_active:
                  type: boolean
                  description: Legacy snake_case alias for isActive.
              required: [userId, shiftId, startDate]
            examples:
              camelCase:
                summary: Create assignment with canonical camelCase fields
                value:
                  userId: attendance-user-001
                  shiftId: 11111111-1111-4111-8111-111111111111
                  startDate: '2026-03-20'
                  endDate: null
                  isActive: true
              snakeCase:
                summary: Create assignment with legacy snake_case aliases
                value:
                  user_id: attendance-user-001
                  shift_id: 11111111-1111-4111-8111-111111111111
                  start_date: '2026-03-20'
                  end_date: null
                  is_active: true
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  data:
                    type: object
                    properties:
                      assignment: { $ref: '#/components/schemas/AttendanceShiftAssignment' }
                      shift: { $ref: '#/components/schemas/AttendanceShift' }
        '400': { $ref: '#/components/responses/ValidationError' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
