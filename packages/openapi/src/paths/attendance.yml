                  ok: { type: boolean }
                  data:
                    type: object
                    properties:
                      requestId: { type: string }
                      status: { type: string }
                      orgId: { type: string }
                      userId: { type: string }
                      record:
                        nullable: true
                        allOf:
                          - { $ref: '#/components/schemas/AttendanceRecord' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
  /api/attendance/requests/{id}/cancel:
