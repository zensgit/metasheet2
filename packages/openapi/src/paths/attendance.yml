paths:
  /api/attendance/punch:
    x-plugin: plugin-attendance
    post:
      summary: Punch attendance (check in/out)
      security: [ { bearerAuth: [] } ]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                eventType:
                  type: string
                  enum: [check_in, check_out]
                occurredAt:
                  type: string
                  format: date-time
                  description: Preferred punch timestamp in ISO 8601 format.
                occurred_at:
                  type: string
                  format: date-time
                  description: Compatibility alias for occurredAt.
                timezone:
                  type: string
                source:
                  type: string
                location:
                  type: object
                meta:
                  type: object
                orgId:
                  type: string
              required: [eventType]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  data:
                    type: object
                    properties:
                      event: { $ref: '#/components/schemas/AttendanceEvent' }
                      record: { $ref: '#/components/schemas/AttendanceRecord' }
        '400': { $ref: '#/components/responses/ValidationError' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
  /api/attendance/records:
    x-plugin: plugin-attendance
    get:
      summary: List attendance records
      security: [ { bearerAuth: [] } ]
      parameters:
        - in: query
          name: userId
          schema: { type: string }
        - in: query
          name: orgId
          schema: { type: string }
        - in: query
          name: from
          schema: { type: string, format: date }
        - in: query
          name: to
          schema: { type: string, format: date }
        - in: query
          name: page
          schema: { type: integer, default: 1 }
        - in: query
          name: pageSize
          schema: { type: integer, default: 50 }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  data:
                    type: object
                    properties:
                      items:
                        type: array
                        items: { $ref: '#/components/schemas/AttendanceRecord' }
                      total: { type: integer }
                      page: { type: integer }
                      pageSize: { type: integer }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
  /api/attendance/calendar:
    x-plugin: plugin-attendance
    get:
      summary: List attendance records for calendar views (compatibility alias)
      security: [ { bearerAuth: [] } ]
      parameters:
        - in: query
          name: userId
          schema: { type: string }
        - in: query
          name: orgId
          schema: { type: string }
        - in: query
          name: from
          schema: { type: string, format: date }
        - in: query
          name: to
          schema: { type: string, format: date }
        - in: query
          name: page
          schema: { type: integer, default: 1 }
        - in: query
          name: pageSize
          schema: { type: integer, default: 50 }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  data:
                    type: object
                    properties:
                      items:
                        type: array
                        items: { $ref: '#/components/schemas/AttendanceRecord' }
                      total: { type: integer }
                      page: { type: integer }
                      pageSize: { type: integer }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }

  /api/attendance/anomalies:
    x-plugin: plugin-attendance
    get:
      summary: List attendance anomalies (workday records needing attention)
      security: [ { bearerAuth: [] } ]
      parameters:
        - in: query
          name: userId
          schema: { type: string }
        - in: query
          name: orgId
          schema: { type: string }
        - in: query
          name: from
          schema: { type: string, format: date }
        - in: query
          name: to
          schema: { type: string, format: date }
        - in: query
          name: page
          schema: { type: integer, default: 1 }
        - in: query
          name: pageSize
          schema: { type: integer, default: 50 }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  data:
                    type: object
                    properties:
                      items:
                        type: array
                        items: { $ref: '#/components/schemas/AttendanceAnomaly' }
                      total: { type: integer }
                      page: { type: integer }
                      pageSize: { type: integer }
                      from: { type: string, format: date }
                      to: { type: string, format: date }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
  /api/attendance/summary:
    x-plugin: plugin-attendance
    get:
      summary: Attendance summary
      security: [ { bearerAuth: [] } ]
      parameters:
        - in: query
          name: userId
          schema: { type: string }
        - in: query
          name: orgId
          schema: { type: string }
        - in: query
          name: from
          schema: { type: string, format: date }
        - in: query
          name: to
          schema: { type: string, format: date }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  data: { $ref: '#/components/schemas/AttendanceSummary' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
  /api/attendance/requests:
    x-plugin: plugin-attendance
    post:
      summary: Create attendance adjustment request
      security: [ { bearerAuth: [] } ]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                workDate:
                  type: string
                  format: date
                  description: Work date in YYYY-MM-DD format.
                date:
                  type: string
                  format: date
                  description: Compatibility alias for workDate.
                requestType:
                  type: string
                  enum: [missed_check_in, missed_check_out, time_correction, leave, overtime]
                  description: Request type.
                type:
                  type: string
                  enum: [missed_check_in, missed_check_out, time_correction, leave, overtime]
                  description: Compatibility alias for requestType.
                requestedInAt:
                  type: string
                  format: date-time
                  description: Required for missed_check_in. Optional for time_correction, leave, and overtime.
                requested_in_at:
                  type: string
                  format: date-time
                  description: Compatibility alias for requestedInAt.
                clockIn:
                  type: string
                  format: date-time
                  description: Compatibility alias for requestedInAt.
                requestedOutAt:
                  type: string
                  format: date-time
                  description: Required for missed_check_out. Optional for time_correction, leave, and overtime.
                requested_out_at:
                  type: string
                  format: date-time
                  description: Compatibility alias for requestedOutAt.
                clockOut:
                  type: string
                  format: date-time
                  description: Compatibility alias for requestedOutAt.
                reason:
                  type: string
                leaveTypeId:
                  type: string
                  description: Required for leave requests unless leaveTypeCode is provided.
                leaveTypeCode:
                  type: string
                  description: Required for leave requests unless leaveTypeId is provided.
                overtimeRuleId:
                  type: string
                  description: Required for overtime requests unless overtimeRuleName is provided.
                overtimeRuleName:
                  type: string
                  description: Required for overtime requests unless overtimeRuleId is provided.
                minutes:
                  type: integer
                  description: Required for overtime unless derived from requestedInAt/requestedOutAt.
                attachmentUrl:
                  type: string
                approvalFlowId:
                  type: string
                orgId:
                  type: string
              required: [workDate, requestType]
            examples:
              missedCheckIn:
                summary: Missed check-in using canonical fields
                value:
                  workDate: '2026-03-20'
                  requestType: missed_check_in
                  requestedInAt: '2026-03-20T09:05:00+08:00'
                  reason: Forgot to check in after a network reconnect.
              missedCheckOutLegacy:
                summary: Missed check-out using legacy alias fields
                value:
                  date: '2026-03-20'
                  type: missed_check_out
                  clockOut: '2026-03-20T18:10:00+08:00'
                  reason: Left the office before the kiosk synced.
              leaveByCode:
                summary: Leave request using leaveTypeCode
                value:
                  workDate: '2026-03-21'
                  requestType: leave
                  leaveTypeCode: annual_leave
                  minutes: 480
                  reason: Family event
              overtimeByRuleName:
                summary: Overtime request using overtimeRuleName
                value:
                  workDate: '2026-03-22'
                  requestType: overtime
                  requestedInAt: '2026-03-22T18:30:00+08:00'
                  requestedOutAt: '2026-03-22T21:00:00+08:00'
                  overtimeRuleName: Weekday OT
                  reason: End-of-month release support
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  data:
                    type: object
                    properties:
                      request: { $ref: '#/components/schemas/AttendanceRequest' }
        '400': { $ref: '#/components/responses/ValidationError' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
    get:
      summary: List attendance requests
      security: [ { bearerAuth: [] } ]
      parameters:
        - in: query
          name: userId
          schema: { type: string }
        - in: query
          name: orgId
          schema: { type: string }
        - in: query
          name: status
          schema: { type: string }
        - in: query
          name: from
          schema: { type: string, format: date }
        - in: query
          name: to
          schema: { type: string, format: date }
        - in: query
          name: page
          schema: { type: integer, default: 1 }
        - in: query
          name: pageSize
          schema: { type: integer, default: 50 }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  data:
                    type: object
                    properties:
                      items:
                        type: array
                        items: { $ref: '#/components/schemas/AttendanceRequest' }
                      total: { type: integer }
                      page: { type: integer }
                      pageSize: { type: integer }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
  /api/attendance/requests/{id}/approve:
    x-plugin: plugin-attendance
    post:
      summary: Approve attendance request
      security: [ { bearerAuth: [] } ]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                comment: { type: string }
                metadata: { type: object }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  data:
                    type: object
                    properties:
                      requestId: { type: string }
                      status: { type: string }
                      orgId: { type: string }
                      userId: { type: string }
                      record: { $ref: '#/components/schemas/AttendanceRecord' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
  /api/attendance/requests/{id}/reject:
    x-plugin: plugin-attendance
    post:
      summary: Reject attendance request
      security: [ { bearerAuth: [] } ]
      parameters:
