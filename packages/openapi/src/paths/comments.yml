paths:
  /api/comments:
    get:
      summary: List comments
      description: Returns row-scoped comments, including optional field-thread comments and reply comments.
      security: [ { bearerAuth: [] } ]
      parameters:
        - in: query
          name: spreadsheetId
          required: true
          schema: { type: string }
        - in: query
          name: rowId
          schema: { type: string }
        - in: query
          name: resolved
          schema: { type: boolean }
        - in: query
          name: limit
          schema: { type: integer, default: 50 }
        - in: query
          name: offset
          schema: { type: integer, default: 0 }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/CommentsListResponse' }
        '400': { $ref: '#/components/responses/ValidationError' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
    post:
      summary: Create comment
      description: Creates a record comment, field comment, or one-level reply within an existing comment thread.
      security: [ { bearerAuth: [] } ]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                spreadsheetId:
                  type: string
                rowId:
                  type: string
                fieldId:
                  type: string
                  description: Optional field-scoped thread anchor. Replies inherit the parent thread field scope.
                content:
                  type: string
                parentId:
                  type: string
                  description: Optional parent comment id. Reply-to-reply is rejected.
                mentions:
                  type: array
                  items:
                    type: string
                  description: Optional explicit mention user ids. When omitted, the backend falls back to parsing mention tokens from content.
              required: [spreadsheetId, rowId, content]
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  data:
                    type: object
                    properties:
                      comment: { $ref: '#/components/schemas/Comment' }
        '400': { $ref: '#/components/responses/ValidationError' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
  /api/comments/inbox:
    get:
      summary: List comment inbox items
      description: Returns comments from other collaborators that either mention the current authenticated user or remain unread, including unread state, mention state, and navigation context.
      security: [ { bearerAuth: [] } ]
      parameters:
        - in: query
          name: limit
          schema: { type: integer, default: 50 }
        - in: query
          name: offset
          schema: { type: integer, default: 0 }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/CommentInboxResponse' }
        '400': { $ref: '#/components/responses/ValidationError' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
  /api/comments/unread-count:
    get:
      summary: Get unread comment count
      description: Returns the count of unread comments from other collaborators that currently appear in the comment inbox.
      security: [ { bearerAuth: [] } ]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/CommentUnreadCountResponse' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
  /api/comments/mention-summary:
    get:
      summary: Current-user mention inbox summary
      description: Returns a sheet-scoped summary of unresolved comments that mention the current authenticated user. Only unresolved comments are counted. Items are sorted by descending mentionedCount, then ascending rowId.
      security: [ { bearerAuth: [] } ]
      parameters:
        - in: query
          name: spreadsheetId
          required: true
          schema: { type: string }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/CommentMentionSummaryResponse' }
        '400': { $ref: '#/components/responses/ValidationError' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
  /api/comments/mention-summary/mark-read:
    post:
      summary: Mark mention inbox as read
      description: Marks all currently unresolved mention items for the current user in the given spreadsheet as read.
      security: [ { bearerAuth: [] } ]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                spreadsheetId:
                  type: string
              required: [spreadsheetId]
      responses:
        '204': { description: No Content }
        '400': { $ref: '#/components/responses/ValidationError' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
  /api/comments/summary:
    get:
      summary: List unresolved comment presence summaries
      description: Returns unresolved comment counts per record, including per-field unresolved thread counts and current-user mention counts for badge rendering.
      security: [ { bearerAuth: [] } ]
      parameters:
        - in: query
          name: spreadsheetId
          required: true
          schema: { type: string }
        - in: query
          name: rowIds
          description: Optional comma-separated row ids to scope the summary response.
          schema: { type: string }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/CommentsSummaryResponse' }
        '400': { $ref: '#/components/responses/ValidationError' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
  /api/comments/{commentId}/read:
    post:
      summary: Mark a comment as read
      security: [ { bearerAuth: [] } ]
      parameters:
        - in: path
          name: commentId
          required: true
          schema: { type: string }
      responses:
        '204': { description: No Content }
        '400': { $ref: '#/components/responses/ValidationError' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
  /api/comments/{commentId}/resolve:
    post:
      summary: Resolve a comment
      security: [ { bearerAuth: [] } ]
      parameters:
        - in: path
          name: commentId
          required: true
          schema: { type: string }
      responses:
        '204': { description: No Content }
        '400': { $ref: '#/components/responses/ValidationError' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
