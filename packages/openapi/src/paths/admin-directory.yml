      summary: List directory departments
      security: [ { bearerAuth: [] } ]
      parameters:
        - in: path
          name: integrationId
          required: true
          schema: { type: string }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  data:
                    type: object
                    properties:
                      items:
                        type: array
                        items: { $ref: '#/components/schemas/DirectoryDepartment' }
                      actorId: { type: string }
                  meta: { type: object, additionalProperties: true }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
  /api/admin/directory/integrations/{integrationId}/accounts:
    get:
      summary: List directory accounts
      security: [ { bearerAuth: [] } ]
      parameters:
        - in: path
          name: integrationId
          required: true
          schema: { type: string }
        - in: query
          name: q
          schema: { type: string }
        - in: query
          name: page
          schema: { type: integer, default: 1 }
        - in: query
          name: pageSize
          schema: { type: integer, default: 20 }
        - in: query
          name: linkStatus
          schema:
            type: string
            enum: [pending, linked, conflict, ignored]
        - in: query
          name: isActive
          schema:
            type: boolean
        - in: query
          name: matchStrategy
          schema:
            type: string
            enum: [external_identity, email_exact, mobile_exact, manual]
        - in: query
          name: dingtalkAuthEnabled
          schema:
            type: boolean
        - in: query
          name: isBound
          schema:
            type: boolean
        - in: query
          name: departmentId
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  data:
                    type: object
                    properties:
                      total: { type: integer }
                      page: { type: integer }
                      pageSize: { type: integer }
                      pageCount: { type: integer }
                      hasNextPage: { type: boolean }
                      hasPreviousPage: { type: boolean }
                      summary:
                        type: object
                        properties:
                          linked: { type: integer }
                          pending: { type: integer }
                          conflict: { type: integer }
                          ignored: { type: integer }
                          active: { type: integer }
                          inactive: { type: integer }
                          dingtalkAuthEnabled: { type: integer }
                          dingtalkAuthDisabled: { type: integer }
                          bound: { type: integer }
                          unbound: { type: integer }
                      items:
                        type: array
                        items: { $ref: '#/components/schemas/DirectoryAccount' }
                  meta: { type: object, additionalProperties: true }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
  /api/admin/directory/integrations/{integrationId}/accounts/export.csv:
    get:
      summary: Export directory accounts as CSV
      security: [ { bearerAuth: [] } ]
      parameters:
        - in: path
          name: integrationId
          required: true
          schema: { type: string }
        - in: query
          name: q
          schema: { type: string }
        - in: query
          name: linkStatus
          schema:
            type: string
            enum: [pending, linked, conflict, ignored]
        - in: query
          name: isActive
          schema:
            type: boolean
        - in: query
          name: matchStrategy
          schema:
            type: string
            enum: [external_identity, email_exact, mobile_exact, manual]
        - in: query
          name: dingtalkAuthEnabled
          schema:
            type: boolean
        - in: query
          name: isBound
          schema:
            type: boolean
        - in: query
          name: departmentId
          schema:
            type: string
        - in: query
          name: limit
          schema:
            type: integer
            default: 5000
      responses:
        '200':
          description: CSV export
          headers:
            Content-Disposition:
              description: Suggested CSV filename for the exported directory accounts
              schema:
                type: string
            X-Export-Total:
              description: Total number of matching directory accounts before limit truncation
              schema:
                type: integer
            X-Export-Returned:
              description: Number of directory accounts returned in the CSV payload
              schema:
                type: integer
            X-Export-Truncated:
              description: Whether the export was truncated by the requested or default limit
              schema:
                type: boolean
          content:
            text/csv:
              schema:
                type: string
                format: binary
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
