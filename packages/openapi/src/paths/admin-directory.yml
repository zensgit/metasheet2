                      actorId: { type: string }
                  meta: { type: object, additionalProperties: true }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
  /api/admin/directory/integrations/{integrationId}/alerts/{alertId}/ack:
    post:
      summary: Acknowledge a directory sync alert
      security: [ { bearerAuth: [] } ]
      parameters:
        - in: path
          name: integrationId
          required: true
          schema: { type: string }
        - in: path
          name: alertId
          required: true
          schema: { type: string }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  data:
                    $ref: '#/components/schemas/DirectorySyncAlert'
                  meta: { type: object, additionalProperties: true }
        '400': { $ref: '#/components/responses/ValidationError' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
  /api/admin/directory/integrations/{integrationId}/departments:
