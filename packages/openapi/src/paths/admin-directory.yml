      summary: List directory sync alerts
      security: [ { bearerAuth: [] } ]
      parameters:
        - in: path
          name: integrationId
          required: true
          schema: { type: string }
        - in: query
          name: limit
          schema: { type: integer, default: 20 }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
