        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
  /api/admin/directory/integrations/{integrationId}/template-center:
    get:
      summary: Get directory template center
      security: [ { bearerAuth: [] } ]
      parameters:
        - in: path
          name: integrationId
