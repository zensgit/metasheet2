paths:
  /api/admin/directory/integrations:
    get:
      summary: List directory integrations
      security: [ { bearerAuth: [] } ]
      parameters:
        - in: query
          name: orgId
          schema: { type: string }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  data:
                    type: object
                    properties:
                      items:
                        type: array
                        items: { $ref: '#/components/schemas/DirectoryIntegration' }
                      actorId: { type: string }
                  meta: { type: object, additionalProperties: true }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
    post:
      summary: Create directory integration
      security: [ { bearerAuth: [] } ]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                orgId: { type: string }
                name: { type: string }
                corpId: { type: string }
                status: { type: string }
                syncEnabled: { type: boolean }
                scheduleCron: { type: string }
                defaultDeprovisionPolicy:
                  $ref: '#/components/schemas/DirectoryDeprovisionPolicy'
                appKey: { type: string }
                appSecret: { type: string }
                rootDepartmentId: { type: string }
                tokenUrl: { type: string }
                departmentsUrl: { type: string }
                usersUrl: { type: string }
                userDetailUrl: { type: string }
                pageSize: { type: integer }
                captureUnboundLogins: { type: boolean }
              required: [orgId, name, corpId, appKey, appSecret]
      responses:
        '200':
          description: Created
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  data:
                    $ref: '#/components/schemas/DirectoryIntegration'
                  meta: { type: object, additionalProperties: true }
        '400': { $ref: '#/components/responses/ValidationError' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '500': { description: Internal server error }
  /api/admin/directory/integrations/{integrationId}:
    patch:
      summary: Update directory integration
      security: [ { bearerAuth: [] } ]
      parameters:
        - in: path
          name: integrationId
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                orgId: { type: string }
                name: { type: string }
                corpId: { type: string }
                status: { type: string }
                syncEnabled: { type: boolean }
                scheduleCron: { type: string, nullable: true }
                defaultDeprovisionPolicy:
                  $ref: '#/components/schemas/DirectoryDeprovisionPolicy'
                appKey: { type: string }
                appSecret: { type: string }
                rootDepartmentId: { type: string }
                tokenUrl: { type: string }
                departmentsUrl: { type: string }
                usersUrl: { type: string }
                userDetailUrl: { type: string }
                pageSize: { type: integer }
                captureUnboundLogins: { type: boolean }
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  data:
                    $ref: '#/components/schemas/DirectoryIntegration'
                  meta: { type: object, additionalProperties: true }
        '400': { $ref: '#/components/responses/ValidationError' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '500': { description: Internal server error }
  /api/admin/directory/integrations/{integrationId}/test:
    post:
      summary: Test directory integration connectivity
      security: [ { bearerAuth: [] } ]
      parameters:
        - in: path
          name: integrationId
          required: true
          schema: { type: string }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  data:
                    $ref: '#/components/schemas/DirectorySyncTestResult'
                  meta: { type: object, additionalProperties: true }
        '400': { $ref: '#/components/responses/ValidationError' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '500': { description: Internal server error }
  /api/admin/directory/integrations/{integrationId}/sync:
    post:
      summary: Run directory sync
      security: [ { bearerAuth: [] } ]
      parameters:
        - in: path
          name: integrationId
          required: true
          schema: { type: string }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  data:
                    $ref: '#/components/schemas/DirectorySyncRun'
                  meta: { type: object, additionalProperties: true }
        '400': { $ref: '#/components/responses/ValidationError' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { description: Sync already running }
        '500': { description: Internal server error }
  /api/admin/directory/integrations/{integrationId}/runs:
    get:
      summary: List directory sync runs
      security: [ { bearerAuth: [] } ]
      parameters:
        - in: path
          name: integrationId
          required: true
          schema: { type: string }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  data:
                    type: object
                    properties:
                      items:
                        type: array
                        items: { $ref: '#/components/schemas/DirectorySyncRun' }
                      actorId: { type: string }
                  meta: { type: object, additionalProperties: true }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
  /api/admin/directory/integrations/{integrationId}/activity:
    get:
      summary: List directory activity history
      security: [ { bearerAuth: [] } ]
      parameters:
        - in: path
          name: integrationId
          required: true
          schema: { type: string }
        - in: query
          name: page
          schema: { type: integer, default: 1 }
        - in: query
          name: pageSize
          schema: { type: integer, default: 10, maximum: 100 }
        - in: query
          name: q
          schema: { type: string }
        - in: query
          name: action
          schema: { type: string }
        - in: query
          name: resourceType
          schema:
            type: string
            enum: [directory-integration, directory-account, directory-sync-alert, directory-template-center]
        - in: query
          name: accountId
          schema: { type: string }
        - in: query
          name: from
          schema: { type: string, format: date-time }
        - in: query
          name: to
          schema: { type: string, format: date-time }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  data:
                    type: object
                    properties:
                      total: { type: integer }
                      page: { type: integer }
                      pageSize: { type: integer }
                      pageCount: { type: integer }
                      hasNextPage: { type: boolean }
                      hasPreviousPage: { type: boolean }
                      summary:
                        $ref: '#/components/schemas/DirectoryActivitySummary'
                      items:
                        type: array
                        items:
                          $ref: '#/components/schemas/DirectoryActivity'
                  meta: { type: object, additionalProperties: true }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
  /api/admin/directory/integrations/{integrationId}/activity/export.csv:
    get:
      summary: Export directory activity history CSV
      security: [ { bearerAuth: [] } ]
      parameters:
        - in: path
          name: integrationId
          required: true
          schema: { type: string }
        - in: query
          name: q
          schema: { type: string }
        - in: query
          name: action
          schema: { type: string }
        - in: query
          name: resourceType
          schema:
            type: string
            enum: [directory-integration, directory-account, directory-sync-alert, directory-template-center]
        - in: query
          name: accountId
          schema: { type: string }
        - in: query
          name: from
          schema: { type: string, format: date-time }
        - in: query
          name: to
          schema: { type: string, format: date-time }
        - in: query
          name: limit
          schema: { type: integer, default: 5000, maximum: 10000 }
      responses:
        '200':
          description: CSV export
          headers:
            X-Export-Total:
              schema: { type: string }
            X-Export-Returned:
              schema: { type: string }
            X-Export-Truncated:
              schema: { type: string }
          content:
            text/csv:
              schema:
                type: string
                format: binary
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
  /api/admin/directory/integrations/{integrationId}/schedule-status:
    get:
      summary: Get directory schedule status
      security: [ { bearerAuth: [] } ]
      parameters:
        - in: path
          name: integrationId
          required: true
          schema: { type: string }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
