                  data:
                    $ref: '#/components/schemas/DirectoryTemplateCenter'
                  meta: { type: object, additionalProperties: true }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
    patch:
      summary: Save directory template center
      security: [ { bearerAuth: [] } ]
      parameters:
        - in: path
          name: integrationId
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                teamTemplates:
                  type: object
                  additionalProperties: true
                importHistory:
                  type: array
                  items:
                    type: object
                    additionalProperties: true
                importPresets:
                  type: object
                  additionalProperties: true
                changeReason:
                  type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  data:
                    $ref: '#/components/schemas/DirectoryTemplateCenter'
                  meta: { type: object, additionalProperties: true }
        '400': { $ref: '#/components/responses/ValidationError' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
  /api/admin/directory/integrations/{integrationId}/template-center/versions:
    get:
      summary: List directory template center versions
      security: [ { bearerAuth: [] } ]
      parameters:
