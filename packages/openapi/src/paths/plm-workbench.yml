                        enum: [archive, restore, delete]
                      processedIds:
                        type: array
                        items: { type: string }
                      skippedIds:
                        type: array
                        items: { type: string }
                      items:
                        type: array
                        items: *teamViewItem
                  metadata: *batchResultMeta
        '400': { $ref: '#/components/responses/ValidationError' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
