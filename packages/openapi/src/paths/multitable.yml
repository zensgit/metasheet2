paths:
  /api/multitable/bases:
    get:
      summary: List multitable bases
      security: [ { bearerAuth: [] } ]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  data:
                    type: object
                    properties:
                      bases:
                        type: array
                        items:
                          $ref: '#/components/schemas/MultitableBase'
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
    post:
      summary: Create multitable base
      security: [ { bearerAuth: [] } ]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                id: { type: string }
                name: { type: string }
                icon: { type: string }
                color: { type: string }
                ownerId: { type: string }
                workspaceId: { type: string }
              required: [name]
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  data:
                    type: object
                    properties:
                      base:
                        $ref: '#/components/schemas/MultitableBase'
        '400': { $ref: '#/components/responses/ValidationError' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
  /api/multitable/context:
    get:
      summary: Load multitable workbench context
      security: [ { bearerAuth: [] } ]
      parameters:
        - in: query
          name: baseId
          schema: { type: string }
        - in: query
          name: sheetId
          schema: { type: string }
          description: When `viewId` is omitted, provide `sheetId` to resolve the active sheet.
        - in: query
          name: viewId
          schema: { type: string }
          description: Alternative to `sheetId` for resolving the active sheet and view.
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  data:
                    $ref: '#/components/schemas/MultitableContext'
        '400': { $ref: '#/components/responses/ValidationError' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
  /api/multitable/sheets:
    get:
      summary: List multitable sheets
      security: [ { bearerAuth: [] } ]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  data:
                    type: object
                    properties:
                      sheets:
                        type: array
                        items:
                          $ref: '#/components/schemas/MultitableSheet'
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
    post:
      summary: Create multitable sheet
      security: [ { bearerAuth: [] } ]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                id: { type: string }
                baseId: { type: string }
                name: { type: string }
                description: { type: string }
                seed: { type: boolean }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  data:
                    type: object
                    properties:
                      sheet:
                        allOf:
                          - $ref: '#/components/schemas/MultitableSheet'
                          - type: object
                            properties:
                              seeded:
                                type: boolean
        '400': { $ref: '#/components/responses/ValidationError' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
  /api/multitable/sheets/{sheetId}:
    delete:
      summary: Delete a multitable sheet
      security: [ { bearerAuth: [] } ]
      parameters:
        - in: path
          name: sheetId
          required: true
          schema: { type: string }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  data:
                    type: object
                    properties:
                      deleted:
                        type: string
                    required: [deleted]
        '400': { $ref: '#/components/responses/ValidationError' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
  /api/multitable/sheets/{sheetId}/permissions:
    get:
      summary: List sheet permission assignments
      security: [ { bearerAuth: [] } ]
      parameters:
        - in: path
          name: sheetId
          required: true
          schema: { type: string }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  data:
                    type: object
                    properties:
                      items:
                        type: array
                        items:
                          $ref: '#/components/schemas/MultitableSheetPermissionEntry'
                    required: [items]
        '400': { $ref: '#/components/responses/ValidationError' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
  /api/multitable/sheets/{sheetId}/permission-candidates:
    get:
      summary: List candidate users for sheet permission authoring
      security: [ { bearerAuth: [] } ]
      parameters:
        - in: path
          name: sheetId
          required: true
          schema: { type: string }
        - in: query
          name: q
          schema: { type: string }
        - in: query
          name: limit
          schema: { type: integer, default: 20 }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  data:
                    type: object
                    properties:
                      items:
                        type: array
                        items:
                          $ref: '#/components/schemas/MultitableSheetPermissionCandidate'
                      total:
                        type: integer
                      limit:
                        type: integer
                      query:
                        type: string
                    required: [items, total, limit, query]
        '400': { $ref: '#/components/responses/ValidationError' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
  /api/multitable/sheets/{sheetId}/permissions/{userId}:
    put:
      summary: Set a sheet access level for a user
      security: [ { bearerAuth: [] } ]
      parameters:
        - in: path
          name: sheetId
          required: true
          schema: { type: string }
        - in: path
          name: userId
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                accessLevel:
                  type: string
                  enum: [read, write, write-own, none]
              required: [accessLevel]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  data:
                    type: object
                    properties:
                      userId:
                        type: string
                      accessLevel:
                        type: string
                        enum: [read, write, write-own, none]
                      entry:
                        allOf:
                          - $ref: '#/components/schemas/MultitableSheetPermissionEntry'
                        nullable: true
                    required: [userId, accessLevel, entry]
        '400': { $ref: '#/components/responses/ValidationError' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
  /api/multitable/fields:
    get:
      summary: List multitable fields
      security: [ { bearerAuth: [] } ]
      parameters:
        - in: query
          name: sheetId
          required: true
          schema: { type: string }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  data:
                    type: object
                    properties:
                      fields:
                        type: array
                        items:
                          $ref: '#/components/schemas/MultitableField'
                    required: [fields]
        '400': { $ref: '#/components/responses/ValidationError' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
    post:
      summary: Create a multitable field
      security: [ { bearerAuth: [] } ]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                id: { type: string }
                sheetId: { type: string }
                name: { type: string }
                type:
                  type: string
                  enum: [string, number, boolean, date, formula, select, link, lookup, rollup, attachment]
                property:
                  type: object
                  additionalProperties: true
                order:
                  type: integer
              required: [sheetId, name]
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  data:
                    type: object
                    properties:
                      field:
                        $ref: '#/components/schemas/MultitableField'
                    required: [field]
        '400': { $ref: '#/components/responses/ValidationError' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409':
          description: Conflict
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
  /api/multitable/fields/{fieldId}:
    patch:
      summary: Update a multitable field
      security: [ { bearerAuth: [] } ]
      parameters:
        - in: path
          name: fieldId
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string }
                type:
                  type: string
                  enum: [string, number, boolean, date, formula, select, link, lookup, rollup, attachment]
                property:
                  type: object
                  additionalProperties: true
                order:
                  type: integer
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  data:
                    type: object
                    properties:
                      field:
                        $ref: '#/components/schemas/MultitableField'
                    required: [field]
        '400': { $ref: '#/components/responses/ValidationError' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409':
          description: Conflict
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
    delete:
      summary: Delete a multitable field
      security: [ { bearerAuth: [] } ]
      parameters:
        - in: path
          name: fieldId
          required: true
          schema: { type: string }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  data:
                    type: object
                    properties:
                      deleted:
                        type: string
                    required: [deleted]
        '400': { $ref: '#/components/responses/ValidationError' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
  /api/multitable/views:
    get:
      summary: List multitable views
      security: [ { bearerAuth: [] } ]
      parameters:
        - in: query
          name: sheetId
          required: true
          schema: { type: string }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  data:
                    type: object
                    properties:
                      views:
                        type: array
                        items:
                          $ref: '#/components/schemas/MultitableView'
                    required: [views]
        '400': { $ref: '#/components/responses/ValidationError' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
    post:
      summary: Create a multitable view
      security: [ { bearerAuth: [] } ]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                id: { type: string }
                sheetId: { type: string }
                name: { type: string }
                type: { type: string }
                filterInfo:
                  type: object
                  additionalProperties: true
                sortInfo:
                  type: object
                  additionalProperties: true
                groupInfo:
                  type: object
                  additionalProperties: true
                hiddenFieldIds:
                  type: array
                  items: { type: string }
                config:
                  type: object
                  additionalProperties: true
              required: [sheetId, name]
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  data:
                    type: object
                    properties:
                      view:
                        $ref: '#/components/schemas/MultitableView'
                    required: [view]
        '400': { $ref: '#/components/responses/ValidationError' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
  /api/multitable/views/{viewId}:
    patch:
      summary: Update a multitable view
      security: [ { bearerAuth: [] } ]
      parameters:
        - in: path
          name: viewId
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string }
                type: { type: string }
                filterInfo:
                  type: object
                  additionalProperties: true
                sortInfo:
                  type: object
                  additionalProperties: true
                groupInfo:
                  type: object
                  additionalProperties: true
                hiddenFieldIds:
                  type: array
                  items: { type: string }
                config:
                  type: object
                  additionalProperties: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  data:
                    type: object
                    properties:
                      view:
                        $ref: '#/components/schemas/MultitableView'
                    required: [view]
        '400': { $ref: '#/components/responses/ValidationError' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
    delete:
      summary: Delete a multitable view
      security: [ { bearerAuth: [] } ]
      parameters:
        - in: path
          name: viewId
          required: true
          schema: { type: string }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  data:
                    type: object
                    properties:
                      deleted:
                        type: string
                    required: [deleted]
        '400': { $ref: '#/components/responses/ValidationError' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
  /api/multitable/view:
    get:
      summary: Load multitable grid view data
      security: [ { bearerAuth: [] } ]
      parameters:
        - in: query
          name: sheetId
          schema: { type: string }
          description: Provide `sheetId` when `viewId` is omitted.
        - in: query
          name: viewId
          schema: { type: string }
          description: Alternative to `sheetId`; at least one of `sheetId` or `viewId` should be provided.
        - in: query
          name: seed
          schema: { type: boolean }
        - in: query
          name: limit
          schema: { type: integer, minimum: 1, maximum: 5000 }
        - in: query
          name: offset
          schema: { type: integer, minimum: 0 }
        - in: query
          name: includeLinkSummaries
          schema: { type: boolean }
        - in: query
          name: search
          schema: { type: string }
          description: Case-insensitive partial match across text/number fields
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  data:
                    $ref: '#/components/schemas/MultitableViewData'
        '400': { $ref: '#/components/responses/ValidationError' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
  /api/multitable/person-fields/prepare:
    post:
      summary: Prepare a multitable person field preset
      security: [ { bearerAuth: [] } ]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                sheetId:
                  type: string
              required: [sheetId]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  data:
                    $ref: '#/components/schemas/MultitablePersonFieldPrepareResult'
        '400': { $ref: '#/components/responses/ValidationError' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
  /api/multitable/attachments:
    post:
      summary: Upload a multitable attachment
      security: [ { bearerAuth: [] } ]
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
                sheetId:
                  type: string
                recordId:
                  type: string
                  nullable: true
                fieldId:
                  type: string
                  nullable: true
              required: [file, sheetId]
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  data:
                    type: object
                    properties:
                      attachment:
                        $ref: '#/components/schemas/MultitableAttachment'
                    required: [attachment]
        '400': { $ref: '#/components/responses/ValidationError' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
  /api/multitable/attachments/{attachmentId}:
    get:
      summary: Download or preview a multitable attachment
      security: [ { bearerAuth: [] } ]
      parameters:
        - in: path
          name: attachmentId
          required: true
          schema: { type: string }
        - in: query
          name: thumbnail
          schema: { type: boolean }
          description: Best-effort image thumbnail preview; falls back to the original file stream.
      responses:
        '200':
          description: Attachment stream
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
            image/*:
              schema:
                type: string
                format: binary
        '400': { $ref: '#/components/responses/ValidationError' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
    delete:
      summary: Delete a multitable attachment
      security: [ { bearerAuth: [] } ]
      parameters:
        - in: path
          name: attachmentId
          required: true
          schema: { type: string }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  data:
                    type: object
                    properties:
                      deleted:
                        type: string
                    required: [deleted]
        '400': { $ref: '#/components/responses/ValidationError' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
  /api/multitable/form-context:
    get:
      summary: Load multitable form workbench context
      security: [ { bearerAuth: [] } ]
      parameters:
        - in: query
          name: sheetId
          schema: { type: string }
          description: Provide `sheetId` when `viewId` is omitted.
        - in: query
          name: viewId
          schema: { type: string }
          description: Alternative to `sheetId`; at least one of `sheetId` or `viewId` should be provided.
        - in: query
          name: recordId
          schema: { type: string }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  data:
                    $ref: '#/components/schemas/MultitableFormContext'
        '400': { $ref: '#/components/responses/ValidationError' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
  /api/multitable/records/{recordId}:
    get:
      summary: Load multitable record drawer context
      security: [ { bearerAuth: [] } ]
      parameters:
        - in: path
          name: recordId
          required: true
          schema: { type: string }
        - in: query
          name: sheetId
          schema: { type: string }
        - in: query
          name: viewId
          schema: { type: string }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  data:
                    $ref: '#/components/schemas/MultitableRecordContext'
        '400': { $ref: '#/components/responses/ValidationError' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
    patch:
      summary: Patch a single multitable record
      security: [ { bearerAuth: [] } ]
      parameters:
        - in: path
          name: recordId
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                sheetId:
                  type: string
                viewId:
                  type: string
                expectedVersion:
                  type: integer
                data:
                  type: object
                  additionalProperties: true
              anyOf:
                - required: [sheetId]
                - required: [viewId]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  data:
                    $ref: '#/components/schemas/MultitableRecordMutationResult'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ErrorResponse'
                  - type: object
                    properties:
                      error:
                        type: object
                        properties:
                          code:
                            type: string
                          message:
                            type: string
                          fieldErrors:
                            type: object
                            additionalProperties:
                              type: string
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409':
          description: Version conflict
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ErrorResponse'
                  - type: object
                    properties:
                      error:
                        type: object
                        properties:
                          code:
                            type: string
                          message:
                            type: string
                          serverVersion:
