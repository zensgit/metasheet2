paths:
  /api/auth/dev-token:
    get:
      summary: Issue dev token (non-production)
      parameters:
        - in: query
          name: userId
          schema: { type: string }
        - in: query
          name: roles
          schema: { type: string }
        - in: query
          name: perms
          schema: { type: string }
        - in: query
          name: expiresIn
          schema: { type: string }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  token: { type: string }
                  payload: { type: object }
        '404': { description: Not found }
  /api/auth/login:
    post:
      summary: User login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email: { type: string }
                password: { type: string }
              required: [email, password]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data:
                    type: object
                    properties:
                      user: { $ref: '#/components/schemas/User' }
                      token: { type: string }
        '400': { $ref: '#/components/responses/ValidationError' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '429': { description: Too many requests }
  /api/auth/register:
    post:
      summary: User registration
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string }
                email: { type: string }
                password: { type: string }
              required: [name, email, password]
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data:
                    type: object
                    properties:
                      user: { $ref: '#/components/schemas/User' }
                      token: { type: string }
        '400': { $ref: '#/components/responses/ValidationError' }
        '409': { description: Conflict }
        '429': { description: Too many requests }
  /api/auth/refresh-token:
    post:
      summary: Refresh JWT token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                token: { type: string }
              required: [token]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data:
                    type: object
                    properties:
                      token: { type: string }
        '400': { $ref: '#/components/responses/ValidationError' }
        '401': { $ref: '#/components/responses/Unauthorized' }
  /api/auth/verify:
    get:
      summary: Verify JWT token
      security: [ { bearerAuth: [] } ]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data:
                    type: object
                    properties:
                      user: { $ref: '#/components/schemas/User' }
        '401': { $ref: '#/components/responses/Unauthorized' }
  /api/auth/me:
    get:
      summary: Get current user
      security: [ { bearerAuth: [] } ]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data:
                    type: object
                    properties:
                      user: { $ref: '#/components/schemas/User' }
                      features:
                        type: object
                        description: Product capability flags for UI shells.
                        properties:
                          attendance: { type: boolean }
                          workflow: { type: boolean }
                          attendanceAdmin: { type: boolean }
                          attendanceImport: { type: boolean }
                          mode:
                            type: string
                            enum: [platform, attendance]
        '401': { $ref: '#/components/responses/Unauthorized' }
  /api/auth/sessions:
    get:
      summary: List user sessions
      security: [ { bearerAuth: [] } ]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data:
                    $ref: '#/components/schemas/UserSessionsResponse'
        '401': { $ref: '#/components/responses/Unauthorized' }
        '500': { description: Internal server error }
  /api/auth/sessions/{sessionId}/logout:
    post:
      summary: Revoke a specific session
      security: [ { bearerAuth: [] } ]
      parameters:
        - in: path
          name: sessionId
          required: true
          schema: { type: string }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data:
                    type: object
                    properties:
                      sessionId: { type: string }
        '400': { description: Bad request }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
        '500': { description: Internal server error }
  /api/auth/sessions/current/ping:
    post:
      summary: Heartbeat for current session
      security: [ { bearerAuth: [] } ]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data:
                    type: object
                    properties:
                      sessionId: { type: string }
                      session:
                        type: object
                        nullable: true
                        allOf:
                          - $ref: '#/components/schemas/UserSessionRecord'
                      lastSeenAt:
                        type: string
                        nullable: true
        '400': { description: Bad request }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '500': { description: Internal server error }
  /api/auth/logout:
    post:
      summary: Logout current sessions
      security: [ { bearerAuth: [] } ]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data:
                    type: object
                    properties:
                      scope:
                        type: string
                        enum: [current-session, all-sessions]
                      sessionId:
                        type: string
                        nullable: true
                      revokedAfter:
                        type: string
                        nullable: true
        '401': { $ref: '#/components/responses/Unauthorized' }
        '500': { description: Internal server error }
  /api/auth/sessions/others/logout:
    post:
      summary: Logout other sessions for current user
      security: [ { bearerAuth: [] } ]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data:
                    type: object
                    properties:
                      currentSessionId: { type: string }
                      revokedCount:
                        type: integer
                        minimum: 0
        '400': { description: Bad request }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '500': { description: Internal server error }
  /api/auth/dingtalk/launch:
    get:
      summary: Get DingTalk OAuth authorization URL
      description: |
        Returns the DingTalk authorization URL for the frontend to redirect to.
        Returns 503 if DingTalk env vars are not configured.
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data:
                    type: object
                    properties:
                      url:
                        type: string
                        description: DingTalk authorization URL
                      state:
                        type: string
                        description: CSRF state token
        '503':
          description: DingTalk not configured
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, example: false }
                  error: { type: string }
  /api/auth/dingtalk/callback:
    post:
      summary: Exchange DingTalk auth code for login session
      description: |
        Exchanges the DingTalk authorization code for a local user and JWT token.
        Same response shape as POST /api/auth/login.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                code:
                  type: string
                  description: DingTalk authorization code
                state:
                  type: string
                  description: CSRF state token
              required: [code, state]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data:
                    type: object
                    properties:
                      user:
                        type: object
                        properties:
                          id: { type: string }
                          email: { type: string }
                          name: { type: string }
                          role: { type: string }
                      token: { type: string }
                      features:
                        type: object
                        properties:
                          attendance: { type: boolean }
                          workflow: { type: boolean }
                          attendanceAdmin: { type: boolean }
                          attendanceImport: { type: boolean }
                          mode: { type: string, enum: [platform, attendance] }
        '400':
          description: |
            Request validation failed. Possible errors:
            - Missing required parameter: code
            - Missing required parameter: state
            - Invalid or unknown state parameter
            - State parameter has expired
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, example: false }
                  error: { type: string }
        '502':
          description: DingTalk API error
        '503':
          description: DingTalk not configured
