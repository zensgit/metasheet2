paths:
  /api/auth/dev-token:
    get:
      summary: Issue dev token (non-production)
      parameters:
        - in: query
          name: userId
          schema: { type: string }
        - in: query
          name: roles
          schema: { type: string }
        - in: query
          name: perms
          schema: { type: string }
        - in: query
          name: expiresIn
          schema: { type: string }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  token: { type: string }
                  payload: { type: object }
        '404': { description: Not found }
  /api/auth/login:
    post:
      summary: User login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email: { type: string }
                password: { type: string }
              required: [email, password]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data:
                    type: object
                    properties:
                      user: { $ref: '#/components/schemas/User' }
                      token: { type: string }
        '400': { $ref: '#/components/responses/ValidationError' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '429': { description: Too many requests }
  /api/auth/register:
    post:
      summary: User registration
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string }
                email: { type: string }
                password: { type: string }
              required: [name, email, password]
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data:
                    type: object
                    properties:
                      user: { $ref: '#/components/schemas/User' }
                      token: { type: string }
        '400': { $ref: '#/components/responses/ValidationError' }
        '409': { description: Conflict }
        '429': { description: Too many requests }
  /api/auth/dingtalk/login-url:
    get:
      summary: Prepare DingTalk login URL
      parameters:
        - in: query
          name: redirect
          schema: { type: string }
          description: In-app redirect path after successful login.
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data:
                    type: object
                    properties:
                      provider:
                        type: string
                        enum: [dingtalk]
                      url: { type: string }
                      loginUrl: { type: string }
                      state: { type: string }
                      redirect: { type: string }
        '429': { description: Too many requests }
        '503': { description: DingTalk auth is not configured }
  /api/auth/dingtalk/bind/start:
    post:
      summary: Prepare DingTalk bind URL for the current user
      security: [ { bearerAuth: [] } ]
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                redirect: { type: string }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data:
                    type: object
                    properties:
                      provider:
                        type: string
                        enum: [dingtalk]
                      url: { type: string }
                      bindUrl: { type: string }
                      state: { type: string }
                      redirect: { type: string }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '503': { description: DingTalk auth is not configured }
  /api/auth/dingtalk/exchange:
    post:
      summary: Exchange a DingTalk authorization code for a MetaSheet session
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                code: { type: string }
                state: { type: string }
              required: [code, state]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data:
                    type: object
                    properties:
                      provider:
                        type: string
                        enum: [dingtalk]
                      mode:
                        type: string
                        enum: [login, bind]
                      redirect: { type: string }
                      redirectUrl: { type: string }
                      token:
                        type: string
                        nullable: true
                      user:
                        $ref: '#/components/schemas/User'
                      binding:
                        $ref: '#/components/schemas/ExternalIdentityBinding'
                      features:
                        $ref: '#/components/schemas/ProductFeatures'
                      provisioned: { type: boolean }
                      onboarding:
                        type: object
                        nullable: true
                        additionalProperties: true
        '400': { description: Invalid request or auth state }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { description: Bind mismatch or corp not allowed }
        '409': { description: Existing local user or conflicting binding }
        '422': { description: DingTalk identity is incomplete }
        '429': { description: Too many requests }
        '503': { description: DingTalk auth is not configured }
  /api/auth/dingtalk/bindings:
    get:
      summary: List DingTalk bindings for the current user
      security: [ { bearerAuth: [] } ]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data:
                    type: object
                    properties:
                      items:
                        type: array
                        items:
                          $ref: '#/components/schemas/ExternalIdentityBinding'
        '401': { $ref: '#/components/responses/Unauthorized' }
  /api/auth/dingtalk/bindings/{provider}/{bindingId}/unbind:
    post:
      summary: Unbind a DingTalk identity from the current user
      security: [ { bearerAuth: [] } ]
      parameters:
        - in: path
          name: provider
          required: true
          schema:
            type: string
            enum: [dingtalk]
        - in: path
          name: bindingId
          required: true
          schema: { type: string }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data:
                    type: object
                    properties:
                      removed:
                        $ref: '#/components/schemas/ExternalIdentityBinding'
        '400': { description: Invalid provider or binding id }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
  /api/auth/refresh-token:
    post:
      summary: Refresh JWT token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                token: { type: string }
              required: [token]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data:
                    type: object
                    properties:
                      token: { type: string }
        '400': { $ref: '#/components/responses/ValidationError' }
        '401': { $ref: '#/components/responses/Unauthorized' }
  /api/auth/verify:
    get:
      summary: Verify JWT token
      security: [ { bearerAuth: [] } ]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data:
                    type: object
                    properties:
                      user: { $ref: '#/components/schemas/User' }
        '401': { $ref: '#/components/responses/Unauthorized' }
  /api/auth/me:
    get:
      summary: Get current user
      security: [ { bearerAuth: [] } ]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data:
                    type: object
                    properties:
                      user: { $ref: '#/components/schemas/User' }
                      features:
                        type: object
                        description: Product capability flags for UI shells.
                        properties:
                          attendance: { type: boolean }
                          workflow: { type: boolean }
                          attendanceAdmin: { type: boolean }
                          attendanceImport: { type: boolean }
                          mode:
                            type: string
                            enum: [platform, attendance]
        '401': { $ref: '#/components/responses/Unauthorized' }
  /api/auth/sessions:
    get:
      summary: List user sessions
      security: [ { bearerAuth: [] } ]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data:
                    $ref: '#/components/schemas/UserSessionsResponse'
        '401': { $ref: '#/components/responses/Unauthorized' }
        '500': { description: Internal server error }
  /api/auth/sessions/{sessionId}/logout:
    post:
      summary: Revoke a specific session
      security: [ { bearerAuth: [] } ]
      parameters:
        - in: path
          name: sessionId
          required: true
          schema: { type: string }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data:
                    type: object
                    properties:
                      sessionId: { type: string }
        '400': { description: Bad request }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
        '500': { description: Internal server error }
  /api/auth/sessions/current/ping:
    post:
      summary: Heartbeat for current session
      security: [ { bearerAuth: [] } ]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data:
                    type: object
                    properties:
                      sessionId: { type: string }
                      session:
                        type: object
                        nullable: true
                        allOf:
                          - $ref: '#/components/schemas/UserSessionRecord'
                      lastSeenAt:
                        type: string
                        nullable: true
        '400': { description: Bad request }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '500': { description: Internal server error }
  /api/auth/logout:
    post:
      summary: Logout current sessions
      security: [ { bearerAuth: [] } ]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data:
                    type: object
                    properties:
                      scope:
                        type: string
                        enum: [current-session, all-sessions]
                      sessionId:
                        type: string
                        nullable: true
                      revokedAfter:
                        type: string
                        nullable: true
        '401': { $ref: '#/components/responses/Unauthorized' }
        '500': { description: Internal server error }
  /api/auth/sessions/others/logout:
    post:
      summary: Logout other sessions for current user
      security: [ { bearerAuth: [] } ]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data:
                    type: object
                    properties:
                      currentSessionId: { type: string }
                      revokedCount:
                        type: integer
                        minimum: 0
        '400': { description: Bad request }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '500': { description: Internal server error }
