paths:
  /api/approvals:
    get:
      operationId: listApprovals
      tags: [Approvals]
      summary: List approval instances
      description: |
        Returns a paginated list of approval instances. The live route accepts
        both page/pageSize and the older limit/offset pagination fallback.
        Use `tab` for the current inbox lens, plus optional sourceSystem,
        workflowKey, businessKey, assignee, status, and search filters.
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: sourceSystem
          schema:
            type: string
        - in: query
          name: status
          schema:
            type: string
        - in: query
          name: workflowKey
          schema:
            type: string
        - in: query
          name: businessKey
          schema:
            type: string
        - in: query
          name: assignee
          schema:
            type: string
        - in: query
          name: tab
          schema:
            type: string
        - in: query
          name: search
          schema:
            type: string
        - in: query
          name: page
          schema:
            type: integer
            minimum: 1
        - in: query
          name: pageSize
          schema:
            type: integer
            minimum: 1
            maximum: 200
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 200
        - in: query
          name: offset
          schema:
            type: integer
            minimum: 0
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApprovalListResponse'
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '503': { $ref: '#/components/responses/ServiceUnavailable' }
    post:
      operationId: createApproval
      tags: [Approvals]
      summary: Create approval request from a published template
      description: |
        Initiates a new approval instance from a published template. The formData
        is validated against the template's formSchema (required fields, type
        checks, enum legality). Returns 400 if the template is not published or
        form validation fails. On success, generates request number (AP-XXXXXX).
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateApprovalRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnifiedApprovalDTO'
        '400': { $ref: '#/components/responses/ValidationError' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '503': { $ref: '#/components/responses/ServiceUnavailable' }
  /api/approvals/pending:
    get:
      operationId: listPendingApprovalsLegacy
      tags: [Approvals (Legacy)]
      deprecated: true
      summary: Get pending approvals for current actor
      description: |
        Deprecated. Use GET /api/approvals with `tab=pending` instead.
      parameters:
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 200
        - in: query
          name: offset
          schema:
            type: integer
            minimum: 0
      security:
        - bearerAuth: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LegacyPendingApprovalListResponse'
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '503': { $ref: '#/components/responses/ServiceUnavailable' }
  /api/approvals/sync/plm:
    post:
      operationId: syncPlmApprovals
      tags: [Approvals]
      summary: Trigger a PLM approval sync
      description: |
        Pulls approval instances from the PLM bridge into the unified approval
        inbox. Requires approvals:read and a configured PLM adapter.
      security:
        - bearerAuth: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                status:
                  type: string
                productId:
                  type: string
                requesterId:
                  type: string
                limit:
                  type: integer
                  minimum: 1
                  maximum: 200
                offset:
                  type: integer
                  minimum: 0
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApprovalPlmSyncResponse'
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '503': { $ref: '#/components/responses/ServiceUnavailable' }
  /api/approvals/{id}:
    get:
      operationId: getApproval
      tags: [Approvals]
      summary: Get approval instance
      description: |
        Returns the full approval instance including formSnapshot, assignments,
        and current status. PLM-backed approvals (id starting with 'plm:') are
        resolved via the PLM adapter.
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnifiedApprovalDTO'
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '503': { $ref: '#/components/responses/ServiceUnavailable' }
  /api/approvals/{id}/actions:
    post:
      operationId: dispatchApprovalAction
      tags: [Approvals]
      summary: Execute an approval action
      description: |
        Unified action dispatch endpoint. Accepted actions: approve, reject,
        transfer (requires targetUserId), revoke (subject to RuntimePolicy),
        comment (does not change status), and return (requires targetNodeKey).
        Concurrent writes are serialized with a database row lock. This endpoint
        does not accept a client version field. 409 responses indicate a
        conflicting current state after serialization, such as an invalid status
        transition or a closed revoke window. The Wave 2 Pack 1A executor
        follow-up will activate return semantics for template-runtime approvals.
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ApprovalActionRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnifiedApprovalDTO'
        '400': { $ref: '#/components/responses/ValidationError' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409':
          description: Conflict or invalid state transition
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '503': { $ref: '#/components/responses/ServiceUnavailable' }
  /api/approvals/{id}/approve:
    post:
      operationId: approveApprovalLegacy
      tags: [Approvals (Legacy)]
      deprecated: true
      summary: Approve instance with optimistic locking
      description: |
        Deprecated. Use POST /api/approvals/{id}/actions with {"action":"approve"} instead.
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                version:
                  type: integer
                comment:
                  type: string
                metadata:
                  type: object
                  additionalProperties: true
              required: [version]
      responses:
        '200': { description: OK }
        '400': { $ref: '#/components/responses/ValidationError' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409':
          description: Version conflict
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '503': { $ref: '#/components/responses/ServiceUnavailable' }
  /api/approvals/{id}/reject:
    post:
      operationId: rejectApprovalLegacy
      tags: [Approvals (Legacy)]
      deprecated: true
      summary: Reject instance with optimistic locking
      description: |
        Deprecated. Use POST /api/approvals/{id}/actions with {"action":"reject"} instead.
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                version:
                  type: integer
                reason:
                  type: string
                comment:
                  type: string
                metadata:
                  type: object
                  additionalProperties: true
              required: [version]
      responses:
        '200': { description: OK }
        '400': { $ref: '#/components/responses/ValidationError' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409':
          description: Version conflict
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '503': { $ref: '#/components/responses/ServiceUnavailable' }
  /api/approvals/{id}/return:
    post:
      operationId: returnApprovalLegacy
      tags: [Approvals (Legacy)]
      deprecated: true
      summary: Return instance with optimistic locking
      description: |
        Deprecated. Use POST /api/approvals/{id}/actions with
        {"action":"return","targetNodeKey":"..."} instead.
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                version:
                  type: integer
              required: [version]
      responses:
        '200': { description: OK }
        '400': { $ref: '#/components/responses/ValidationError' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '409':
          description: Version conflict
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/approvals/{id}/revoke:
    post:
      operationId: revokeApprovalLegacy
      tags: [Approvals (Legacy)]
      deprecated: true
      summary: Revoke instance with optimistic locking
      description: |
        Deprecated. Use POST /api/approvals/{id}/actions with {"action":"revoke"} instead.
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                version:
                  type: integer
              required: [version]
      responses:
        '200': { description: OK }
        '400': { $ref: '#/components/responses/ValidationError' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '409':
          description: Version conflict
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/approvals/{id}/history:
    get:
      operationId: getApprovalHistory
      tags: [Approvals]
      summary: Get approval history
      description: |
        Returns the paginated action history for an approval instance, including
        create, approve, reject, transfer, revoke, and comment events with
        actor details and timestamps.
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
        - in: query
          name: page
          schema:
            type: integer
            default: 1
        - in: query
          name: pageSize
          schema:
            type: integer
            default: 50
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApprovalHistoryResponse'
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '503': { $ref: '#/components/responses/ServiceUnavailable' }
  /api/approvals/pending-count:
    get:
      operationId: getApprovalPendingCount
      tags: [Approvals]
      summary: Get pending approval badge counts
      description: |
        Returns the current actor's active pending assignment count and the
        unread subset used by the approval center badge.
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: sourceSystem
          schema:
            type: string
            enum: [all, platform, plm]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApprovalPendingCountResponse'
        '400': { $ref: '#/components/responses/ValidationError' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '503': { $ref: '#/components/responses/ServiceUnavailable' }
  /api/approvals/{id}/mark-read:
    post:
      operationId: markApprovalRead
      tags: [Approvals]
      summary: Mark one approval as read
      description: |
        Records a read marker for the current actor. For unsynced external
        approvals the route returns `{ ok: true, skipped: true }`.
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MarkApprovalReadResponse'
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '503': { $ref: '#/components/responses/ServiceUnavailable' }
  /api/approvals/mark-all-read:
    post:
      operationId: markAllApprovalsRead
      tags: [Approvals]
      summary: Mark all pending approvals as read
      description: |
        Marks every active pending assignment for the current actor as read.
        `sourceSystem` scopes the operation to the current inbox filter.
      security:
        - bearerAuth: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                sourceSystem:
                  type: string
                  enum: [all, platform, plm]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MarkAllApprovalsReadResponse'
        '400': { $ref: '#/components/responses/ValidationError' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '503': { $ref: '#/components/responses/ServiceUnavailable' }
  /api/approvals/{id}/remind:
    post:
      operationId: remindApproval
      tags: [Approvals]
      summary: Remind pending approvers
      description: |
        Records a remind event for a pending approval. The requester or an
        approver may call it. The route is rate-limited to once per instance
        per actor per hour and returns 429 with the last remind timestamp when
        throttled.
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RemindApprovalResponse'
        '400': { $ref: '#/components/responses/ValidationError' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '429':
          description: Remind throttled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '503': { $ref: '#/components/responses/ServiceUnavailable' }
  /api/approvals/metrics/report:
    get:
      operationId: getApprovalMetricsReport
      tags: [Approvals]
      summary: Get approval metrics TopN report
      description: |
        Returns admin-only approval observability data: the existing metrics
        summary plus TopN slowest completed instances and templates with the
        highest SLA breach rate.
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: since
          schema:
            type: string
            format: date-time
        - in: query
          name: until
          schema:
            type: string
            format: date-time
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 50
            default: 10
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      summary:
                        type: object
                        properties:
                          total: { type: integer }
                          approved: { type: integer }
                          rejected: { type: integer }
                          revoked: { type: integer }
                          returned: { type: integer }
                          running: { type: integer }
                          avgDurationSeconds: { type: number, nullable: true }
                          p50DurationSeconds: { type: number, nullable: true }
                          p95DurationSeconds: { type: number, nullable: true }
                          slaBreachCount: { type: integer }
                          slaCandidateCount: { type: integer }
                          slaBreachRate: { type: number }
                          byTemplate:
                            type: array
                            items:
                              type: object
                              properties:
                                templateId: { type: string, nullable: true }
                                total: { type: integer }
                                approved: { type: integer }
                                rejected: { type: integer }
                                revoked: { type: integer }
                                avgDurationSeconds: { type: number, nullable: true }
                                slaBreachRate: { type: number }
                      slowestInstances:
                        type: array
                        items:
                          type: object
                          properties:
                            instanceId: { type: string }
                            templateId: { type: string, nullable: true }
                            startedAt: { type: string, format: date-time }
                            terminalAt: { type: string, format: date-time, nullable: true }
                            terminalState:
                              type: string
                              nullable: true
                              enum: [approved, rejected, revoked, returned]
                            durationSeconds: { type: integer }
                            slaHours: { type: integer, nullable: true }
                            slaBreached: { type: boolean }
                            slaBreachedAt: { type: string, format: date-time, nullable: true }
                      breachedTemplates:
                        type: array
                        items:
                          type: object
                          properties:
                            templateId: { type: string, nullable: true }
                            total: { type: integer }
                            slaCandidateCount: { type: integer }
                            slaBreachCount: { type: integer }
                            slaBreachRate: { type: number }
                            avgDurationSeconds: { type: number, nullable: true }
                            p95DurationSeconds: { type: number, nullable: true }
                    required: [summary, slowestInstances, breachedTemplates]
                required: [ok, data]
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '500':
          description: Internal server error
  /api/approval-templates:
    get:
      operationId: listApprovalTemplates
      tags: [Approval Templates]
      summary: List approval templates
      description: |
        Returns a paginated list of approval templates. Supports search by name
        and filtering by status/category. Non-template-managers only receive
        templates visible to their actor scope (`all`, matching department,
        role, or user). Template managers can see all templates.
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: search
          schema:
            type: string
        - in: query
          name: status
          schema:
            type: string
            enum: [draft, published, archived]
        - in: query
          name: category
          schema:
            type: string
        - in: query
          name: page
          schema:
            type: integer
            minimum: 1
        - in: query
          name: pageSize
          schema:
            type: integer
            minimum: 1
            maximum: 200
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/ApprovalTemplateListItem'
                  total:
                    type: integer
                  limit:
                    type: integer
                    description: Effective page size.
                  offset:
                    type: integer
                    description: Zero-based offset derived from page/pageSize.
                required: [data, total, limit, offset]
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
    post:
      operationId: createApprovalTemplate
      tags: [Approval Templates]
      summary: Create approval template
      description: |
        Creates a new approval template in draft status. Requires key (unique),
        name, formSchema (with fields), and approvalGraph (nodes + edges).
        The template must be published before it can be used to initiate approvals.
        Optional category and visibilityScope metadata live on the parent
        template row and do not become version snapshots.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateApprovalTemplateRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApprovalTemplateDetail'
        '400': { $ref: '#/components/responses/ValidationError' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
  /api/approval-templates/categories:
    get:
      operationId: listApprovalTemplateCategories
      tags: [Approval Templates]
      summary: List approval template categories
      description: |
        Returns distinct non-null categories visible to the current actor.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: string
                required: [data]
        '401': { $ref: '#/components/responses/Unauthorized' }
  /api/approval-templates/{id}:
    get:
      operationId: getApprovalTemplate
      tags: [Approval Templates]
      summary: Get approval template detail
      description: |
        Returns the full template including formSchema and approvalGraph when
        the current actor can see the template. Template managers can see all
        templates.
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApprovalTemplateDetail'
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
    patch:
      operationId: updateApprovalTemplate
      tags: [Approval Templates]
      summary: Update approval template draft
      description: |
        Updates an existing template. formSchema/approvalGraph updates create a
        new version; metadata-only updates such as category or visibilityScope
        update the parent row in place. All fields are optional.
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateApprovalTemplateRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApprovalTemplateDetail'
        '400': { $ref: '#/components/responses/ValidationError' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
  /api/approval-templates/{id}/clone:
    post:
      operationId: cloneApprovalTemplate
      tags: [Approval Templates]
      summary: Clone approval template
      description: |
        Clones an existing template's latest formSchema/approvalGraph into a
        new draft template. Category and visibilityScope are copied; published
        definitions and version history are not copied.
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApprovalTemplateDetail'
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409':
          description: Clone key conflict
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/approval-templates/{id}/publish:
    post:
      operationId: publishApprovalTemplate
      tags: [Approval Templates]
      summary: Publish approval template
      description: |
        Publishes the latest draft version of a template. Requires a RuntimePolicy
        (allowRevoke, optional revokeBeforeNodeKeys). Generates a
        publishedDefinition and runtimeGraph. After publishing, the template can
        be used to initiate new approval instances.
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PublishApprovalTemplateRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApprovalTemplateVersionDetail'
        '400': { $ref: '#/components/responses/ValidationError' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
  /api/approval-templates/{id}/versions/{versionId}:
    get:
      operationId: getApprovalTemplateVersion
      tags: [Approval Templates]
      summary: Get approval template version detail
      description: |
        Returns a specific version of a template. Published versions include the
        runtimeGraph with policy; draft versions have runtimeGraph set to null.
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
        - in: path
          name: versionId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApprovalTemplateVersionDetail'
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
