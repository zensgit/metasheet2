paths:
  /api/approvals/pending:
    get:
      summary: Get pending approvals for current actor
      security:
        - bearerAuth: []
      responses:
        '200': { description: OK }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '503': { $ref: '#/components/responses/ServiceUnavailable' }
  /api/approvals/{id}:
    get:
      summary: Get approval instance
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        '200': { description: OK }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '503': { $ref: '#/components/responses/ServiceUnavailable' }
  /api/approvals/{id}/approve:
    post:
      summary: Approve instance with optimistic locking
      security: [ { bearerAuth: [] } ]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                version: { type: integer }
                comment: { type: string }
                metadata: { type: object }
              required: [version]
            examples:
              approve:
                value:
                  version: 0
                  comment: 'LGTM'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean, example: true }
                  data:
                    type: object
                    properties:
                      id: { type: string, example: demo-1 }
                      status: { type: string, example: approved }
                      version: { type: integer, example: 1 }
                      prevVersion: { type: integer, example: 0 }
        '400': { $ref: '#/components/responses/ValidationError' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409':
          description: Version conflict
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
              examples:
                conflict:
                  value:
                    ok: false
                    error:
                      code: APPROVAL_VERSION_CONFLICT
                      message: Approval instance version mismatch
                      currentVersion: 1
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '503': { $ref: '#/components/responses/ServiceUnavailable' }
  /api/approvals/{id}/reject:
    post:
      summary: Reject instance with optimistic locking
      security: [ { bearerAuth: [] } ]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              description: Either `reason` or `comment` must be supplied.
              properties:
                version: { type: integer }
                reason: { type: string }
                comment: { type: string }
                metadata: { type: object }
              required: [version]
            examples:
              reject:
                value:
                  version: 1
                  comment: 'Needs revision'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean, example: true }
                  data:
                    type: object
                    properties:
                      id: { type: string, example: demo-1 }
                      status: { type: string, example: rejected }
                      version: { type: integer, example: 2 }
                      prevVersion: { type: integer, example: 1 }
        '400': { $ref: '#/components/responses/ValidationError' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409':
          description: Version conflict
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
              examples:
                conflict:
                  value:
                    ok: false
                    error:
                      code: APPROVAL_VERSION_CONFLICT
                      message: Approval instance version mismatch
                      currentVersion: 2
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '503': { $ref: '#/components/responses/ServiceUnavailable' }
  /api/approvals/{id}/return:
    post:
      summary: Return instance with optimistic locking
      security: [ { bearerAuth: [] } ]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties: { version: { type: integer } }
              required: [version]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean, example: true }
                  data:
                    type: object
                    properties:
                      id: { type: string, example: demo-1 }
                      status: { type: string, example: RETURNED }
                      version: { type: integer, example: 3 }
                      prevVersion: { type: integer, example: 2 }
        '409': { $ref: '#/components/responses/ValidationError' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
  /api/approvals/{id}/revoke:
    post:
      summary: Revoke instance with optimistic locking
      security: [ { bearerAuth: [] } ]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties: { version: { type: integer } }
              required: [version]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean, example: true }
                  data:
                    type: object
                    properties:
                      id: { type: string, example: demo-1 }
                      status: { type: string, example: REVOKED }
                      version: { type: integer, example: 4 }
                      prevVersion: { type: integer, example: 3 }
        '409': { $ref: '#/components/responses/ValidationError' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
  /api/approvals/{id}/history:
    get:
      summary: Get approval history (from approval_records)
      security: [ { bearerAuth: [] } ]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
        - in: query
          name: page
          schema: { type: integer, default: 1 }
        - in: query
          name: pageSize
          schema: { type: integer, default: 50 }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean, example: true }
                  data:
                    type: object
                    properties:
                      items:
                        type: array
                        items:
                          type: object
                          properties:
                            id: { type: string, example: rec-1 }
                            occurred_at: { type: string, format: date-time, example: '2025-09-19T09:12:00Z' }
                            actor_id: { type: string, example: u1 }
                            actor_name: { type: string, example: Reviewer One }
                            action: { type: string, example: approve }
                            comment: { type: string, example: LGTM }
                            from_status: { type: string, example: PENDING }
                            to_status: { type: string, example: APPROVED }
                            version: { type: integer, example: 1 }
                            from_version: { type: integer, nullable: true, example: 0 }
                            to_version: { type: integer, example: 1 }
                      page: { type: integer, example: 1 }
                      pageSize: { type: integer, example: 50 }
                      total: { type: integer, example: 4 }
              examples:
                sample:
                  value:
                    ok: true
                    data:
                      items:
                        - id: 'rec-1'
                          occurred_at: '2025-09-19T09:12:00Z'
                          actor_id: 'u1'
                          actor_name: 'Reviewer One'
                          action: 'approve'
                          comment: 'LGTM'
                          from_status: 'PENDING'
                          to_status: 'APPROVED'
                          version: 1
                          from_version: 0
                          to_version: 1
                      page: 1
                      pageSize: 50
                      total: 4
        '403': { $ref: '#/components/responses/Forbidden' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '503': { $ref: '#/components/responses/ServiceUnavailable' }
