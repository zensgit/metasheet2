paths:
  /api/approvals:
    get:
      operationId: listApprovals
      tags: [Approvals]
      summary: List platform approval instances
      description: |
        Returns a paginated list of approval instances. Use query parameters to
        filter by tab: pending (assignee), mine (requesterId), cc (ccRecipientId),
        or completed (status=approved,rejected,revoked).
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: status
          schema:
            type: string
        - in: query
          name: requesterId
          schema:
            type: string
        - in: query
          name: assignee
          schema:
            type: string
        - in: query
          name: ccRecipientId
          schema:
            type: string
        - in: query
          name: templateId
          schema:
            type: string
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 200
        - in: query
          name: offset
          schema:
            type: integer
            minimum: 0
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      items:
                        type: array
                        items:
                          $ref: '#/components/schemas/UnifiedApprovalDTO'
                      total:
                        type: integer
                      limit:
                        type: integer
                      offset:
                        type: integer
                    required: [items, total, limit, offset]
                required: [ok, data]
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '503': { $ref: '#/components/responses/ServiceUnavailable' }
    post:
      operationId: createApproval
      tags: [Approvals]
      summary: Create approval request from a published template
      description: |
        Initiates a new approval instance from a published template. The formData
        is validated against the template's formSchema (required fields, type
        checks, enum legality). Returns 400 if the template is not published or
        form validation fails. On success, generates request number (AP-XXXXXX).
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateApprovalRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    example: true
                  data:
                    $ref: '#/components/schemas/UnifiedApprovalDTO'
                required: [ok, data]
        '400': { $ref: '#/components/responses/ValidationError' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '503': { $ref: '#/components/responses/ServiceUnavailable' }
  /api/approvals/pending:
    get:
      operationId: listPendingApprovalsLegacy
      tags: [Approvals (Legacy)]
      deprecated: true
      summary: Get pending approvals for current actor
      description: |
        Deprecated. Use GET /api/approvals?assignee={userId}&status=pending instead.
      security:
        - bearerAuth: []
      responses:
        '200': { description: OK }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '503': { $ref: '#/components/responses/ServiceUnavailable' }
  /api/approvals/{id}:
    get:
      operationId: getApproval
      tags: [Approvals]
      summary: Get approval instance
      description: |
        Returns the full approval instance including formSnapshot, assignments,
        and current status. PLM-backed approvals (id starting with 'plm:') are
        resolved via the PLM adapter.
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    example: true
                  data:
                    $ref: '#/components/schemas/UnifiedApprovalDTO'
                required: [ok, data]
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '503': { $ref: '#/components/responses/ServiceUnavailable' }
  /api/approvals/{id}/actions:
    post:
      operationId: dispatchApprovalAction
      tags: [Approvals]
      summary: Execute an approval action
      description: |
        Unified action dispatch endpoint. Supported actions: approve, reject,
        transfer (requires targetUserId), revoke (subject to RuntimePolicy), and
        comment (does not change status). Concurrent writes are serialized with a
        database row lock. This endpoint does not accept a client version field.
        409 responses indicate a conflicting current state after serialization,
        such as an invalid status transition or a closed revoke window.
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ApprovalActionRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    example: true
                  data:
                    $ref: '#/components/schemas/UnifiedApprovalDTO'
                required: [ok, data]
        '400': { $ref: '#/components/responses/ValidationError' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409':
          description: Conflict or invalid state transition
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '503': { $ref: '#/components/responses/ServiceUnavailable' }
  /api/approvals/{id}/approve:
    post:
      operationId: approveApprovalLegacy
      tags: [Approvals (Legacy)]
      deprecated: true
      summary: Approve instance with optimistic locking
      description: |
        Deprecated. Use POST /api/approvals/{id}/actions with {"action":"approve"} instead.
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                version:
                  type: integer
                comment:
                  type: string
                metadata:
                  type: object
                  additionalProperties: true
              required: [version]
      responses:
        '200': { description: OK }
        '400': { $ref: '#/components/responses/ValidationError' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409':
          description: Version conflict
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '503': { $ref: '#/components/responses/ServiceUnavailable' }
  /api/approvals/{id}/reject:
    post:
      operationId: rejectApprovalLegacy
      tags: [Approvals (Legacy)]
      deprecated: true
      summary: Reject instance with optimistic locking
      description: |
        Deprecated. Use POST /api/approvals/{id}/actions with {"action":"reject"} instead.
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                version:
                  type: integer
                reason:
                  type: string
                comment:
                  type: string
                metadata:
                  type: object
                  additionalProperties: true
              required: [version]
      responses:
        '200': { description: OK }
        '400': { $ref: '#/components/responses/ValidationError' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409':
          description: Version conflict
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '503': { $ref: '#/components/responses/ServiceUnavailable' }
  /api/approvals/{id}/return:
    post:
      operationId: returnApprovalLegacy
      tags: [Approvals (Legacy)]
      deprecated: true
      summary: Return instance with optimistic locking
      description: |
        Deprecated. Use POST /api/approvals/{id}/actions with {"action":"reject"} instead.
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                version:
                  type: integer
              required: [version]
      responses:
        '200': { description: OK }
        '400': { $ref: '#/components/responses/ValidationError' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '409':
          description: Version conflict
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/approvals/{id}/revoke:
    post:
      operationId: revokeApprovalLegacy
      tags: [Approvals (Legacy)]
      deprecated: true
      summary: Revoke instance with optimistic locking
      description: |
        Deprecated. Use POST /api/approvals/{id}/actions with {"action":"revoke"} instead.
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                version:
                  type: integer
              required: [version]
      responses:
        '200': { description: OK }
        '400': { $ref: '#/components/responses/ValidationError' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '409':
          description: Version conflict
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/approvals/{id}/history:
    get:
      operationId: getApprovalHistory
      tags: [Approvals]
      summary: Get approval history
      description: |
        Returns the paginated action history for an approval instance, including
        create, approve, reject, transfer, revoke, and comment events with
        actor details and timestamps.
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
        - in: query
          name: page
          schema:
            type: integer
            default: 1
        - in: query
          name: pageSize
          schema:
            type: integer
            default: 50
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      items:
                        type: array
                        items:
                          $ref: '#/components/schemas/UnifiedApprovalHistoryDTO'
                      total:
                        type: integer
                      page:
                        type: integer
                      pageSize:
                        type: integer
                    required: [items]
                required: [ok, data]
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '503': { $ref: '#/components/responses/ServiceUnavailable' }
  /api/approval-templates:
    get:
      operationId: listApprovalTemplates
      tags: [Approval Templates]
      summary: List approval templates
      description: |
        Returns a paginated list of approval templates. Supports search by name
        and filtering by status (draft, published, archived).
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: search
          schema:
            type: string
        - in: query
          name: status
          schema:
            type: string
            enum: [draft, published, archived]
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 200
        - in: query
          name: offset
          schema:
            type: integer
            minimum: 0
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      items:
                        type: array
                        items:
                          $ref: '#/components/schemas/ApprovalTemplateListItem'
                      total:
                        type: integer
                      limit:
                        type: integer
                      offset:
                        type: integer
                    required: [items, total, limit, offset]
                required: [ok, data]
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
    post:
      operationId: createApprovalTemplate
      tags: [Approval Templates]
      summary: Create approval template
      description: |
        Creates a new approval template in draft status. Requires key (unique),
        name, formSchema (with fields), and approvalGraph (nodes + edges).
        The template must be published before it can be used to initiate approvals.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateApprovalTemplateRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    example: true
                  data:
                    $ref: '#/components/schemas/ApprovalTemplateDetail'
                required: [ok, data]
        '400': { $ref: '#/components/responses/ValidationError' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
  /api/approval-templates/{id}:
    get:
      operationId: getApprovalTemplate
      tags: [Approval Templates]
      summary: Get approval template detail
      description: |
        Returns the full template including formSchema and approvalGraph.
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    example: true
                  data:
                    $ref: '#/components/schemas/ApprovalTemplateDetail'
                required: [ok, data]
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
    patch:
      operationId: updateApprovalTemplate
      tags: [Approval Templates]
      summary: Update approval template draft
      description: |
        Updates an existing template. Each update automatically creates a new
        version. All fields are optional; only provided fields are updated.
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateApprovalTemplateRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    example: true
                  data:
                    $ref: '#/components/schemas/ApprovalTemplateDetail'
                required: [ok, data]
        '400': { $ref: '#/components/responses/ValidationError' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
  /api/approval-templates/{id}/publish:
    post:
      operationId: publishApprovalTemplate
      tags: [Approval Templates]
      summary: Publish approval template
      description: |
        Publishes the latest draft version of a template. Requires a RuntimePolicy
        (allowRevoke, optional revokeBeforeNodeKeys). Generates a
        publishedDefinition and runtimeGraph. After publishing, the template can
        be used to initiate new approval instances.
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PublishApprovalTemplateRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    example: true
                  data:
                    $ref: '#/components/schemas/ApprovalTemplateVersionDetail'
                required: [ok, data]
        '400': { $ref: '#/components/responses/ValidationError' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
  /api/approval-templates/{id}/versions/{versionId}:
    get:
      operationId: getApprovalTemplateVersion
      tags: [Approval Templates]
      summary: Get approval template version detail
      description: |
        Returns a specific version of a template. Published versions include the
        runtimeGraph with policy; draft versions have runtimeGraph set to null.
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
        - in: path
          name: versionId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    example: true
                  data:
                    $ref: '#/components/schemas/ApprovalTemplateVersionDetail'
                required: [ok, data]
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
