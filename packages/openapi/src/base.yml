openapi: 3.0.3
info:
  title: Metasheet v2 API
  version: 0.1.0
servers:
  - url: http://localhost:8900
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    StandardResponse:
      type: object
      properties:
        ok:
          type: boolean
        data:
          nullable: true
    ErrorResponse:
      type: object
      properties:
        ok:
          type: boolean
          default: false
        error:
          type: object
          properties:
            code:
              type: string
            message:
              type: string
    User:
      type: object
      properties:
        id:
          type: string
        email:
          type: string
        name:
          type: string
        roles:
          type: array
          items:
            type: string
        perms:
          type: array
          items:
            type: string
    Permission:
      type: object
      properties:
        code:
          type: string
        name:
          type: string
        description:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
    Role:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        permissions:
          type: array
          items:
            type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    Comment:
      type: object
      properties:
        id:
          type: string
        targetType:
          type: string
          nullable: true
        targetId:
          type: string
          nullable: true
        targetFieldId:
          type: string
          nullable: true
          description: Frontend alias for fieldId.
        containerType:
          type: string
          nullable: true
        containerId:
          type: string
          nullable: true
          description: Frontend alias for spreadsheetId.
        spreadsheetId:
          type: string
          nullable: true
        rowId:
          type: string
          nullable: true
        fieldId:
          type: string
          nullable: true
          description: Backend field-thread identifier. Replies inherit the parent field scope.
        content:
          type: string
        authorId:
          type: string
        parentId:
          type: string
          nullable: true
          description: Parent comment id for one-level threaded replies.
        resolved:
          type: boolean
        createdAt:
          type: string
        updatedAt:
          type: string
        mentions:
          type: array
          items:
            type: string
          description: Mentioned user identifiers parsed from comment content.
    CommentsListResponse:
      type: object
      properties:
        ok:
          type: boolean
          example: true
        data:
          type: object
          properties:
            items:
              type: array
              items:
                $ref: '#/components/schemas/Comment'
            total:
              type: integer
              example: 1
            limit:
              type: integer
              example: 50
            offset:
              type: integer
              example: 0
    CommentInboxItem:
      allOf:
        - $ref: '#/components/schemas/Comment'
        - type: object
          properties:
            unread:
              type: boolean
            mentioned:
              type: boolean
            baseId:
              type: string
              nullable: true
            sheetId:
              type: string
              nullable: true
            viewId:
              type: string
              nullable: true
            recordId:
              type: string
              nullable: true
          required: [unread, mentioned]
    CommentInboxResponse:
      type: object
      properties:
        ok:
          type: boolean
          example: true
        data:
          type: object
          properties:
            items:
              type: array
              items:
                $ref: '#/components/schemas/CommentInboxItem'
            total:
              type: integer
              example: 1
            limit:
              type: integer
              example: 50
            offset:
              type: integer
              example: 0
    CommentMentionCandidate:
      type: object
      properties:
        id:
          type: string
        label:
          type: string
        subtitle:
          type: string
      required: [id, label]
    CommentMentionCandidatesResponse:
      type: object
      properties:
        ok:
          type: boolean
          example: true
        data:
          type: object
          properties:
            items:
              type: array
              items:
                $ref: '#/components/schemas/CommentMentionCandidate'
            total:
              type: integer
              example: 1
            limit:
              type: integer
              example: 50
    CommentUnreadCountResponse:
      type: object
      properties:
        ok:
          type: boolean
          example: true
        data:
          type: object
          properties:
            count:
              type: integer
              example: 0
    CommentPresenceSummary:
      type: object
      properties:
        spreadsheetId:
          type: string
        rowId:
          type: string
        unresolvedCount:
          type: integer
        fieldCounts:
          type: object
          additionalProperties:
            type: integer
        mentionedCount:
          type: integer
          description: Unresolved comments in this record that mention the current requester.
        mentionedFieldCounts:
          type: object
          description: Per-field unresolved mention counts for the current requester.
          additionalProperties:
            type: integer
    CommentMentionSummaryItem:
      type: object
      properties:
        rowId:
          type: string
        mentionedCount:
          type: integer
          description: Number of unresolved comments in this record that mention the current user.
        unreadCount:
          type: integer
          description: Number of unresolved mentioned comments in this record that have not been marked as read by the current user.
        mentionedFieldIds:
          type: array
          items:
            type: string
          description: Deduplicated, sorted field ids where the user is mentioned.
      required: [rowId, mentionedCount, unreadCount, mentionedFieldIds]
    CommentMentionSummary:
      type: object
      properties:
        spreadsheetId:
          type: string
        unresolvedMentionCount:
          type: integer
          description: Total number of unresolved comments mentioning the current user across all records.
        unreadMentionCount:
          type: integer
          description: Total unresolved mentioned comments that have not been marked as read by the current user.
        mentionedRecordCount:
          type: integer
          description: Number of distinct records with unresolved mentions.
        unreadRecordCount:
          type: integer
          description: Number of distinct records with unread mentions.
        items:
          type: array
          items:
            $ref: '#/components/schemas/CommentMentionSummaryItem'
          description: Per-record breakdown, sorted by mentionedCount desc, rowId asc.
      required: [spreadsheetId, unresolvedMentionCount, unreadMentionCount, mentionedRecordCount, unreadRecordCount, items]
    CommentMentionSummaryResponse:
      type: object
      properties:
        ok:
          type: boolean
          example: true
        data:
          $ref: '#/components/schemas/CommentMentionSummary'
    CommentsSummaryResponse:
      type: object
      properties:
        ok:
          type: boolean
          example: true
        data:
          type: object
          properties:
            items:
              type: array
              items:
                $ref: '#/components/schemas/CommentPresenceSummary'
            total:
              type: integer
              example: 1
    PluginAdminEntry:
      type: object
      properties:
        name:
          type: string
        displayName:
          type: string
          nullable: true
        description:
          type: string
          nullable: true
        version:
          type: string
          nullable: true
        author:
          type: string
          nullable: true
        status:
          type: string
          enum: [active, inactive, failed]
        error:
          type: string
          nullable: true
        lastAttempt:
          type: string
          nullable: true
        registryStatus:
          type: string
          nullable: true
        lastActivated:
          type: string
          nullable: true
    PluginConfigEntry:
      type: object
      properties:
        config:
          type: object
        schema:
          type: object
          nullable: true
        version:
          type: string
          nullable: true
        last_modified:
          type: string
          nullable: true
        modified_by:
          type: string
          nullable: true
    AttendanceEvent:
      type: object
      properties:
        id:
          type: string
        user_id:
          type: string
        org_id:
          type: string
        work_date:
          type: string
          format: date
        occurred_at:
          type: string
          format: date-time
        event_type:
          type: string
          enum: [check_in, check_out, adjustment]
        source:
          type: string
        timezone:
          type: string
        location:
          type: object
        meta:
          type: object
        created_at:
          type: string
          format: date-time
    AttendanceRecord:
      type: object
      properties:
        id:
          type: string
        user_id:
          type: string
        org_id:
          type: string
        work_date:
          type: string
          format: date
        timezone:
          type: string
        first_in_at:
          type: string
          format: date-time
          nullable: true
        last_out_at:
          type: string
          format: date-time
          nullable: true
        work_minutes:
          type: integer
        late_minutes:
          type: integer
        early_leave_minutes:
          type: integer
        status:
          type: string
        is_workday:
          type: boolean
        meta:
          type: object
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    AttendanceRequest:
      type: object
      properties:
        id:
          type: string
        user_id:
          type: string
        org_id:
          type: string
        work_date:
          type: string
          format: date
        request_type:
          type: string
          enum: [missed_check_in, missed_check_out, time_correction, leave, overtime]
        requested_in_at:
          type: string
          format: date-time
          nullable: true
        requested_out_at:
          type: string
          format: date-time
          nullable: true
        reason:
          type: string
          nullable: true
        status:
          type: string
          enum: [pending, approved, rejected, cancelled]
        approval_instance_id:
          type: string
          nullable: true
        resolved_by:
          type: string
          nullable: true
        resolved_at:
          type: string
          format: date-time
          nullable: true
        metadata:
          type: object
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    AttendanceAnomaly:
      type: object
      properties:
        recordId:
          type: string
        workDate:
          type: string
          format: date
        status:
          type: string
        isWorkday:
          type: boolean
        firstInAt:
          type: string
          format: date-time
          nullable: true
        lastOutAt:
          type: string
          format: date-time
          nullable: true
        workMinutes:
          type: integer
        lateMinutes:
          type: integer
        earlyLeaveMinutes:
          type: integer
        leaveMinutes:
          type: integer
        overtimeMinutes:
          type: integer
        warnings:
          type: array
          items:
            type: string
        state:
          type: string
          enum: [open, pending]
        request:
          type: object
          nullable: true
          properties:
            id: { type: string }
            status: { type: string }
            requestType: { type: string }
        suggestedRequestType:
          type: string
          nullable: true
    AttendanceLeaveType:
      type: object
      properties:
        id:
          type: string
        orgId:
          type: string
        code:
          type: string
        name:
          type: string
        paid:
          type: boolean
        requiresApproval:
          type: boolean
        requiresAttachment:
          type: boolean
        defaultMinutesPerDay:
          type: integer
        isActive:
          type: boolean
    AttendanceOvertimeRule:
      type: object
      properties:
        id:
          type: string
        orgId:
          type: string
        name:
          type: string
        minMinutes:
          type: integer
        roundingMinutes:
          type: integer
        maxMinutesPerDay:
          type: integer
        requiresApproval:
          type: boolean
        isActive:
          type: boolean
    AttendanceApprovalStep:
      type: object
      properties:
        name:
          type: string
        approverUserIds:
          type: array
          items:
            type: string
        approver_user_ids:
          type: array
          deprecated: true
          items:
            type: string
        approverRoleIds:
          type: array
          items:
            type: string
        approver_role_ids:
          type: array
          deprecated: true
          items:
            type: string
    AttendanceApprovalFlow:
      type: object
      properties:
        id:
          type: string
        orgId:
          type: string
        name:
          type: string
        requestType:
          type: string
        steps:
          type: array
          items:
            $ref: '#/components/schemas/AttendanceApprovalStep'
        isActive:
          type: boolean
    AttendanceRotationRule:
      type: object
      properties:
        id:
          type: string
        orgId:
          type: string
        name:
          type: string
        timezone:
          type: string
        shiftSequence:
          type: array
          items:
            type: string
        isActive:
          type: boolean
    AttendanceRotationAssignment:
      type: object
      properties:
        id:
          type: string
        orgId:
          type: string
        org_id:
          type: string
          deprecated: true
        userId:
          type: string
        user_id:
          type: string
          deprecated: true
        rotationRuleId:
          type: string
        rotation_rule_id:
          type: string
          deprecated: true
        startDate:
          type: string
          format: date
        start_date:
          type: string
          format: date
          deprecated: true
        endDate:
          type: string
          format: date
          nullable: true
        end_date:
          type: string
          format: date
          nullable: true
          deprecated: true
        isActive:
          type: boolean
        is_active:
          type: boolean
          deprecated: true
    AttendanceRotationAssignmentItem:
      type: object
      properties:
        assignment:
          $ref: '#/components/schemas/AttendanceRotationAssignment'
        rotation:
          $ref: '#/components/schemas/AttendanceRotationRule'
    AttendanceRequestReportItem:
      type: object
      properties:
        requestType:
          type: string
        status:
          type: string
        total:
          type: integer
        minutes:
          type: integer
    AttendanceSummary:
      type: object
      properties:
        total_days:
          type: integer
        total_minutes:
          type: integer
        total_late_minutes:
          type: integer
        total_early_leave_minutes:
          type: integer
        leave_minutes:
          type: integer
        overtime_minutes:
          type: integer
        normal_days:
          type: integer
        late_days:
          type: integer
        early_leave_days:
          type: integer
        late_early_days:
          type: integer
        partial_days:
          type: integer
        absent_days:
          type: integer
        adjusted_days:
          type: integer
        off_days:
          type: integer
    AttendanceRule:
      type: object
      properties:
        id:
          type: string
        orgId:
          type: string
        name:
          type: string
        timezone:
          type: string
        workStartTime:
          type: string
        workEndTime:
          type: string
        lateGraceMinutes:
          type: integer
        earlyGraceMinutes:
          type: integer
        roundingMinutes:
          type: integer
        workingDays:
          type: array
          items:
            type: integer
        isDefault:
          type: boolean
    AttendanceRuleSet:
      type: object
      properties:
        id:
          type: string
        orgId:
          type: string
        name:
          type: string
        description:
          type: string
          nullable: true
        version:
          type: integer
        scope:
          type: string
        config:
          type: object
        isDefault:
          type: boolean
    AttendanceGroup:
      type: object
      properties:
        id:
          type: string
        orgId:
          type: string
        name:
          type: string
        code:
          type: string
        timezone:
          type: string
        ruleSetId:
          type: string
          nullable: true
        description:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
          nullable: true
        updatedAt:
          type: string
          format: date-time
          nullable: true
    AttendanceGroupMember:
      type: object
      properties:
        id:
          type: string
        orgId:
          type: string
        groupId:
          type: string
        userId:
          type: string
        createdAt:
          type: string
          format: date-time
          nullable: true
    AttendancePayrollTemplate:
      type: object
      properties:
        id:
          type: string
        orgId:
          type: string
        name:
          type: string
        timezone:
          type: string
        startDay:
          type: integer
        endDay:
          type: integer
        endMonthOffset:
          type: integer
        autoGenerate:
          type: boolean
        config:
          type: object
        isDefault:
          type: boolean
    AttendancePayrollCycle:
      type: object
      properties:
        id:
          type: string
        orgId:
          type: string
        templateId:
          type: string
          nullable: true
        name:
          type: string
          nullable: true
        startDate:
          type: string
          format: date
        endDate:
          type: string
          format: date
        status:
          type: string
        metadata:
          type: object
    AttendanceImportTemplate:
      type: object
      properties:
        source:
          type: string
        mapping:
          type: object
        mappingProfiles:
          type: array
          items:
            $ref: '#/components/schemas/AttendanceImportMappingProfile'
        payloadExample:
          type: object
    AttendanceImportMappingProfile:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
          nullable: true
        source:
          type: string
          nullable: true
        mapping:
          type: object
          nullable: true
        requiredFields:
          type: array
          items:
            type: string
        userMapKeyField:
          type: string
          nullable: true
        userMapSourceFields:
          type: array
          items:
            type: string
    AttendanceImportPreviewItem:
      type: object
      properties:
        userId:
          type: string
        workDate:
          type: string
          format: date
        firstInAt:
          type: string
          format: date-time
          nullable: true
        lastOutAt:
          type: string
          format: date-time
          nullable: true
        workMinutes:
          type: integer
        lateMinutes:
          type: integer
        earlyLeaveMinutes:
          type: integer
        leaveMinutes:
          type: integer
        overtimeMinutes:
          type: integer
        status:
          type: string
        isWorkday:
          type: boolean
        warnings:
          type: array
          items:
            type: string
        appliedPolicies:
          type: array
          items:
            type: string
        userGroups:
          type: array
          items:
            type: string
    AttendanceImportPreviewStats:
      type: object
      properties:
        invalid:
          type: integer
        duplicates:
          type: integer
    AttendanceImportPreviewData:
      type: object
      properties:
        items:
          type: array
          items: { $ref: '#/components/schemas/AttendanceImportPreviewItem' }
        total:
          type: integer
        rowCount:
          type: integer
        truncated:
          type: boolean
        previewLimit:
          type: integer
        mappingUsed:
          type: array
          items: { type: object }
        csvWarnings:
          type: array
          items: { type: string }
        groupWarnings:
          type: array
          items: { type: string }
        asyncSimplified:
          type: boolean
        stats:
          $ref: '#/components/schemas/AttendanceImportPreviewStats'
    AttendanceImportRequest:
      type: object
      properties:
        source:
          type: string
        orgId:
          type: string
        userId:
          type: string
        timezone:
          type: string
        ruleSetId:
          type: string
        mappingProfileId:
          type: string
        commitToken:
          type: string
        idempotencyKey:
          type: string
        engine:
          type: object
        mapping:
          type: object
        columns:
          type: array
          items: { type: object }
        data:
          type: object
        csvText:
          type: string
        csvFileId:
          type: string
        csvOptions:
          type: object
        rows:
          type: array
          items: { type: object }
        entries:
          type: array
          items: { type: object }
        userMap:
          type: object
        userMapKeyField:
          type: string
        userMapSourceFields:
          type: array
          items: { type: string }
        statusMap:
          type: object
        mode:
          type: string
    AttendanceImportJob:
      type: object
      properties:
        id:
          type: string
        orgId:
          type: string
        batchId:
          type: string
          nullable: true
        createdBy:
          type: string
          nullable: true
        idempotencyKey:
          type: string
          nullable: true
        kind:
          type: string
        status:
          type: string
        engine:
          type: string
          nullable: true
        chunkConfig:
          type: object
          nullable: true
        recordUpsertStrategy:
          type: string
          nullable: true
        progress:
          type: integer
        total:
          type: integer
        progressPercent:
          type: integer
        processedRows:
          type: integer
        failedRows:
          type: integer
        skippedCount:
          type: integer
        skippedRows:
          type: array
          items:
            type: object
            additionalProperties: true
        elapsedMs:
          type: integer
        throughputRowsPerSec:
          type: number
          format: float
        error:
          type: string
          nullable: true
        preview:
          $ref: '#/components/schemas/AttendanceImportPreviewData'
        startedAt:
          type: string
          format: date-time
          nullable: true
        finishedAt:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time
          nullable: true
        updatedAt:
          type: string
          format: date-time
          nullable: true
    AttendanceImportResult:
      type: object
      properties:
        imported:
          type: integer
        processedRows:
          type: integer
        failedRows:
          type: integer
        elapsedMs:
          type: integer
        engine:
          type: string
          nullable: true
        recordUpsertStrategy:
          type: string
          nullable: true
        items:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
              userId:
                type: string
                nullable: true
              workDate:
                type: string
                format: date
              engine:
                type: string
                nullable: true
        skipped:
          type: array
          items:
            type: object
            properties:
              userId:
                type: string
                nullable: true
              workDate:
                type: string
                format: date
                nullable: true
              warnings:
                type: array
                items:
                  type: string
        batchId:
          type: string
          nullable: true
        idempotent:
          type: boolean
        itemsTruncated:
          type: boolean
        csvWarnings:
          type: array
          items:
            type: string
        groupWarnings:
          type: array
          items:
            type: string
        meta:
          type: object
    AttendanceImportPrepareData:
      type: object
      properties:
        commitToken:
          type: string
        expiresAt:
          type: string
          format: date-time
        ttlSeconds:
          type: integer
    AttendanceImportUploadData:
      type: object
      properties:
        fileId:
          type: string
        rowCount:
          type: integer
        bytes:
          type: integer
        createdAt:
          type: string
          format: date-time
        expiresAt:
          type: string
          format: date-time
        maxBytes:
          type: integer
    AttendanceImportAsyncJobData:
      type: object
      properties:
        job:
          $ref: '#/components/schemas/AttendanceImportJob'
        idempotent:
          type: boolean
    AttendanceIntegration:
      type: object
      properties:
        id:
          type: string
        orgId:
          type: string
        name:
          type: string
        type:
          type: string
        status:
          type: string
        config:
          type: object
        lastSyncAt:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    AttendanceIntegrationRun:
      type: object
      properties:
        id:
          type: string
        orgId:
          type: string
        integrationId:
          type: string
        status:
          type: string
        message:
          type: string
          nullable: true
        meta:
          type: object
