openapi: 3.0.3
info:
  title: Metasheet v2 API
  version: 0.1.0
servers:
  - url: http://localhost:8900
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    StandardResponse:
      type: object
      properties:
        ok:
          type: boolean
        data:
          nullable: true
    ErrorResponse:
      type: object
      properties:
        ok:
          type: boolean
          default: false
        error:
          type: object
          properties:
            code:
              type: string
            message:
              type: string
    User:
      type: object
      properties:
        id:
          type: string
        email:
          type: string
        name:
          type: string
        roles:
          type: array
          items:
            type: string
        perms:
          type: array
          items:
            type: string
    ProductFeatures:
      type: object
      properties:
        attendance: { type: boolean }
        workflow: { type: boolean }
        attendanceAdmin: { type: boolean }
        attendanceImport: { type: boolean }
        mode:
          type: string
          enum: [platform, attendance, attendance-focused, plm-workbench]
    ExternalIdentityBinding:
      type: object
      properties:
        id: { type: string }
        provider: { type: string }
        externalKey: { type: string }
        providerUserId:
          type: string
          nullable: true
        providerUnionId:
          type: string
          nullable: true
        providerOpenId:
          type: string
          nullable: true
        corpId:
          type: string
          nullable: true
        userId: { type: string }
        profile:
          type: object
          additionalProperties: true
        boundBy:
          type: string
          nullable: true
        lastLoginAt:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    DirectoryDeprovisionPolicyAction:
      type: string
      enum: [mark_inactive, disable_dingtalk_auth, disable_local_user]
    DirectoryDeprovisionPolicy:
      type: array
      items:
        $ref: '#/components/schemas/DirectoryDeprovisionPolicyAction'
      uniqueItems: true
    DirectoryLinkStatus:
      type: string
      enum: [pending, linked, conflict, ignored]
    DirectoryMatchStrategy:
      type: string
      enum: [external_identity, email_exact, mobile_exact, manual]
    DirectoryIntegrationConfig:
      type: object
      properties:
        appKey:
          type: string
        rootDepartmentId:
          type: string
        tokenUrl:
          type: string
        departmentsUrl:
          type: string
        usersUrl:
          type: string
        userDetailUrl:
          type: string
        pageSize:
          type: integer
        captureUnboundLogins:
          type: boolean
        hasAppSecret:
          type: boolean
    DirectoryIntegration:
      type: object
      properties:
        id: { type: string }
        orgId: { type: string }
        provider:
          type: string
          enum: [dingtalk]
        name: { type: string }
        status: { type: string }
        corpId: { type: string }
        syncEnabled: { type: boolean }
        scheduleCron:
          type: string
          nullable: true
        defaultDeprovisionPolicy:
          $ref: '#/components/schemas/DirectoryDeprovisionPolicy'
        config:
          $ref: '#/components/schemas/DirectoryIntegrationConfig'
        lastSyncAt:
          type: string
          format: date-time
          nullable: true
        lastSuccessAt:
          type: string
          format: date-time
          nullable: true
        lastCursor:
          type: string
          nullable: true
        lastError:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    DirectoryDepartment:
      type: object
      properties:
        id: { type: string }
        integrationId: { type: string }
        externalDepartmentId: { type: string }
        externalParentDepartmentId:
          type: string
          nullable: true
        name: { type: string }
        fullPath:
          type: string
          nullable: true
        orderIndex:
          type: integer
          nullable: true
        isActive: { type: boolean }
        lastSeenAt:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    DirectoryLinkedUser:
      type: object
      properties:
        id: { type: string }
        email: { type: string }
        name:
          type: string
          nullable: true
        isActive: { type: boolean }
    DirectoryAccount:
      type: object
      properties:
        id: { type: string }
        integrationId: { type: string }
        provider:
          type: string
          enum: [dingtalk]
        corpId: { type: string }
        externalUserId: { type: string }
        unionId:
          type: string
          nullable: true
        openId:
          type: string
          nullable: true
        externalKey:
          type: string
          nullable: true
        name:
          type: string
          nullable: true
        nick:
          type: string
          nullable: true
        email:
          type: string
          nullable: true
        mobile:
          type: string
          nullable: true
        jobNumber:
          type: string
          nullable: true
        title:
          type: string
          nullable: true
        avatarUrl:
          type: string
          nullable: true
        isActive: { type: boolean }
        lastSeenAt:
          type: string
          format: date-time
          nullable: true
        linkStatus:
          $ref: '#/components/schemas/DirectoryLinkStatus'
        matchStrategy:
          allOf:
            - $ref: '#/components/schemas/DirectoryMatchStrategy'
          nullable: true
        linkedUser:
          allOf:
            - $ref: '#/components/schemas/DirectoryLinkedUser'
          nullable: true
        reviewNote:
          type: string
          nullable: true
        dingtalkAuthEnabled: { type: boolean }
        isBound: { type: boolean }
        departmentNames:
          type: array
          items:
            type: string
        deprovisionPolicyOverride:
          allOf:
            - $ref: '#/components/schemas/DirectoryDeprovisionPolicy'
          nullable: true
        effectiveDeprovisionPolicy:
          $ref: '#/components/schemas/DirectoryDeprovisionPolicy'
        raw:
          type: object
          additionalProperties: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    DirectorySyncRunStats:
      type: object
      properties:
        departmentsFetched:
          type: integer
        accountsFetched:
          type: integer
        accountsInserted:
          type: integer
        accountsUpdated:
          type: integer
        linksMatched:
          type: integer
        linksConflicted:
          type: integer
        accountsDeactivated:
          type: integer
        departmentsInserted:
          type: integer
        departmentsUpdated:
          type: integer
        skipped:
          type: boolean
          nullable: true
    DirectorySyncRun:
      type: object
      properties:
        id: { type: string }
        integrationId: { type: string }
        status:
          type: string
          enum: [running, success, error, skipped]
        startedAt:
          type: string
          format: date-time
        finishedAt:
          type: string
          format: date-time
          nullable: true
        cursorBefore:
          type: string
          nullable: true
        cursorAfter:
          type: string
          nullable: true
        stats:
          $ref: '#/components/schemas/DirectorySyncRunStats'
        errorMessage:
          type: string
          nullable: true
        meta:
          type: object
          additionalProperties: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    DirectoryTemplateCenter:
      type: object
      properties:
        integrationId: { type: string }
        teamTemplates:
          type: object
          additionalProperties: true
        importHistory:
          type: array
          items:
            type: object
            additionalProperties: true
        importPresets:
          type: object
          additionalProperties: true
        createdBy:
          type: string
          nullable: true
        updatedBy:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
          nullable: true
        updatedAt:
          type: string
          format: date-time
          nullable: true
    DirectoryTemplateCenterVersionSummary:
      type: object
      properties:
        outputModes:
          type: array
          items:
            type: string
        teamTemplateCount:
          type: integer
        importPresetCount:
          type: integer
        importHistoryCount:
          type: integer
    DirectoryTemplateCenterVersion:
      type: object
      properties:
        id: { type: string }
        centerId: { type: string }
        integrationId: { type: string }
        changeReason: { type: string }
        createdBy:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        snapshotSummary:
          $ref: '#/components/schemas/DirectoryTemplateCenterVersionSummary'
    DirectoryTemplateGovernancePreset:
      type: object
      properties:
        outputMode: { type: string }
        id: { type: string }
        name: { type: string }
        tags:
          type: array
          items:
            type: string
        favorite: { type: boolean }
        pinned: { type: boolean }
        useCount: { type: integer }
        lastUsedAt:
          type: string
          format: date-time
          nullable: true
        ignoredFieldCount: { type: integer }
        usageBucket:
          type: string
          enum: [unused, low, high]
    DirectoryTemplateGovernanceTagSummary:
      type: object
      properties:
        tag: { type: string }
        count: { type: integer }
    DirectoryTemplateGovernanceTotals:
      type: object
      properties:
        outputModes: { type: integer }
        teamTemplates: { type: integer }
        importPresets: { type: integer }
        favorites: { type: integer }
        pinned: { type: integer }
        highFrequency: { type: integer }
        lowFrequency: { type: integer }
        unused: { type: integer }
        distinctTags: { type: integer }
    DirectoryTemplateGovernanceReport:
      type: object
      properties:
        integrationId: { type: string }
        generatedAt:
          type: string
          format: date-time
        totals:
          $ref: '#/components/schemas/DirectoryTemplateGovernanceTotals'
        tagSummary:
          type: array
          items:
            $ref: '#/components/schemas/DirectoryTemplateGovernanceTagSummary'
        presets:
          type: array
          items:
            $ref: '#/components/schemas/DirectoryTemplateGovernancePreset'
    DirectoryScheduleStatus:
      type: object
      properties:
        integrationId: { type: string }
        syncEnabled: { type: boolean }
        scheduleCron:
          type: string
          nullable: true
        nextRunAt:
          type: string
          format: date-time
          nullable: true
        lastRunStatus:
          type: string
          nullable: true
        lastRunStartedAt:
          type: string
          format: date-time
          nullable: true
        lastRunFinishedAt:
          type: string
          format: date-time
          nullable: true
        lastSuccessAt:
          type: string
          format: date-time
          nullable: true
        lastError:
          type: string
          nullable: true
        alertCount: { type: integer }
        unacknowledgedAlertCount: { type: integer }
        lastAlertAt:
          type: string
          format: date-time
          nullable: true
    DirectorySyncAlert:
      type: object
      properties:
        id: { type: string }
        integrationId: { type: string }
        runId:
          type: string
          nullable: true
        level: { type: string }
        code: { type: string }
        message: { type: string }
        details:
          type: object
          additionalProperties: true
        sentToWebhook: { type: boolean }
        acknowledgedAt:
          type: string
          format: date-time
          nullable: true
        acknowledgedBy:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    DirectoryActivitySummary:
      type: object
      properties:
        total: { type: integer }
        integrationActions: { type: integer }
        accountActions: { type: integer }
        syncActions: { type: integer }
        alertActions: { type: integer }
        templateActions: { type: integer }
    DirectoryActivity:
      type: object
      properties:
        id: { type: string }
        createdAt:
          type: string
          format: date-time
        eventType: { type: string }
        eventCategory: { type: string }
        eventSeverity: { type: string }
        action: { type: string }
        resourceType:
          type: string
          enum: [directory-integration, directory-account, directory-sync-alert, directory-template-center]
        resourceId:
          type: string
          nullable: true
        actorUserId:
          type: string
          nullable: true
        actorName:
          type: string
          nullable: true
        actorEmail:
          type: string
          nullable: true
        actionDetails:
          type: object
          additionalProperties: true
        errorCode:
          type: string
          nullable: true
        integrationId:
          type: string
          nullable: true
        integrationName:
          type: string
          nullable: true
        accountId:
          type: string
          nullable: true
        accountName:
          type: string
          nullable: true
        accountEmail:
          type: string
          nullable: true
        accountExternalUserId:
          type: string
          nullable: true
    DirectorySyncTestResult:
      type: object
      properties:
        ok: { type: boolean }
        corpId: { type: string }
        departmentSampleCount: { type: integer }
    DirectoryProvisionResult:
      type: object
      properties:
        user:
          $ref: '#/components/schemas/User'
        temporaryPassword:
          type: string
          nullable: true
        account:
          $ref: '#/components/schemas/DirectoryAccount'
    Permission:
      type: object
      properties:
        code:
          type: string
        name:
          type: string
        description:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
    PermissionTemplate:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
        productMode:
          type: string
          enum: [platform, attendance, plm-workbench]
        permissions:
          type: array
          items:
            type: string
        presetId:
          type: string
          nullable: true
        roleId:
          type: string
          nullable: true
    Role:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        permissions:
          type: array
          items:
            type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    UserPermissionState:
      type: object
      properties:
        userId: { type: string }
        permissions:
          type: array
          items:
            type: string
        isAdmin: { type: boolean }
        degraded: { type: boolean }
    UserSessionRecord:
      type: object
      properties:
        id: { type: string }
        userId: { type: string }
        issuedAt:
          type: string
          format: date-time
        expiresAt:
          type: string
          format: date-time
        lastSeenAt:
          type: string
          format: date-time
        revokedAt:
          type: string
          format: date-time
          nullable: true
        revokedBy:
          type: string
          nullable: true
        revokeReason:
          type: string
          nullable: true
        ipAddress:
          type: string
          nullable: true
        userAgent:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    UserSessionsResponse:
      type: object
      properties:
        currentSessionId:
          type: string
          nullable: true
        items:
          type: array
          items:
            $ref: '#/components/schemas/UserSessionRecord'
    Comment:
      type: object
      properties:
        id:
          type: string
        spreadsheetId:
          type: string
        rowId:
          type: string
        fieldId:
          type: string
          nullable: true
        content:
          type: string
        authorId:
          type: string
        parentId:
          type: string
          nullable: true
        resolved:
          type: boolean
        createdAt:
          type: string
        updatedAt:
          type: string
        mentions:
          type: array
          items:
            type: string
    CommentsListResponse:
      type: object
      properties:
        ok:
          type: boolean
          example: true
        data:
          type: object
          properties:
            items:
              type: array
              items:
                $ref: '#/components/schemas/Comment'
            total:
              type: integer
              example: 1
            limit:
              type: integer
              example: 50
            offset:
              type: integer
              example: 0
    PluginAdminEntry:
      type: object
      properties:
        name:
          type: string
        displayName:
          type: string
          nullable: true
        description:
          type: string
          nullable: true
        version:
          type: string
          nullable: true
        author:
          type: string
          nullable: true
        status:
          type: string
          enum: [active, inactive, failed]
        error:
          type: string
          nullable: true
        lastAttempt:
          type: string
          nullable: true
        registryStatus:
          type: string
          nullable: true
        lastActivated:
          type: string
          nullable: true
    PluginConfigEntry:
      type: object
      properties:
        config:
          type: object
        schema:
          type: object
          nullable: true
        version:
          type: string
          nullable: true
        last_modified:
          type: string
          nullable: true
        modified_by:
          type: string
          nullable: true
    AttendanceEvent:
      type: object
      properties:
        id:
          type: string
        user_id:
          type: string
        org_id:
          type: string
        work_date:
          type: string
          format: date
        occurred_at:
          type: string
          format: date-time
        event_type:
          type: string
          enum: [check_in, check_out, adjustment]
        source:
          type: string
        timezone:
          type: string
        location:
          type: object
        meta:
          type: object
        created_at:
          type: string
          format: date-time
    AttendanceRecord:
      type: object
      properties:
        id:
          type: string
        user_id:
          type: string
        org_id:
          type: string
        work_date:
          type: string
          format: date
        timezone:
          type: string
        first_in_at:
          type: string
          format: date-time
          nullable: true
        last_out_at:
          type: string
          format: date-time
          nullable: true
        work_minutes:
          type: integer
        late_minutes:
          type: integer
        early_leave_minutes:
          type: integer
        status:
          type: string
        is_workday:
          type: boolean
        meta:
          type: object
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    AttendanceRequest:
      type: object
      properties:
        id:
          type: string
        user_id:
          type: string
        org_id:
          type: string
        work_date:
          type: string
          format: date
        request_type:
          type: string
          enum: [missed_check_in, missed_check_out, time_correction, leave, overtime]
        requested_in_at:
          type: string
          format: date-time
          nullable: true
        requested_out_at:
          type: string
          format: date-time
          nullable: true
        reason:
          type: string
          nullable: true
        status:
          type: string
          enum: [pending, approved, rejected, cancelled]
        approval_instance_id:
          type: string
          nullable: true
        resolved_by:
          type: string
          nullable: true
        resolved_at:
          type: string
          format: date-time
          nullable: true
        metadata:
          type: object
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    AttendanceAnomaly:
      type: object
      properties:
        recordId:
          type: string
        workDate:
          type: string
          format: date
        status:
          type: string
        isWorkday:
          type: boolean
        firstInAt:
          type: string
          format: date-time
          nullable: true
        lastOutAt:
          type: string
          format: date-time
          nullable: true
        workMinutes:
          type: integer
        lateMinutes:
          type: integer
        earlyLeaveMinutes:
          type: integer
        leaveMinutes:
          type: integer
        overtimeMinutes:
          type: integer
        warnings:
          type: array
          items:
            type: string
        state:
          type: string
          enum: [open, pending]
        request:
          type: object
          nullable: true
          properties:
            id: { type: string }
            status: { type: string }
            requestType: { type: string }
        suggestedRequestType:
          type: string
          nullable: true
    AttendanceLeaveType:
      type: object
      properties:
        id:
          type: string
        orgId:
          type: string
        code:
          type: string
        name:
          type: string
        requiresApproval:
          type: boolean
        requiresAttachment:
          type: boolean
        defaultMinutesPerDay:
          type: integer
        isActive:
          type: boolean
    AttendanceOvertimeRule:
      type: object
      properties:
        id:
          type: string
        orgId:
          type: string
        name:
          type: string
        minMinutes:
          type: integer
        roundingMinutes:
          type: integer
        maxMinutesPerDay:
          type: integer
        requiresApproval:
          type: boolean
        isActive:
          type: boolean
    AttendanceApprovalStep:
      type: object
      properties:
        name:
          type: string
        approverUserIds:
          type: array
          items:
            type: string
        approverRoleIds:
          type: array
          items:
            type: string
    AttendanceApprovalFlow:
      type: object
      properties:
        id:
          type: string
        orgId:
          type: string
        name:
          type: string
        requestType:
          type: string
        steps:
          type: array
          items:
            $ref: '#/components/schemas/AttendanceApprovalStep'
        isActive:
          type: boolean
    AttendanceRotationRule:
      type: object
      properties:
        id:
          type: string
        orgId:
          type: string
        name:
          type: string
        timezone:
          type: string
        shiftSequence:
          type: array
          items:
            type: string
        isActive:
          type: boolean
    AttendanceRotationAssignment:
      type: object
      properties:
        id:
          type: string
        orgId:
          type: string
        userId:
          type: string
        rotationRuleId:
          type: string
        startDate:
          type: string
          format: date
        endDate:
          type: string
          format: date
          nullable: true
        isActive:
          type: boolean
    AttendanceRotationAssignmentItem:
      type: object
      properties:
        assignment:
          $ref: '#/components/schemas/AttendanceRotationAssignment'
        rotation:
          $ref: '#/components/schemas/AttendanceRotationRule'
    AttendanceRequestReportItem:
      type: object
      properties:
        requestType:
          type: string
        status:
          type: string
        total:
          type: integer
        minutes:
          type: integer
    AttendanceSummary:
      type: object
      properties:
        total_days:
          type: integer
        total_minutes:
          type: integer
        total_late_minutes:
          type: integer
        total_early_leave_minutes:
          type: integer
        leave_minutes:
          type: integer
        overtime_minutes:
          type: integer
        normal_days:
          type: integer
        late_days:
          type: integer
        early_leave_days:
          type: integer
        late_early_days:
          type: integer
        partial_days:
          type: integer
        absent_days:
          type: integer
        adjusted_days:
          type: integer
        off_days:
          type: integer
    AttendanceRule:
      type: object
      properties:
        id:
          type: string
        orgId:
          type: string
        name:
          type: string
        timezone:
          type: string
        workStartTime:
          type: string
        workEndTime:
          type: string
        lateGraceMinutes:
          type: integer
        earlyGraceMinutes:
          type: integer
        roundingMinutes:
          type: integer
        workingDays:
          type: array
          items:
            type: integer
        isDefault:
          type: boolean
    AttendanceRuleSet:
      type: object
      properties:
        id:
          type: string
        orgId:
          type: string
        name:
          type: string
        description:
          type: string
          nullable: true
        version:
          type: integer
        scope:
          type: string
        config:
          type: object
        isDefault:
          type: boolean
