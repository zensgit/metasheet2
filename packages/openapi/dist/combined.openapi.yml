          $ref: '#/components/schemas/MultitableRecord'
        commentsScope:
          $ref: '#/components/schemas/MultitableCommentsScope'
        attachmentSummaries:
          $ref: '#/components/schemas/MultitableAttachmentSummaryMap'
      required:
        - mode
        - record
        - commentsScope
    MultitablePatchResult:
      type: object
      properties:
        updated:
          type: array
          items:
            $ref: '#/components/schemas/MultitableRecordVersion'
        records:
          type: array
          items:
            $ref: '#/components/schemas/MultitableComputedRecord'
        linkSummaries:
          $ref: '#/components/schemas/MultitableViewLinkSummaries'
        attachmentSummaries:
          $ref: '#/components/schemas/MultitableViewAttachmentSummaries'
        relatedRecords:
          type: array
          items:
            $ref: '#/components/schemas/MultitableRelatedRecord'
      required:
        - updated
  responses:
    Unauthorized:
      description: Unauthorized - Missing or invalid JWT token
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            missing_token:
              summary: Missing Authorization Header
              value:
                ok: false
                error:
                  code: UNAUTHORIZED
                  message: Authorization header is required
            invalid_token:
              summary: Invalid JWT Token
              value:
                ok: false
                error:
                  code: INVALID_TOKEN
                  message: Invalid or expired JWT token
            malformed_token:
              summary: Malformed Token
              value:
                ok: false
                error:
                  code: MALFORMED_TOKEN
                  message: Authorization header must start with 'Bearer '
    Forbidden:
      description: Forbidden - Insufficient permissions
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            insufficient_permissions:
              summary: Insufficient Permissions
              value:
                ok: false
                error:
                  code: FORBIDDEN
                  message: You do not have permission to perform this action
            role_restricted:
              summary: Role Restriction
              value:
                ok: false
                error:
                  code: ROLE_RESTRICTED
                  message: This action requires admin privileges
            resource_access_denied:
              summary: Resource Access Denied
              value:
                ok: false
                error:
                  code: ACCESS_DENIED
                  message: Access denied to this resource
    ValidationError:
      description: Validation error - Invalid request data
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            missing_required_field:
              summary: Missing Required Field
              value:
                ok: false
                error:
                  code: VALIDATION_ERROR
                  message: Required field 'name' is missing
            invalid_field_type:
              summary: Invalid Field Type
              value:
                ok: false
                error:
                  code: INVALID_TYPE
                  message: Field 'page' must be a positive integer
            invalid_field_value:
              summary: Invalid Field Value
              value:
                ok: false
                error:
                  code: INVALID_VALUE
                  message: Field 'pageSize' must be between 1 and 100
            invalid_request_format:
              summary: Invalid Request Format
              value:
                ok: false
                error:
                  code: INVALID_FORMAT
                  message: Request body must be valid JSON
    NotFound:
      description: Not found - Resource does not exist
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            resource_not_found:
              summary: Resource Not Found
              value:
                ok: false
                error:
                  code: NOT_FOUND
                  message: The requested resource was not found
            user_not_found:
              summary: User Not Found
              value:
                ok: false
                error:
                  code: USER_NOT_FOUND
                  message: User with ID 'user123' does not exist
            role_not_found:
              summary: Role Not Found
              value:
                ok: false
                error:
                  code: ROLE_NOT_FOUND
                  message: Role with ID 'role456' does not exist
            spreadsheet_not_found:
              summary: Spreadsheet Not Found
              value:
                ok: false
                error:
                  code: SPREADSHEET_NOT_FOUND
                  message: Spreadsheet with ID 'sheet789' does not exist
            file_not_found:
              summary: File Not Found
              value:
                ok: false
                error:
                  code: FILE_NOT_FOUND
                  message: File with ID 'file123' does not exist
    ServiceUnavailable:
      description: Service unavailable - Temporary server issues
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            database_unavailable:
              summary: Database Unavailable
              value:
                ok: false
                error:
                  code: DATABASE_UNAVAILABLE
                  message: Database connection temporarily unavailable
            service_overloaded:
              summary: Service Overloaded
              value:
                ok: false
                error:
                  code: SERVICE_OVERLOADED
                  message: Service temporarily overloaded, please try again later
            maintenance_mode:
              summary: Maintenance Mode
              value:
                ok: false
                error:
                  code: MAINTENANCE
                  message: Service is temporarily under maintenance
    Pagination:
      type: object
      properties:
        items:
          type: array
          items: {}
        page:
          type: integer
          minimum: 1
        pageSize:
          type: integer
          minimum: 1
        total:
          type: integer
          minimum: 0
paths:
  /api/admin/plugins:
    get:
      summary: List plugins (admin)
      security:
        - bearerAuth: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  count:
                    type: integer
                  list:
                    type: array
                    items:
                      $ref: '#/components/schemas/PluginAdminEntry'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
  /api/admin/plugins/health:
    get:
      summary: Plugin health status (admin)
      security:
        - bearerAuth: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  count:
                    type: integer
                  health:
                    type: array
                    items:
                      type: object
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
  /api/admin/plugins/{id}:
    get:
      summary: Get plugin detail (admin)
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  plugin:
                    $ref: '#/components/schemas/PluginAdminEntry'
                  config:
                    $ref: '#/components/schemas/PluginConfigEntry'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          description: Not Found
    delete:
      summary: Unload plugin (admin)
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
  /api/admin/plugins/{id}/enable:
    post:
      summary: Enable plugin (admin)
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
  /api/admin/plugins/{id}/disable:
    post:
      summary: Disable plugin (admin)
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
  /api/admin/plugins/{id}/reload:
    post:
      summary: Reload plugin (admin)
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
  /api/admin/plugins/reload-all:
    post:
      summary: Reload all plugins (admin)
      security:
        - bearerAuth: []
      responses:
        '200':
          description: OK
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
  /api/admin/plugins/{id}/config:
    get:
      summary: Get plugin config (admin)
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  pluginId:
                    type: string
                  config:
                    $ref: '#/components/schemas/PluginConfigEntry'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
    put:
      summary: Update plugin config (admin)
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                config:
                  type: object
                schema:
                  type: object
