        - fields
        - rows
    MultitableRecordContext:
      type: object
      properties:
        sheet:
          $ref: '#/components/schemas/MultitableSheet'
        view:
          allOf:
            - $ref: '#/components/schemas/MultitableView'
          nullable: true
        fields:
          type: array
          items:
            $ref: '#/components/schemas/MultitableField'
        record:
          $ref: '#/components/schemas/MultitableRecord'
        capabilities:
          $ref: '#/components/schemas/MultitableCapabilities'
        commentsScope:
          $ref: '#/components/schemas/MultitableCommentsScope'
        linkSummaries:
          $ref: '#/components/schemas/MultitableLinkSummaryMap'
        attachmentSummaries:
          $ref: '#/components/schemas/MultitableAttachmentSummaryMap'
      required:
        - sheet
        - fields
        - record
        - capabilities
        - commentsScope
        - linkSummaries
    MultitableFormContext:
      type: object
      properties:
        mode:
          type: string
          enum:
            - form
        readOnly:
          type: boolean
        submitPath:
          type: string
        sheet:
          $ref: '#/components/schemas/MultitableSheet'
        view:
          allOf:
            - $ref: '#/components/schemas/MultitableView'
          nullable: true
        fields:
          type: array
          items:
            $ref: '#/components/schemas/MultitableField'
        capabilities:
          $ref: '#/components/schemas/MultitableCapabilities'
        record:
          allOf:
            - $ref: '#/components/schemas/MultitableRecord'
          nullable: true
        commentsScope:
          allOf:
            - $ref: '#/components/schemas/MultitableCommentsScope'
          nullable: true
        attachmentSummaries:
          $ref: '#/components/schemas/MultitableAttachmentSummaryMap'
