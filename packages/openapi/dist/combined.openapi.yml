        name:
          type: string
        type:
          type: string
        filterInfo:
          type: object
          additionalProperties: true
        sortInfo:
          type: object
          additionalProperties: true
        groupInfo:
          type: object
          additionalProperties: true
        hiddenFieldIds:
          type: array
          items:
