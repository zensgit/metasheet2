openapi: 3.0.3
info:
  title: Metasheet v2 API
  version: 0.1.0
servers:
  - url: http://localhost:8900
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    StandardResponse:
      type: object
      properties:
        ok:
          type: boolean
        data:
          nullable: true
    ErrorResponse:
      type: object
      properties:
        ok:
          type: boolean
          default: false
        error:
          type: object
          properties:
            code:
              type: string
            message:
              type: string
    User:
      type: object
      properties:
        id:
          type: string
        email:
          type: string
        name:
          type: string
        roles:
          type: array
          items:
            type: string
        perms:
          type: array
          items:
            type: string
    Permission:
      type: object
      properties:
        code:
          type: string
        name:
          type: string
        description:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
    Role:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        permissions:
          type: array
          items:
            type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    Comment:
      type: object
      properties:
        id:
          type: string
        targetType:
          type: string
          nullable: true
        targetId:
          type: string
          nullable: true
        targetFieldId:
          type: string
          nullable: true
        containerType:
          type: string
          nullable: true
        containerId:
          type: string
          nullable: true
        spreadsheetId:
          type: string
          nullable: true
        rowId:
          type: string
          nullable: true
        fieldId:
          type: string
          nullable: true
        content:
          type: string
        authorId:
          type: string
        parentId:
          type: string
          nullable: true
        resolved:
          type: boolean
        createdAt:
          type: string
        updatedAt:
          type: string
        mentions:
          type: array
          items:
            type: string
    CommentsListResponse:
      type: object
      properties:
        ok:
          type: boolean
          example: true
        data:
          type: object
          properties:
            items:
              type: array
              items:
                $ref: '#/components/schemas/Comment'
            total:
              type: integer
              example: 1
            limit:
              type: integer
              example: 50
            offset:
              type: integer
              example: 0
    PluginAdminEntry:
      type: object
      properties:
        name:
          type: string
        displayName:
          type: string
          nullable: true
        description:
          type: string
          nullable: true
        version:
          type: string
          nullable: true
        author:
          type: string
          nullable: true
        status:
          type: string
          enum:
            - active
            - inactive
            - failed
        error:
          type: string
          nullable: true
        lastAttempt:
          type: string
          nullable: true
        registryStatus:
          type: string
          nullable: true
        lastActivated:
          type: string
          nullable: true
    PluginConfigEntry:
      type: object
      properties:
        config:
          type: object
        schema:
          type: object
          nullable: true
        version:
          type: string
          nullable: true
        last_modified:
          type: string
          nullable: true
        modified_by:
          type: string
          nullable: true
    AttendanceEvent:
      type: object
      properties:
        id:
          type: string
        user_id:
          type: string
        org_id:
          type: string
        work_date:
          type: string
          format: date
        occurred_at:
          type: string
          format: date-time
        event_type:
          type: string
          enum:
            - check_in
            - check_out
            - adjustment
        source:
          type: string
        timezone:
          type: string
        location:
          type: object
        meta:
          type: object
        created_at:
          type: string
          format: date-time
    AttendanceRecord:
      type: object
      properties:
        id:
          type: string
        user_id:
          type: string
        org_id:
          type: string
        work_date:
          type: string
          format: date
        timezone:
          type: string
        first_in_at:
          type: string
          format: date-time
          nullable: true
        last_out_at:
          type: string
          format: date-time
          nullable: true
        work_minutes:
          type: integer
        late_minutes:
          type: integer
        early_leave_minutes:
          type: integer
        status:
          type: string
        is_workday:
          type: boolean
        meta:
          type: object
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    AttendanceRequest:
      type: object
      properties:
        id:
          type: string
        user_id:
          type: string
        org_id:
          type: string
        work_date:
          type: string
          format: date
        request_type:
          type: string
          enum:
            - missed_check_in
            - missed_check_out
            - time_correction
            - leave
            - overtime
        requested_in_at:
          type: string
          format: date-time
          nullable: true
        requested_out_at:
          type: string
          format: date-time
          nullable: true
        reason:
          type: string
          nullable: true
        status:
          type: string
          enum:
            - pending
            - approved
            - rejected
            - cancelled
        approval_instance_id:
          type: string
          nullable: true
        resolved_by:
          type: string
          nullable: true
        resolved_at:
          type: string
          format: date-time
          nullable: true
        metadata:
          type: object
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    AttendanceAnomaly:
      type: object
      properties:
        recordId:
          type: string
        workDate:
          type: string
          format: date
        status:
          type: string
        isWorkday:
          type: boolean
        firstInAt:
          type: string
          format: date-time
          nullable: true
        lastOutAt:
          type: string
          format: date-time
          nullable: true
        workMinutes:
          type: integer
        lateMinutes:
          type: integer
        earlyLeaveMinutes:
          type: integer
        leaveMinutes:
          type: integer
        overtimeMinutes:
          type: integer
        warnings:
          type: array
          items:
            type: string
        state:
          type: string
          enum:
            - open
            - pending
        request:
          type: object
          nullable: true
          properties:
            id:
              type: string
            status:
              type: string
            requestType:
              type: string
        suggestedRequestType:
          type: string
          nullable: true
    AttendanceLeaveType:
      type: object
