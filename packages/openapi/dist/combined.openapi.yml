  /api/attendance/requests:
    x-plugin: plugin-attendance
    post:
      summary: Create attendance adjustment request
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                workDate:
                  type: string
                  format: date
                  description: Work date in YYYY-MM-DD format.
                date:
                  type: string
                  format: date
                  description: Compatibility alias for workDate.
                requestType:
                  type: string
                  enum:
                    - missed_check_in
                    - missed_check_out
                    - time_correction
                    - leave
                    - overtime
                  description: Request type.
                type:
                  type: string
                  enum:
                    - missed_check_in
                    - missed_check_out
                    - time_correction
                    - leave
                    - overtime
                  description: Compatibility alias for requestType.
                requestedInAt:
                  type: string
                  format: date-time
                  description: >-
                    Required for missed_check_in. Optional for time_correction,
                    leave, and overtime.
                requested_in_at:
                  type: string
                  format: date-time
                  description: Compatibility alias for requestedInAt.
                clockIn:
                  type: string
                  format: date-time
                  description: Compatibility alias for requestedInAt.
                requestedOutAt:
                  type: string
                  format: date-time
                  description: >-
                    Required for missed_check_out. Optional for time_correction,
                    leave, and overtime.
                requested_out_at:
                  type: string
                  format: date-time
                  description: Compatibility alias for requestedOutAt.
                clockOut:
                  type: string
                  format: date-time
                  description: Compatibility alias for requestedOutAt.
                reason:
                  type: string
                leaveTypeId:
                  type: string
                  description: >-
                    Required for leave requests unless leaveTypeCode is
                    provided.
                leaveTypeCode:
                  type: string
                  description: Required for leave requests unless leaveTypeId is provided.
                overtimeRuleId:
                  type: string
                  description: >-
                    Required for overtime requests unless overtimeRuleName is
                    provided.
                overtimeRuleName:
                  type: string
                  description: >-
                    Required for overtime requests unless overtimeRuleId is
                    provided.
                minutes:
                  type: integer
                  description: >-
                    Required for overtime unless derived from
                    requestedInAt/requestedOutAt.
                attachmentUrl:
                  type: string
                approvalFlowId:
                  type: string
                orgId:
                  type: string
              required:
                - workDate
                - requestType
            examples:
              missedCheckIn:
                summary: Missed check-in using canonical fields
                value:
                  workDate: '2026-03-20'
                  requestType: missed_check_in
                  requestedInAt: '2026-03-20T09:05:00+08:00'
                  reason: Forgot to check in after a network reconnect.
              missedCheckOutLegacy:
                summary: Missed check-out using legacy alias fields
                value:
                  date: '2026-03-20'
                  type: missed_check_out
                  clockOut: '2026-03-20T18:10:00+08:00'
                  reason: Left the office before the kiosk synced.
              leaveByCode:
                summary: Leave request using leaveTypeCode
                value:
                  workDate: '2026-03-21'
                  requestType: leave
                  leaveTypeCode: annual_leave
                  minutes: 480
                  reason: Family event
              overtimeByRuleName:
                summary: Overtime request using overtimeRuleName
                value:
                  workDate: '2026-03-22'
                  requestType: overtime
                  requestedInAt: '2026-03-22T18:30:00+08:00'
                  requestedOutAt: '2026-03-22T21:00:00+08:00'
                  overtimeRuleName: Weekday OT
                  reason: End-of-month release support
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  data:
                    type: object
                    properties:
                      request:
                        $ref: '#/components/schemas/AttendanceRequest'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
